<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1400px;
    background: var(--bg, #f5f0eb);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  }

  .card {
    width: 1020px;
    background: var(--paper, #ffffff);
    border-radius: 36px;
    border: 2px solid var(--border, #eaeaea);
    box-shadow: 0 24px 56px rgba(0,0,0,0.06);
    padding: 10px;
    display: flex;
    flex-direction: column;
  }

  .block-1 {
    background: var(--block-bg, #fafafa);
    border-radius: 28px;
    border: 2px solid var(--block-border, #f0f0f0);
    box-shadow: 0 6px 16px rgba(0,0,0,0.04);
    padding: 48px 48px 42px;
  }

  .block-1-inner {
    overflow: hidden;
    min-height: 440px;
  }

  .cover {
    float: right;
    width: 300px;
    margin: 0 0 24px 32px;
    border-radius: 18px;
    border: 2px solid var(--cover-border, #eaeaea);
    box-shadow: 0 16px 48px rgba(0,0,0,0.12);
    display: block;
  }

  .title {
    font-family: 'Noto Serif Display', Georgia, 'Times New Roman', serif;
    font-size: 54px;
    line-height: 1.2;
    font-weight: 700;
    color: var(--title-color, #0E7490);
    letter-spacing: 0.2px;
    margin-bottom: 18px;
  }

  .author-chip {
    display: inline-block;
    font-family: 'Inter', sans-serif;
    font-size: 32px;
    line-height: 1;
    font-weight: 500;
    background: var(--chip-bg, #e0f2fe);
    color: var(--chip-color, #0c4a6e);
    padding: 14px 26px;
    border-radius: 24px;
    letter-spacing: 0.3px;
    margin-bottom: 24px;
  }

  .paragraph {
    font-family: 'Noto Serif Display', Georgia, serif;
    font-size: 42px;
    line-height: 1.55;
    font-weight: 400;
    color: var(--paragraph-color, #111827);
  }

  .gap { height: 14px; }

  .block-2 {
    background: var(--block-bg, #fafafa);
    border-radius: 28px;
    border: 2px solid var(--block-border, #f0f0f0);
    box-shadow: 0 6px 16px rgba(0,0,0,0.04);
    padding: 42px 48px;
  }

  .subtitle {
    font-family: 'Inter', sans-serif;
    font-size: 42px;
    line-height: 1.3;
    font-weight: 600;
    color: var(--subtitle-color, #B91C1C);
    margin-bottom: 16px;
  }

  .highlight {
    background: var(--highlight-bg, rgba(14,116,144,0.1));
    color: var(--highlight-color, #064e3b);
    padding: 3px 8px;
    border-radius: 6px;
    font-weight: 600;
  }

  .logo-strip {
    padding: 32px 0 24px;
    text-align: center;
  }

  .logo-triggui {
    font-family: 'Inter', sans-serif;
    font-size: 48px;
    font-weight: 700;
    color: #111827;
    letter-spacing: -0.5px;
  }

  .logo-sup {
    font-size: 24px;
    vertical-align: super;
    font-weight: 400;
  }

  .logo-sub {
    font-family: 'Inter', sans-serif;
    font-size: 28px;
    color: #94a3b8;
    margin-top: 6px;
    font-style: italic;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="block-1">
      <div class="block-1-inner">
        <img class="cover" src="{{PORTADA_URL}}" alt="Portada" />
        <div class="title">{{TITULO}}</div>
        <div class="author-chip">{{AUTOR}}</div>
        <div class="paragraph">{{PARRAFO_TOP}}</div>
      </div>
    </div>
    <div class="gap"></div>
    <div class="block-2">
      <div class="subtitle">{{SUBTITULO}}</div>
      <div class="paragraph">{{PARRAFO_BOT}}</div>
    </div>
    <div class="logo-strip">
      <div class="logo-triggui">triggui<span class="logo-sup">®</span></div>
      <div class="logo-sub">@triggui | triggui.com</div>
    </div>
  </div>
</body>
</html>
