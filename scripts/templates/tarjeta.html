<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: var(--canvas-width, 1066px);
    height: var(--canvas-height, 1600px);
    overflow: hidden;
    background: var(--background, #FFFFFF);
  }

  body {
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }

  .frame {
    width: 100%;
    height: 100%;
    padding: var(--outer-pad, 10px);
    background: var(--background, #FFFFFF);
  }

  .card {
    width: 100%;
    height: 100%;
    background: var(--paper, #F9F9F9);
    border: 2px solid var(--border, #F39200);
    border-radius: var(--card-radius, 40px);
    box-shadow: var(--card-shadow, 0 12px 28px rgba(0,0,0,0.05));
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .hero {
    flex: 1 1 auto;
    min-height: 0;
    padding: var(--block-pad-y, 40px) var(--block-pad-x, 44px) 18px;
    display: flex;
    flex-direction: column;
  }

  .content-flow {
    min-height: 0;
    overflow: hidden;
  }

  .cover-wrap {
    float: right;
    width: var(--cover-width, 246px);
    margin: 0 0 var(--cover-margin-bottom, 21px) var(--cover-margin-left, 37px);
  }

  .cover,
  .cover-fallback {
    width: 100%;
    max-width: 100%;
    max-height: var(--cover-max-height, 574px);
    border: 1px solid #EAEAEA;
    border-radius: 4px;
    box-shadow: var(--cover-shadow, 0 15px 35px rgba(243,146,0,0.15));
    display: block;
    background: #fff;
  }

  .cover {
    height: auto;
    object-fit: cover;
  }

  .cover-fallback {
    aspect-ratio: 0.72 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    font-size: 34px;
    font-weight: 800;
    color: #777;
  }

  .title {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: var(--title-size, 57px);
    line-height: 1.2;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--title-color, #1A1A1A);
    margin: 0 0 14px 0;
    text-wrap: balance;
  }

  .author-chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: calc(var(--author-chip-pad-y, 8px) * 2 + 1em);
    padding: var(--author-chip-pad-y, 8px) var(--author-chip-pad-x, 23px);
    border-radius: var(--author-chip-radius, 25px);
    background: var(--author-chip-bg, #FFF3E0);
    color: var(--author-chip-color, #E65100);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    font-size: var(--author-chip-size, 33px);
    line-height: 1;
    font-weight: 700;
    letter-spacing: 0.3px;
    margin: 2px 0 18px 0;
  }

  .body-text {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: var(--paragraph-size, 37px);
    line-height: 1.7;
    font-weight: 400;
    letter-spacing: 0.2px;
    color: var(--paragraph-color, #4A4A4A);
    margin: 0;
    text-wrap: pretty;
  }

  .highlight {
    display: inline;
    background-color: var(--highlight-bg, #F39200);
    color: var(--highlight-ink, #FFFFFF);
    font-weight: 700;
    padding:
      var(--highlight-pad-y, 6px)
      var(--highlight-pad-x, 20px)
      calc(var(--highlight-pad-y, 6px) + 1px);
    border-radius: var(--highlight-radius, 12px);
    box-shadow: var(--highlight-shadow, 0 4px 12px rgba(243,146,0,0.1));
    line-height: inherit;
    box-decoration-break: clone;
    -webkit-box-decoration-break: clone;
  }

  .footer {
    flex: 0 0 var(--footer-height, 168px);
    padding: 16px 24px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .footer-brand {
    width: 100%;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .footer-brand img {
    height: var(--footer-logo-height, 49px);
    width: auto;
    display: block;
    object-fit: contain;
  }

  .footer-fallback {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    font-size: 46px;
    font-weight: 800;
    letter-spacing: -0.4px;
    color: #1A1A1A;
  }

  .footer-meta {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    font-size: var(--footer-size, 29px);
    line-height: 1.4;
    font-weight: 400;
    color: var(--footer-color, #8B8880);
  }
</style>
</head>
<body>
  <div class="frame">
    <div class="card">
      <div class="hero" id="content">
        <div class="content-flow" id="contentFlow">
          <div class="cover-wrap" id="coverWrap">
            {{PORTADA_SECTION}}
          </div>
          <div class="title" id="title">{{TITULO}}</div>
          <div class="author-chip" id="authorChip">{{AUTOR}}</div>
          <div class="body-text" id="bodyText">{{BODY_HTML}}</div>
        </div>
      </div>

      <div class="footer">
        {{FOOTER_SECTION}}
      </div>
    </div>
  </div>
</body>
</html>
