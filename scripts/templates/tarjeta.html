<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
  }

  body {
    background:
      radial-gradient(circle at 20% 10%, rgba(255,255,255,0.035), transparent 30%),
      radial-gradient(circle at 80% 90%, rgba(255,255,255,0.03), transparent 28%),
      var(--bg, #0B0B0C);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    color: var(--ink, #1A1A1A);
  }

  .frame {
    width: 1000px;
    height: 1840px;
    border-radius: 42px;
    background: var(--paper, #F7F7F5);
    border: 1.5px solid var(--border-color, #E7E3DE);
    box-shadow:
      0 42px 120px rgba(0,0,0,0.38),
      0 0 0 1px rgba(255,255,255,0.04);
    position: relative;
    overflow: hidden;
  }

  .paper-noise {
    position: absolute;
    inset: 0;
    opacity: 0.035;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    mix-blend-mode: multiply;
  }

  .inner {
    position: relative;
    z-index: 1;
    height: 100%;
    padding: 42px 42px 36px;
    display: flex;
    flex-direction: column;
  }

  .card-block {
    background: linear-gradient(145deg, #FFFFFF 0%, #F2F0EC 100%);
    border: 1px solid rgba(26,26,26,0.05);
    border-radius: 30px;
    box-shadow: 0 12px 36px rgba(0,0,0,0.04);
  }

  .top {
    padding: 50px 46px 44px;
    min-height: 1000px;
  }

  .top-flow {
    display: flow-root;
    height: 100%;
  }

  .cover {
    float: right;
    width: 280px;
    height: auto;
    margin: 0 0 24px 30px;
    border-radius: 18px;
    border: 1px solid var(--cover-border, #EAEAEA);
    box-shadow:
      0 20px 48px rgba(0,0,0,0.16),
      0 0 0 1px rgba(255,255,255,0.25);
    display: block;
    object-fit: cover;
  }

  .title {
    font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
    font-size: 64px;
    line-height: 1.14;
    font-weight: 700;
    letter-spacing: -0.35px;
    color: var(--title-color, #1A1A1A);
    margin-bottom: 20px;
  }

  .author-chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 54px;
    padding: 0 22px;
    border-radius: 999px;
    background: var(--chip-bg, #FBE7DF);
    color: var(--chip-color, #E35D30);
    font-size: 28px;
    line-height: 1;
    font-weight: 700;
    letter-spacing: 0.15px;
    margin-bottom: 30px;
  }

  .paragraph {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 42px;
    line-height: 1.58;
    font-weight: 400;
    color: var(--paragraph-color, #4A4A4A);
    letter-spacing: 0.15px;
  }

  .gap {
    height: 20px;
    flex: 0 0 auto;
  }

  .bottom {
    padding: 40px 46px 40px;
    min-height: 470px;
  }

  .subtitle {
    font-size: 38px;
    line-height: 1.28;
    font-weight: 700;
    color: var(--subtitle-color, #E35D30);
    margin-bottom: 18px;
    letter-spacing: 0.1px;
  }

  .highlight {
    background: linear-gradient(
      180deg,
      transparent 0%,
      transparent 55%,
      var(--highlight-bg, rgba(227,93,48,0.17)) 55%,
      var(--highlight-bg, rgba(227,93,48,0.17)) 100%
    );
    color: var(--highlight-color, inherit);
    padding: 0 0.08em;
    border-radius: 0.1em;
    font-weight: 600;
    box-decoration-break: clone;
    -webkit-box-decoration-break: clone;
  }

  .brand {
    margin-top: auto;
    padding-top: 26px;
    text-align: center;
  }

  .brand-mark {
    font-size: 46px;
    font-weight: 800;
    letter-spacing: -0.6px;
    color: #121212;
  }

  .brand-sub {
    margin-top: 8px;
    font-size: 24px;
    color: #8D96A3;
    font-style: italic;
    letter-spacing: 0.1px;
  }
</style>
</head>
<body>
  <div class="frame">
    <div class="paper-noise"></div>

    <div class="inner">
      <div class="card-block top">
        <div class="top-flow">
          {{PORTADA_SECTION}}
          <div class="title">{{TITULO}}</div>
          <div class="author-chip">{{AUTOR}}</div>
          <div class="paragraph">{{PARRAFO_TOP}}</div>
        </div>
      </div>

      <div class="gap"></div>

      <div class="card-block bottom">
        <div class="subtitle">{{SUBTITULO}}</div>
        <div class="paragraph">{{PARRAFO_BOT}}</div>
      </div>

      <div class="brand">
        <div class="brand-mark">triggui®</div>
        <div class="brand-sub">@triggui | triggui.com</div>
      </div>
    </div>
  </div>
</body>
</html>
