<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
  }

  body {
    background: var(--canvas-bg, #050505);
    color: var(--title-color, #1D1D1B);
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }

  .frame {
    width: 1080px;
    height: 1920px;
    background:
      radial-gradient(circle at 18% 7%, rgba(255,255,255,0.035), transparent 26%),
      radial-gradient(circle at 82% 92%, rgba(255,255,255,0.018), transparent 22%),
      var(--canvas-bg, #050505);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .shell {
    width: var(--shell-width, 748px);
    height: var(--shell-height, 1820px);
    background: var(--shell-bg, #F7F6F3);
    border: 1px solid var(--shell-border, rgba(255,255,255,0.08));
    border-radius: 38px;
    box-shadow:
      0 32px 84px rgba(0,0,0,0.30),
      inset 0 1px 0 rgba(255,255,255,0.42);
    overflow: hidden;
  }

  .shell-body {
    width: 100%;
    height: 100%;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .card {
    width: 100%;
    background: var(--card-bg, #FBFAF8);
    border: 1px solid var(--card-border-soft, rgba(0,0,0,0.05));
    border-radius: 25px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.60),
      0 8px 22px rgba(0,0,0,0.03);
    overflow: hidden;
    flex: 0 0 auto;
  }

  .hero-card {}
  .action-card {}

  .footer-card {
    height: var(--footer-height, 186px);
  }

  .hero-content {
    width: 100%;
    height: 100%;
    padding: 24px 28px 22px;
    overflow: hidden;
  }

  .hero-flow {
    width: 100%;
    overflow: hidden;
  }

  .cover {
    float: right;
    width: var(--cover-width, 164px);
    max-height: 236px;
    height: auto;
    margin: 0 0 10px 22px;
    border-radius: 6px;
    border: 1px solid rgba(0,0,0,0.04);
    box-shadow: var(--cover-shadow, 0 14px 28px rgba(0,0,0,0.11));
    display: block;
    object-fit: cover;
    background: #FFFFFF;
  }

  .title {
    font-family: Georgia, "Times New Roman", serif;
    font-size: var(--title-size, 58px);
    line-height: 1.03;
    font-weight: 400;
    letter-spacing: -0.45px;
    color: var(--title-color, #1D1D1B);
    margin: 0 0 16px;
    max-width: 100%;
  }

  .author-chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 40px;
    padding: 0 14px;
    border-radius: 999px;
    background: var(--chip-bg, #EFE7F6);
    color: var(--chip-color, #7F3DB8);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    font-size: var(--author-size, 21px);
    line-height: 1;
    font-weight: 800;
    letter-spacing: 0.05px;
    margin: 0 0 16px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.44);
  }

  .paragraph {
    font-family: Georgia, "Times New Roman", serif;
    font-size: var(--top-size, 28px);
    line-height: 1.44;
    font-weight: 400;
    letter-spacing: 0;
    color: var(--paragraph-color, #4C4C4C);
    margin: 0;
  }

  .paragraph-bottom {
    font-size: var(--bottom-size, 27px);
    line-height: 1.45;
  }

  .subtitle {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    font-size: var(--subtitle-size, 23px);
    line-height: 1.15;
    font-weight: 800;
    letter-spacing: -0.12px;
    color: var(--subtitle-color, #2F6FB7);
    margin: 0 0 16px;
  }

  .subtitle:empty {
    display: none;
    margin: 0;
  }

  .action-content {
    width: 100%;
    height: 100%;
    padding: 22px 26px 22px;
    overflow: hidden;
  }

  .footer-content {
    width: 100%;
    height: 100%;
    padding: 22px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .footer-brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    text-align: center;
  }

  .footer-brand img {
    height: 46px;
    width: auto;
    object-fit: contain;
    display: block;
  }

  .footer-fallback {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    font-size: 38px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #1D1D1B;
  }

  .footer-meta {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    font-size: 21px;
    line-height: 1.2;
    font-weight: 400;
    color: var(--footer-color, #8B8B8B);
    font-style: italic;
  }

  .highlight {
    display: inline;
    background-color: var(--highlight-bg, rgba(143,76,194,0.18));
    color: var(--highlight-ink, #4C4C4C);
    padding: 0.03em 0.08em 0.06em;
    border-radius: 0.12em;
    font-weight: 700;
    box-decoration-break: clone;
    -webkit-box-decoration-break: clone;
  }
</style>
</head>
<body>
  <div class="frame">
    <div class="shell">
      <div class="shell-body" id="shellBody">
        <div class="card hero-card" id="heroCard">
          <div class="hero-content" id="heroContent">
            <div class="hero-flow">
              {{PORTADA_SECTION}}
              <div class="title" id="title">{{TITULO}}</div>
              <div class="author-chip" id="authorChip">{{AUTOR}}</div>
              <div class="paragraph" id="parrafoTop">{{PARRAFO_TOP}}</div>
            </div>
          </div>
        </div>

        <div class="card action-card" id="actionCard">
          <div class="action-content" id="actionContent">
            <div class="subtitle" id="subtitle">{{SUBTITULO}}</div>
            <div class="paragraph paragraph-bottom" id="parrafoBot">{{PARRAFO_BOT}}</div>
          </div>
        </div>

        <div class="card footer-card" id="footerCard">
          <div class="footer-content">
            {{FOOTER_SECTION}}
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
