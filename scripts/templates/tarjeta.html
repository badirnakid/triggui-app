<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
  }

  body {
    background: var(--canvas-bg, #050505);
    color: var(--title-color, #1D1D1B);
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }

  .frame {
    width: 1080px;
    height: 1920px;
    background:
      radial-gradient(circle at 18% 7%, rgba(255,255,255,0.035), transparent 26%),
      radial-gradient(circle at 82% 92%, rgba(255,255,255,0.018), transparent 22%),
      var(--canvas-bg, #050505);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .shell {
    width: var(--outer-width, 760px);
    height: var(--outer-height, 1820px);
    background: var(--shell-bg, #F7F6F3);
    border: 1px solid var(--shell-border, rgba(255,255,255,0.08));
    border-radius: 38px;
    box-shadow:
      0 32px 80px rgba(0,0,0,0.30),
      inset 0 1px 0 rgba(255,255,255,0.42);
    overflow: hidden;
  }

  .shell-body {
    width: 100%;
    height: 100%;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .card {
    width: 100%;
    border-radius: 26px;
    border: 1px solid var(--card-border-soft, rgba(0,0,0,0.06));
    box-shadow:
      0 12px 28px rgba(0,0,0,0.04),
      inset 0 1px 0 rgba(255,255,255,0.55);
    overflow: hidden;
    flex: 0 0 auto;
  }

  .hero-card {
    background: var(--hero-card-bg, #FBFAF8);
  }

  .action-card {
    background: var(--action-card-bg, #FBFAF8);
  }

  .footer-card {
    background: var(--footer-card-bg, #FBFAF8);
  }

  .hero-content {
    padding: 26px 28px 24px;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  .hero-flow {
    width: 100%;
    overflow: hidden;
  }

  .cover {
    float: right;
    width: var(--cover-width, 246px);
    max-height: 360px;
    height: auto;
    margin: 0 0 14px 24px;
    border-radius: var(--cover-radius, 6px);
    border: 1px solid rgba(0,0,0,0.05);
    box-shadow: var(--cover-shadow, 0 16px 34px rgba(0,0,0,0.10));
    display: block;
    object-fit: cover;
    background: #FFFFFF;
  }

  .cover-note {
    clear: right;
  }

  .title {
    font-family: Georgia, "Times New Roman", serif;
    font-size: var(--title-size, 72px);
    line-height: 0.98;
    font-weight: 700;
    letter-spacing: -0.85px;
    color: var(--title-color, #1D1D1B);
    margin: 0 0 16px;
    max-width: 100%;
  }

  .author-chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 48px;
    padding: 0 18px;
    border-radius: 999px;
    background: var(--chip-bg, #EFE7F6);
    color: var(--chip-color, #7F3DB8);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    font-size: var(--author-size, 27px);
    line-height: 1;
    font-weight: 800;
    letter-spacing: 0.1px;
    margin: 0 0 16px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.42);
  }

  .paragraph {
    font-family: Georgia, "Times New Roman", serif;
    font-size: var(--top-size, 36px);
    line-height: 1.47;
    font-weight: 400;
    letter-spacing: 0.01px;
    color: var(--paragraph-color, #4B4B4B);
    margin: 0;
  }

  .paragraph-bottom {
    font-size: var(--bottom-size, 34px);
    line-height: 1.42;
  }

  .paragraph p {
    margin: 0;
  }

  .subtitle {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    font-size: var(--subtitle-size, 31px);
    line-height: 1.15;
    font-weight: 800;
    letter-spacing: -0.2px;
    color: var(--subtitle-color, #8F4CC2);
    margin: 0 0 14px;
  }

  .subtitle:empty {
    display: none;
    margin: 0;
  }

  .action-content {
    padding: 22px 26px 22px;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  .footer-content {
    min-height: 132px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 14px 22px;
  }

  .footer-brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
  }

  .footer-brand img {
    height: 42px;
    width: auto;
    object-fit: contain;
    display: block;
  }

  .footer-fallback {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    font-size: 38px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #1D1D1B;
  }

  .footer-meta {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    font-size: 22px;
    line-height: 1.2;
    font-weight: 400;
    color: var(--footer-color, #8A8A8A);
    font-style: italic;
    text-align: center;
  }

  .highlight {
    display: inline;
    color: var(--highlight-ink, #4B4B4B);
    font-weight: 700;
    background:
      linear-gradient(
        to bottom,
        transparent 0%,
        transparent 46%,
        var(--highlight-bg, rgba(143,76,194,0.16)) 46%,
        var(--highlight-bg, rgba(143,76,194,0.16)) 92%,
        transparent 92%,
        transparent 100%
      );
    box-shadow:
      inset 0 -0.065em 0 var(--highlight-line, rgba(143,76,194,0.30));
    padding: 0 0.06em 0.02em;
    border-radius: 0.10em;
    box-decoration-break: clone;
    -webkit-box-decoration-break: clone;
  }
</style>
</head>
<body>
  <div class="frame">
    <div class="shell">
      <div class="shell-body" id="shellBody">
        <div class="card hero-card" id="heroCard">
          <div class="hero-content" id="heroContent">
            <div class="hero-flow">
              {{PORTADA_SECTION}}
              <div class="title" id="title">{{TITULO}}</div>
              <div class="author-chip" id="authorChip">{{AUTOR}}</div>
              <div class="paragraph" id="parrafoTop">{{PARRAFO_TOP}}</div>
            </div>
          </div>
        </div>

        <div class="card action-card" id="actionCard">
          <div class="action-content" id="actionContent">
            <div class="subtitle" id="subtitle">{{SUBTITULO}}</div>
            <div class="paragraph paragraph-bottom" id="parrafoBot">{{PARRAFO_BOT}}</div>
          </div>
        </div>

        <div class="card footer-card" id="footerCard">
          <div class="footer-content">
            {{FOOTER_SECTION}}
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
