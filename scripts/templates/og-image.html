<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
  }

  body {
    background:
      radial-gradient(circle at 16% 18%, rgba(255,255,255,0.06), transparent 28%),
      radial-gradient(circle at 84% 82%, rgba(255,255,255,0.03), transparent 24%),
      var(--bg, #09090B);
    font-family: 'Inter', sans-serif;
    color: var(--ink, #F7F4EF);
  }

  .stage {
    width: 1200px;
    height: 630px;
    padding: 42px;
  }

  .card {
    width: 100%;
    height: 100%;
    border-radius: 34px;
    background:
      linear-gradient(145deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015)),
      var(--paper, #111114);
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow:
      0 28px 80px rgba(0,0,0,0.45),
      inset 0 1px 0 rgba(255,255,255,0.04);
    position: relative;
    overflow: hidden;
    display: grid;
    grid-template-columns: 1.15fr 280px;
    gap: 34px;
    align-items: center;
    padding: 44px 44px 44px 48px;
  }

  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 0% 0%, var(--accent-soft, rgba(227,93,48,0.14)), transparent 34%),
      radial-gradient(circle at 100% 100%, rgba(255,255,255,0.025), transparent 28%);
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    min-width: 0;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 34px;
    padding: 0 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    color: rgba(247,244,239,0.82);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 18px;
  }

  .headline {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 60px;
    line-height: 1.06;
    font-weight: 800;
    letter-spacing: -0.6px;
    color: var(--ink, #F7F4EF);
    max-width: 100%;
    margin-bottom: 18px;
    text-wrap: balance;
  }

  .accent-line {
    width: 96px;
    height: 5px;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--accent, #E35D30), rgba(255,255,255,0.18));
    box-shadow: 0 0 26px var(--accent-glow, rgba(227,93,48,0.28));
    margin-bottom: 20px;
  }

  .subheadline {
    font-size: 24px;
    line-height: 1.4;
    color: rgba(247,244,239,0.72);
    max-width: 660px;
    text-wrap: balance;
  }

  .cover-wrap {
    position: relative;
    z-index: 1;
    width: 280px;
    height: 420px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cover {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 22px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow:
      0 24px 48px rgba(0,0,0,0.42),
      0 0 36px var(--accent-glow, rgba(227,93,48,0.25));
    background: #0D0D10;
  }

  .cover-fallback {
    width: 100%;
    height: 100%;
    border-radius: 22px;
    border: 1px solid rgba(255,255,255,0.08);
    background:
      linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015)),
      #111114;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 1px;
    color: rgba(247,244,239,0.35);
    box-shadow:
      0 24px 48px rgba(0,0,0,0.42),
      0 0 36px var(--accent-glow, rgba(227,93,48,0.25));
  }

  .footer {
    position: absolute;
    left: 48px;
    bottom: 28px;
    right: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 1;
  }

  .brand {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.3px;
    color: rgba(247,244,239,0.94);
  }

  .url {
    font-size: 16px;
    font-weight: 600;
    color: rgba(247,244,239,0.34);
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="card">
      <div class="content">
        <div class="eyebrow">{{EYEBROW}}</div>
        <div class="headline">{{HEADLINE}}</div>
        <div class="accent-line"></div>
        <div class="subheadline">{{SUBHEADLINE}}</div>
      </div>

      <div class="cover-wrap">
        {{COVER_SECTION}}
      </div>

      <div class="footer">
        <div class="brand">triggui</div>
        <div class="url">triggui.com</div>
      </div>
    </div>
  </div>
</body>
</html>
