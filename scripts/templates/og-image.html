<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
  }

  body {
    background:
      radial-gradient(circle at 14% 14%, rgba(255,255,255,0.04), transparent 26%),
      radial-gradient(circle at 88% 84%, rgba(255,255,255,0.03), transparent 22%),
      linear-gradient(180deg, #050507 0%, #09090B 100%);
    font-family: 'Inter', sans-serif;
    color: var(--ink, #F7F4EF);
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }

  .stage {
    width: 1200px;
    height: 630px;
    padding: 16px;
  }

  .card {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
    border-radius: 32px;
    border: 1px solid rgba(255,255,255,0.06);
    background:
      linear-gradient(135deg, rgba(255,255,255,0.025), rgba(255,255,255,0.008)),
      linear-gradient(180deg, rgba(17,17,20,0.96), rgba(12,12,15,0.98));
    box-shadow:
      0 32px 90px rgba(0,0,0,0.42),
      inset 0 1px 0 rgba(255,255,255,0.05);
    display: grid;
    grid-template-columns: minmax(0, 1fr) 336px;
    gap: 24px;
    align-items: stretch;
    padding: 18px 18px 18px 34px;
  }

  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 8% 10%, var(--accent-soft, rgba(227,93,48,0.15)), transparent 30%),
      radial-gradient(circle at 92% 20%, rgba(255,255,255,0.025), transparent 24%),
      linear-gradient(90deg, rgba(255,255,255,0.015), transparent 22%, transparent 72%, rgba(255,255,255,0.01));
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 8px 8px 46px 0;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    align-self: flex-start;
    min-height: 40px;
    padding: 0 16px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.07);
    background: rgba(255,255,255,0.05);
    color: rgba(247,244,239,0.82);
    font-size: 17px;
    font-weight: 800;
    letter-spacing: -0.15px;
    margin-bottom: 20px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.035);
  }

  .headline {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 74px;
    line-height: 0.94;
    font-weight: 800;
    letter-spacing: -1.8px;
    color: var(--ink, #F7F4EF);
    max-width: 760px;
    margin-bottom: 18px;
    text-wrap: balance;
  }

  .accent-line {
    width: 112px;
    height: 6px;
    border-radius: 999px;
    margin-bottom: 20px;
    background: linear-gradient(90deg, var(--accent, #E35D30), rgba(255,255,255,0.18));
    box-shadow: 0 0 28px var(--accent-glow, rgba(227,93,48,0.28));
  }

  .subheadline {
    font-size: 29px;
    line-height: 1.22;
    font-weight: 500;
    color: rgba(247,244,239,0.77);
    max-width: 700px;
    text-wrap: balance;
  }

  .cover-wrap {
    position: relative;
    z-index: 1;
    height: 100%;
    width: 336px;
    display: flex;
    align-items: stretch;
    justify-content: flex-end;
  }

  .cover {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 26px;
    border: 1px solid rgba(255,255,255,0.08);
    background: #0D0D10;
    box-shadow:
      0 26px 54px rgba(0,0,0,0.40),
      0 0 42px var(--accent-glow, rgba(227,93,48,0.22));
  }

  .cover-fallback {
    width: 100%;
    height: 100%;
    border-radius: 26px;
    border: 1px solid rgba(255,255,255,0.08);
    background:
      linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015)),
      #111114;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    font-weight: 800;
    letter-spacing: 0.8px;
    color: rgba(247,244,239,0.34);
    box-shadow:
      0 26px 54px rgba(0,0,0,0.40),
      0 0 42px var(--accent-glow, rgba(227,93,48,0.22));
  }

  .brand {
    position: absolute;
    left: 34px;
    bottom: 22px;
    z-index: 2;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.35px;
    color: rgba(247,244,239,0.96);
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="card">
      <div class="content">
        <div class="eyebrow">{{EYEBROW}}</div>
        <div class="headline">{{HEADLINE}}</div>
        <div class="accent-line"></div>
        <div class="subheadline">{{SUBHEADLINE}}</div>
      </div>

      <div class="cover-wrap">
        {{COVER_SECTION}}
      </div>

      <div class="brand">triggui</div>
    </div>
  </div>
</body>
</html>
