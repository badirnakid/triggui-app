<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
  }

  body {
    background:
      radial-gradient(circle at 14% 14%, rgba(255,255,255,0.035), transparent 26%),
      radial-gradient(circle at 88% 84%, rgba(255,255,255,0.025), transparent 22%),
      linear-gradient(180deg, #050507 0%, #09090B 100%);
    font-family: 'Inter', sans-serif;
    color: var(--ink, #F7F4EF);
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }

  .stage {
    width: 1200px;
    height: 630px;
    padding: 10px;
  }

  .card {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
    border-radius: 32px;
    border: 1px solid rgba(255,255,255,0.06);
    background:
      linear-gradient(135deg, rgba(255,255,255,0.022), rgba(255,255,255,0.006)),
      linear-gradient(180deg, rgba(17,17,20,0.965), rgba(12,12,15,0.99));
    box-shadow:
      0 32px 90px rgba(0,0,0,0.42),
      inset 0 1px 0 rgba(255,255,255,0.05);
    display: grid;
    grid-template-columns: minmax(0, 1fr) 360px;
    gap: 20px;
    align-items: stretch;
    padding: 18px 18px 18px 30px;
  }

  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 8% 10%, var(--accent-soft, rgba(227,93,48,0.12)), transparent 30%),
      radial-gradient(circle at 92% 18%, rgba(255,255,255,0.02), transparent 22%),
      linear-gradient(90deg, rgba(255,255,255,0.012), transparent 22%, transparent 74%, rgba(255,255,255,0.006));
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 4px 8px 52px 0;
  }

  .headline {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    font-size: 86px;
    line-height: 0.96;
    font-weight: 700;
    letter-spacing: -2px;
    color: var(--ink, #F7F4EF);
    max-width: 720px;
    text-wrap: balance;
  }

  .cover-wrap {
    position: relative;
    z-index: 1;
    height: 100%;
    width: 360px;
    display: flex;
    align-items: stretch;
    justify-content: flex-end;
  }

  .cover {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 26px;
    border: 1px solid rgba(255,255,255,0.08);
    background: #0D0D10;
    box-shadow:
      0 26px 54px rgba(0,0,0,0.4),
      0 0 42px var(--accent-glow, rgba(227,93,48,0.22));
  }

  .cover-fallback {
    width: 100%;
    height: 100%;
    border-radius: 26px;
    border: 1px solid rgba(255,255,255,0.08);
    background:
      linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015)),
      #111114;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    font-weight: 800;
    letter-spacing: 0.8px;
    color: rgba(247,244,239,0.34);
    box-shadow:
      0 26px 54px rgba(0,0,0,0.4),
      0 0 42px var(--accent-glow, rgba(227,93,48,0.22));
  }

  .brand {
    position: absolute;
    left: 30px;
    bottom: 20px;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    min-height: 40px;
  }

  .brand img {
    display: block;
    height: 34px;
    width: auto;
    object-fit: contain;
    opacity: 1;
  }

  .brand-fallback {
    font-family: 'Inter', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.35px;
    color: rgba(247,244,239,0.96);
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="card">
      <div class="content">
        <div class="headline">{{HEADLINE}}</div>
      </div>

      <div class="cover-wrap">
        {{COVER_SECTION}}
      </div>

      <div class="brand">{{BRAND_SECTION}}</div>
    </div>
  </div>
</body>
</html>
