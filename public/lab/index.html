<!doctype html>
<html lang="es" style="background:#0e0f1b;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triggui 2.0 · Laboratorio</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Poppins:wght@500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,700;0,800;1,500;1,700&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; }

html, body {
  background: #0e0f1b !important;
  color: #fff;
  margin: 0;
  padding: 0;
  min-height: 100%;
  font-family: 'Archivo', sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(48,255,228,0.08), transparent 50%),
    radial-gradient(ellipse at 70% 80%, rgba(255,0,128,0.06), transparent 50%);
  z-index: -1;
  pointer-events: none;
  animation: nebula-breathe 20s ease-in-out infinite;
}

@keyframes nebula-breathe {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

@keyframes fire-move {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

@keyframes fadeUp {
  0% { opacity: 0; transform: translateY(20px); }
  100% { opacity: 1; transform: translateY(0); }
}

body { padding: 28px; }

.wrap {
  width: 100%;
  max-width: 1100px;
  margin: 0 auto;
}

.top {
  margin-bottom: 36px;
  animation: fadeUp .6s ease forwards;
}

.eyebrow {
  font-family: 'Archivo', sans-serif;
  font-size: 11px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  opacity: .5;
  font-weight: 800;
  margin-bottom: 16px;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-weight: 800;
  font-size: clamp(32px, 7vw, 48px);
  line-height: 1.05;
  margin: 0 0 12px 0;
  letter-spacing: -0.5px;
}

.lead {
  font-family: 'Archivo', sans-serif;
  font-size: 16px;
  line-height: 1.6;
  color: rgba(255,255,255,.6);
  max-width: 600px;
  margin: 0;
}

.status {
  margin-top: 16px;
  font-family: 'Poppins', sans-serif;
  font-size: 12px;
  font-weight: 600;
  opacity: .4;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
  margin-top: 8px;
}

.card {
  position: relative;
  background: radial-gradient(circle at top left, rgba(255,255,255,.05) 0%, rgba(255,255,255,.02) 60%, rgba(255,255,255,.01) 100%);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 24px;
  padding: 0;
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.04),
    0 18px 50px rgba(0,0,0,.35);
  overflow: hidden;
  text-decoration: none;
  color: inherit;
  display: block;
  transition: transform 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.25s ease;
  animation: fadeUp .5s ease forwards;
  opacity: 0;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.08),
    0 24px 60px rgba(0,0,0,.45);
}

.card:active {
  transform: translateY(0) scale(0.99);
  transition: transform 0.1s ease;
}

.card-cover {
  width: 100%;
  aspect-ratio: 1200 / 630;
  overflow: hidden;
  background: rgba(255,255,255,.03);
  display: flex;
  align-items: center;
  justify-content: center;
}

.card-cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.card-cover .cover-book {
  width: auto;
  height: 80%;
  max-width: 50%;
  object-fit: contain;
  border-radius: 8px;
  box-shadow: 0 12px 32px rgba(0,0,0,.5);
}

.card-body {
  padding: 22px;
}

.card-pill {
  display: inline-block;
  padding: 6px 12px;
  border-radius: 999px;
  background: linear-gradient(135deg, #30ffe4, #7c5cff);
  color: #fff;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.5px;
  margin-bottom: 14px;
}

.card-title {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-weight: 800;
  font-size: 24px;
  line-height: 1.1;
  margin: 0 0 8px 0;
  letter-spacing: -0.3px;
}

.card-author {
  font-family: 'Archivo', sans-serif;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  opacity: .6;
  font-weight: 700;
  margin-bottom: 14px;
}

.card-desc {
  font-size: 14px;
  line-height: 1.55;
  color: rgba(255,255,255,.7);
  margin-bottom: 16px;
}

.card-cta {
  font-family: 'Poppins', sans-serif;
  font-size: 12px;
  font-weight: 700;
  background: linear-gradient(120deg, #30ffe4 0%, #FF0080 50%, #FFD700 100%);
  background-size: 200% 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: fire-move 4s ease infinite;
  letter-spacing: 0.5px;
}

.error {
  color: #ffb4b4;
  font-weight: 700;
  margin-top: 24px;
}

@media (max-width: 480px) {
  body { padding: 20px; }
  .grid { grid-template-columns: 1fr; gap: 16px; }
}
</style>
</head>
<body>
<main class="wrap">
  <section class="top">
    <div class="eyebrow">Triggui 2.0 · Laboratorio</div>
    <h1>Ediciones Vivas</h1>
    <p class="lead">Cada edición es un objeto editorial vivo. Se adapta a tu momento. Te revela un libro. Te suelta.</p>
    <div class="status" id="status">Cargando...</div>
  </section>

  <section class="grid" id="grid"></section>
</main>

<script>
const grid = document.getElementById('grid');
const status = document.getElementById('status');

async function cargar() {
  try {
    const res = await fetch('/lab/ediciones.json', { cache: 'no-store' });
    const data = await res.json();
    const ediciones = data.ediciones || [];

    status.textContent = `${ediciones.length} ediciones`;

    if (!ediciones.length) {
      grid.innerHTML = '<div class="error">No hay ediciones disponibles.</div>';
      return;
    }

    grid.innerHTML = ediciones.map((e, i) => {
      const hasPortada = e.portada && e.portada.startsWith('http');
      const coverHTML = hasPortada
        ? `<img class="cover-book" src="${e.portada}" alt="${e.titulo}" />`
        : `<img src="${e.ogImage || '/lab/og-demo.png'}" alt="${e.titulo}" />`;

      return `
        <a class="card" href="/lab/t/${e.id}/" style="animation-delay:${i * 0.08}s">
          <div class="card-cover" style="background:${e.fondo || '#0a0d1a'}">
            ${coverHTML}
          </div>
          <div class="card-body">
            <div class="card-pill">${e.palabra || ''}</div>
            <h2 class="card-title">${e.titulo || ''}</h2>
            <div class="card-author">${e.autor || ''}</div>
            <div class="card-desc">${e.descripcion || ''}</div>
            <div class="card-cta">Abrir edición →</div>
          </div>
        </a>
      `;
    }).join('');
  } catch (err) {
    status.textContent = 'Error';
    grid.innerHTML = '<div class="error">Error cargando ediciones.</div>';
  }
}

cargar();
</script>
</body>
</html>
