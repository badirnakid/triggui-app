<style id="base-styles">
  html, body { 
    background:#000000 !important; 
    color:#fff; 
    margin:0; 
    padding:0; 
    height:100%; 
    font-family:'Archivo',sans-serif; 
    -webkit-overflow-scrolling:touch; 
    -webkit-text-size-adjust: 100%; 
    text-size-adjust: 100%; 
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    touch-action: manipulation; /* FIX: Elimina el retraso de 300ms al tocar */
  }
  
  /* Fondo animado "Deep Space" — v9: azul espacio + teal sutil, nada rojizo.
     Compagina mucho mejor con la aurora cromática de la barra mágica. */
  body::before { 
    content:""; 
    position:fixed; 
    inset:0; 
    background:
      radial-gradient(ellipse at 30% 20%, rgba(40, 100, 220, 0.14), transparent 65%),
      radial-gradient(ellipse at 70% 80%, rgba(80, 230, 200, 0.06), transparent 65%);
    z-index:-1; 
    pointer-events:none;
    opacity: 0.9;
  }

  /* 🌒 v11 BOOT GATE INMEDIATO — LO PRIMERO QUE SE VE ES LA BARRA MÁGICA. PUNTO.
     
     El CSS se evalúa en el MOMENTO de primer paint. Como el <script> que
     agrega `html.booting` corre ANTES del primer paint, usamos `html.booting`
     como selector principal. Así los bloques JAMÁS son visibles, ni siquiera
     por 16ms (un frame).
     
     `body.booting` también existe como capa 2 de seguridad por si algún
     navegador renderiza antes de que html.booting tome efecto.
     
     Lo que esconde durante el boot:
       - .intro (letrero rojizo con gradiente fosforescente animado)
       - .block (los 4 cuadros de colores del libro)
       - #likeBtnTarjeta, #barraLupaBtn, .card-reveal-trigger
     
     Se usa visibility:hidden (no display:none) para que el layout no se
     reacomode al revelarse. */
  html.booting .intro,
  html.booting .block,
  html.booting #likeBtnTarjeta,
  html.booting #barraLupaBtn,
  html.booting #progressBadge,
  html.booting #toast,
  html.booting .card-reveal-trigger,
  body.booting .intro,
  body.booting .block,
  body.booting #likeBtnTarjeta,
  body.booting #barraLupaBtn,
  body.booting #progressBadge,
  body.booting #toast,
  body.booting .card-reveal-trigger {
    visibility: hidden !important;
    opacity: 0 !important;
    animation: none !important;
  }
  
  /* Fallback extra: si por cualquier motivo el JS no corre, la intro se 
     muestra con su animación original tras 300ms. No es lo ideal pero 
     evita pantalla negra eterna si hay bloqueo de scripts. */
  html.no-js body .intro,
  html.script-error body .intro {
    visibility: visible !important;
    opacity: 1 !important;
  }
</style>

<script id="boot-gate">
  // 🌒 v11: Gate INMEDIATO — ANTES del primer paint.
  // El <script> es síncrono y corre durante el parse del HTML,
  // ANTES de que el browser pinte nada. Esto garantiza que ningún
  // elemento aparezca por un solo frame.
  //
  // html.booting y body.booting se remueven SINCRONIZADAMENTE en
  // bootTriggui(), justo cuando el overlay de la barra mágica está
  // 100% listo con strings y colores aplicados.
  document.documentElement.classList.add('booting');
  document.addEventListener('DOMContentLoaded', () => {
    document.body.classList.add('booting');
  }, { once: true });
</script>

<script id="core-logic">
// ========================================
// 🧠 LOGICA DE DATOS (CORE BLINDADO)
// ========================================
// 🌒 v8: saveLocal/getLocal con telemetría de errores (1 vez por sesión).
// En Safari modo privado, WebView estricto, o quota exhausted, localStorage
// puede lanzar QuotaExceededError o SecurityError. Antes se silenciaban
// silenciosamente sin saber cuántos usuarios estaban afectados. Ahora se
// reporta a GA el primer fallo de cada sesión para tener visibilidad.
let __trigguiStorageErrorReported = false;
function __reportStorageError(op, err) {
  if (__trigguiStorageErrorReported) return;
  __trigguiStorageErrorReported = true;
  try {
    if (typeof gtag !== 'undefined') {
      gtag('event', 'storage_error', {
        event_category: 'app_error',
        op: op,
        name: (err && err.name) || 'Unknown',
        message: String((err && err.message) || err).slice(0, 80)
      });
    }
  } catch(_) {}
}
function saveLocal(key, value) {
  try { localStorage.setItem('triggui_' + key, JSON.stringify(value)); }
  catch(e) { __reportStorageError('set', e); }
}
function getLocal(key, defaultValue = null) {
  try {
    const data = localStorage.getItem('triggui_' + key);
    return data ? JSON.parse(data) : defaultValue;
  } catch(e) {
    __reportStorageError('get', e);
    return defaultValue;
  }
}

function getPlatform() {
  const ua = navigator.userAgent || navigator.vendor || window.opera;
  if (/wv|WebView/i.test(ua) || (ua.includes("Android") && ua.includes("Version/"))) return "App/WebView";
  if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) return "iOS Web";
  if (/android/i.test(ua)) return "Android Web";
  return "Desktop";
}

window.reset = function() {
  localStorage.removeItem('triggui_books_opened');
  localStorage.removeItem('triggui_concepts');
  localStorage.removeItem('triggui_last_book_time');
  localStorage.removeItem('triggui_streak');
  localStorage.removeItem('triggui_last_visit');
  console.log('✅ Reset completo.');
}

let tapCount = 0;
let tapTimer = null;
let cardOpenedThisSession = false; 

function track(event, data = {}) {
  if (typeof gtag !== 'undefined') gtag('event', event, { event_category: 'app_engagement', ...data });
}

function updateStreak() {
  const today = new Date().toDateString();
  const lastVisit = getLocal('last_visit');
  let streak = getLocal('streak', 0);

  if (streak === 0) {
    streak = 1;
    saveLocal('streak', 1);
    saveLocal('last_visit', today);
    return 1;
  }

  if (lastVisit === today) return streak;

  const yesterday = new Date(Date.now() - 86400000).toDateString();
  const newStreak = (lastVisit === yesterday) ? streak + 1 : 1;
    
  saveLocal('streak', newStreak);
  saveLocal('last_visit', today);
  track('streak_updated', { streak: newStreak });
  return newStreak;
}

function incrementBooks() {
  const count = getLocal('books_opened', 0) + 1;
  saveLocal('books_opened', count);
  saveLocal('last_book_time', Date.now());
  track('book_opened', { total: count });
  return count;
}

function addConcepts(amount) {
  let current = getLocal('concepts', 0);
  const books = getLocal('books_opened', 0);
  if (current === 0 && books > 1) { current = books * 5; }
  const newVal = current + amount;
  saveLocal('concepts', newVal);
  return newVal;
}

function getRealisticUserCount() {
  const base = 28;
  const variance = Math.floor(Math.random() * 8);
  return base + variance;
}

// ══════════════════════════════════════════════════════════════════════════
// 🌍 SISTEMA I18N NIVEL DIOS — ES/EN con fallback gracioso
// ══════════════════════════════════════════════════════════════════════════
const TriggguiI18n = {
  detectLang: function() {
    const saved = getLocal('lang');
    if (saved === 'es' || saved === 'en') return saved;
    // 🌒 v8: respetar el idioma del navegador en primera visita.
    // Triggui está en App Store + Google Play globalmente.
    // navigator.language puede ser 'en', 'en-US', 'es-MX', 'fr', etc.
    // Solo soportamos ES/EN — cualquier otro idioma cae a ES por default.
    try {
      const nav = (navigator.language || navigator.userLanguage || 'es').toLowerCase();
      if (nav.startsWith('en')) return 'en';
    } catch(_) {}
    return 'es';
  },
  get: function(key) {
    const L = this.lang || 'es';
    return (this.strings[L] && this.strings[L][key]) || this.strings.es[key] || key;
  },
  fromBook: function(libro, field) {
    if (!libro) return '';
    if (this.lang === 'en') {
      const enKey = field + '_en';
      if (libro[enKey] !== undefined && libro[enKey] !== null && libro[enKey] !== '') {
        return libro[enKey];
      }
    }
    return libro[field];
  },
  fromTarjeta: function(libro, tarjetaField, innerField) {
    if (!libro) return '';
    if (this.lang === 'en') {
      const enKey = tarjetaField + '_en';
      if (libro[enKey] && libro[enKey][innerField] !== undefined && libro[enKey][innerField] !== null && libro[enKey][innerField] !== '') {
        return libro[enKey][innerField];
      }
    }
    return (libro[tarjetaField] && libro[tarjetaField][innerField]) || '';
  },
  setLang: function(newLang) {
    if (newLang !== 'es' && newLang !== 'en') return;
    this.lang = newLang;
    saveLocal('lang', newLang);
    // 🌒 v8: mantener el atributo html[lang] sincronizado con el idioma real.
    // Mejora SEO, screen readers, y Safari reader mode.
    try { document.documentElement.lang = newLang; } catch(_) {}
    track('lang_changed', { lang: newLang });
  },
  strings: {
    es: {
      'barra.streak.days': 'días',
      'barra.streak.day': 'día',
      'barra.eyebrow': 'pausa',
      'barra.question.fixed': '¿Cómo te sientes?',
      'barra.question.word1': '¿Cómo',
      'barra.question.word2': 'te',
      'barra.question.word3': 'sientes?',
      'barra.placeholder.default': 'escribe con honestidad',
      'barra.placeholder.returning': 'como siempre, sin editar',
      'barra.placeholder.sunday': 'un momento para ti',
      'barra.placeholder.ritual': 'dilo como viene',
      'barra.skip': 'saltar →',
      'barra.micro.starting': 'triggui elige <em>el primer libro</em>',
      'barra.micro.growing': 'triggui elige <em>el libro correcto</em>',
      'barra.micro.robust': 'triggui elige <em>el libro correcto</em>',
      'barra.loading': 'encontrando tu libro…',
      'toast.langChanged.es': 'Español activado',
      'toast.langChanged.en': 'English activated',
      'badge.loading': 'Cargando…',
      'badge.days': 'días',
      'badge.day': 'día',
      'badge.books': 'libros',
      'badge.book': 'libro',
      'badge.sparks': 'chispas juntas',
      'badge.globalSparks': 'global',
      'intro.default': 'Toca. Descubre. El libro te espera.',
    },
    en: {
      'barra.streak.days': 'days',
      'barra.streak.day': 'day',
      'barra.eyebrow': 'pause',
      'barra.question.fixed': 'How are you feeling?',
      'barra.question.word1': 'How',
      'barra.question.word2': 'are',
      'barra.question.word3': 'you feeling?',
      'barra.placeholder.default': 'write honestly',
      'barra.placeholder.returning': 'as always, without editing',
      'barra.placeholder.sunday': 'a moment for you',
      'barra.placeholder.ritual': 'say it as it comes',
      'barra.skip': 'skip →',
      'barra.micro.starting': 'triggui picks <em>the first book</em>',
      'barra.micro.growing': 'triggui picks <em>the right book</em>',
      'barra.micro.robust': 'triggui picks <em>the right book</em>',
      'barra.loading': 'finding your book…',
      'toast.langChanged.es': 'Español activado',
      'toast.langChanged.en': 'English activated',
      'badge.loading': 'Loading…',
      'badge.days': 'days',
      'badge.day': 'day',
      'badge.books': 'books',
      'badge.book': 'book',
      'badge.sparks': 'sparks together',
      'badge.globalSparks': 'global',
      'intro.default': 'Tap. Discover. Your book awaits.',
    }
  }
};
TriggguiI18n.lang = TriggguiI18n.detectLang();
// 🌒 v8: sincronizar html[lang] con el idioma detectado al arranque
try { document.documentElement.lang = TriggguiI18n.lang; } catch(_) {}

// ══════════════════════════════════════════════════════════════════════════
// 🎯 BARRA MÁGICA — gestión de visibilidad diaria
// ══════════════════════════════════════════════════════════════════════════
const BarraMagica = {
  shouldShowToday: function() {
    const today = new Date().toDateString();
    const lastShown = getLocal('barra_last_shown');
    return lastShown !== today;
  },
  markShownToday: function() {
    saveLocal('barra_last_shown', new Date().toDateString());
  },
  getQuestionKey: function() {
    // Pregunta fija por ahora para consistencia ritual.
    // En futuro se puede volver a rotación cronobiológica si decisión estratégica.
    return 'barra.question.fixed';
  },
  getMicroCopyKey: function(catSize) {
    if (catSize < 5) return 'barra.micro.starting';
    if (catSize < 50) return 'barra.micro.growing';
    return 'barra.micro.robust';
  }
};

<style id="block-cards">

<style id="barra-magica-styles">

  position: fixed;
  inset: 0;
  z-index: 9998;

  display: none;
  flex-direction: column;
  align-items: center;

  transition: opacity 0.7s cubic-bezier(0.4, 0, 0.2, 1);

}

#barraMagicaOverlay.visible {
  display: flex;
  opacity: 1;
}

#barraMagicaOverlay::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(ellipse 90% 60% at 50% -10%, rgba(255, 94, 0, 0.14) 0%, transparent 55%),
    radial-gradient(ellipse 80% 50% at 50% 110%, rgba(255, 0, 85, 0.10) 0%, transparent 55%);

  animation: bm-breathe 8s ease-in-out infinite;
}

@keyframes bm-breathe {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

#barraAurora {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  opacity: 0.35;
  z-index: 1;
}

.bm-aurora-blob {
  position: absolute;
  width: 320px;
  height: 320px;
  border-radius: 50%;
  filter: blur(60px);
  will-change: transform;
}

.bm-aurora-1 {
  top: -100px;
  left: -80px;
  /* v9: color dinámico del catálogo (se setea en applyStrings).
     Fallback a azul espacial si aún no hay catálogo. */
  background: var(--bm-aurora-1, rgba(40, 100, 220, 0.45));
  animation: bm-aurora-drift-1 22s ease-in-out infinite;
}

.bm-aurora-2 {
  bottom: -80px;
  right: -60px;
  /* v9: color dinámico del catálogo (se setea en applyStrings).
     Fallback a teal sutil si aún no hay catálogo. */
  background: var(--bm-aurora-2, rgba(80, 230, 200, 0.40));
  animation: bm-aurora-drift-2 26s ease-in-out infinite;
}

@keyframes bm-aurora-drift-1 {

<script id="js-modal-system">
// ========================================
// SISTEMA MODAL
// ========================================
const Modal = {
  el: document.getElementById('appModal'),
  emoji: document.getElementById('mEmoji'),
  title: document.getElementById('mTitle'),
  text: document.getElementById('mText'),
  pBtn: document.getElementById('mBtnPrimary'),
  sBtn: document.getElementById('mBtnSecondary'),
    
  show: function(config) {
    this.emoji.innerText = config.emoji || '✨';
    this.title.innerText = config.title || 'Triggui';
    this.text.innerHTML = config.text || '';
    this.pBtn.innerText = config.btnText || 'Continuar';
    this.pBtn.onclick = null; this.sBtn.onclick = null;

    this.pBtn.onclick = () => {
      this.close();
      if(config.onConfirm) config.onConfirm();
    };
    
    if(config.showCancel) {
      this.sBtn.style.display = 'flex';
      this.sBtn.innerText = config.cancelText || 'Cerrar';
      this.sBtn.onclick = () => {
        this.close();
        if(config.onCancel) config.onCancel();
      };
    } else {
      this.sBtn.style.display = 'none';
    }

    this.el.style.display = 'flex';
    setTimeout(() => this.el.classList.add('visible'), 10);
  },
    
  close: function() {
    this.el.classList.remove('visible');
    setTimeout(() => { this.el.style.display = 'none'; }, 300);
  }
};
</script>

// HANDLERS

// 🌒 v12: requestNewBook — reemplazo NIVEL DIOS del location.reload()
//
// El usuario impaciente NO debe ver los bloques cambiar. NO debe ver flash.
// NO debe ver nada transitorio. Solo ve: "toco bloque → aparece la barra
// mágica → elijo sentimiento → aparecen bloques nuevos".
//
// La secuencia correcta:
//   1. ANTES de cambiar libro, mostrar la barra mágica al 100% sobre los bloques
//      actuales (el overlay los tapa totalmente con z-index:9998)
//   2. CUANDO la barra está 100% visible, activar body.booting → bloques
//      viejos se vuelven visibility:hidden detrás del overlay
//   3. Elegir nuevo libro, llamar render() (nuevos bloques siguen hidden)
//   4. El usuario submite → barra cierra → bloques nuevos aparecen limpios
//
// Esto elimina completamente el flash porque la barra mágica es SIEMPRE lo
// primero que el usuario ve antes de que haya cualquier cambio de estado.
function requestNewBook() {
  const overlay = document.getElementById('barraMagicaOverlay');
  if (!overlay) {
    // fallback de seguridad — si no hay overlay, reload clásico
    location.reload();
    return;
  }

  track('new_book_requested');

  // 🌒 v12: Secuencia cinematográfica nivel dios.
  //
  // Importante: NO removemos el gate hasta que el overlay esté al 100%.
  // Si lo removiéramos al instante, los bloques viejos serían visibles
  // detrás del overlay semi-transparente durante el fade-in.
  //
  // 1. Aplicar gate YA → bloques viejos visibility:hidden al instante
  // 2. applyStrings pinta la barra (aún invisible con opacity:0)
  // 3. Pre-mount overlay opacity:0, display:flex
  // 4. Doble rAF → fade-in 350ms
  // 5. transitionend → cambiar libro y render() (con gate aún activo)
  // 6. El usuario submite → closeOverlay remueve gate al inicio del fade-out
  //    (el fade-out revela los bloques nuevos gradualmente)

  document.documentElement.classList.add('booting');
  document.body.classList.add('booting');

  BarraMagica.applyStrings();
  overlay.style.display = 'flex';
  overlay.style.opacity = '0';
  overlay.style.pointerEvents = '';
  overlay.style.transition = 'none';
  void overlay.offsetWidth; // reflow

  const lupa = document.getElementById('barraLupaBtn');
  if (lupa) lupa.classList.remove('visible');

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      // Listener que dispara SOLO cuando fade-in complete
      const onFadeInDone = (e) => {
        if (e.propertyName !== 'opacity') return;
        overlay.removeEventListener('transitionend', onFadeInDone);
        // NO removemos gate aquí — se mantiene activo hasta que el usuario
        // submite y closeOverlay lo remueva al inicio del fade-out (reveal).
        try {
          if (window.__TRIGGUI_DATA__ && window.__TRIGGUI_DATA__.libros) {
            const idx = pickLibroNoRepetido(window.__TRIGGUI_DATA__.libros);
            libro = window.__TRIGGUI_DATA__.libros[idx];
            render();
            updateBadge();
          }
        } catch (err) {
          console.error('[Triggui] requestNewBook render error:', err);
        }
      };
      overlay.addEventListener('transitionend', onFadeInDone);
      // Fallback 400ms
      setTimeout(() => {
        overlay.removeEventListener('transitionend', onFadeInDone);
        try {
          if (window.__TRIGGUI_DATA__ && window.__TRIGGUI_DATA__.libros) {
            const idx = pickLibroNoRepetido(window.__TRIGGUI_DATA__.libros);
            libro = window.__TRIGGUI_DATA__.libros[idx];
            render();
            updateBadge();
          }
        } catch (err) {
          console.error('[Triggui] requestNewBook render error:', err);
        }
      }, 400);

      overlay.style.transition = 'opacity 350ms cubic-bezier(0.25, 0.1, 0.25, 1)';
      overlay.style.opacity = '1';
      overlay.classList.add('visible');

      setTimeout(() => {
        const inp = document.getElementById('barraInput');
        if (inp && !('ontouchstart' in window)) inp.focus();
      }, 500);

      track('barra_opened', { force: true, lang: TriggguiI18n.lang, source: 'new_book' });
    });
  });
}

function luminance(hex) { try { const c = hex.replace("#","").match(/.{1,2}/g).map(x=>parseInt(x,16)/255); const f = v => v<=.03928 ? v/12.92 : Math.pow((v+.055)/1.055,2.4); return 0.2126*f(c[0])+0.7152*f(c[1])+0.0722*f(c[2]); } catch { return 0; } }
function pickTextColor(bg) { try { return luminance(bg) > 0.35 ? "#000" : "#fff"; } catch { return "#fff"; } }

function hexToRgba(hex, alpha) {
  try {
    const clean = String(hex || '').replace('#', '').trim();
    const full = clean.length === 3 ? clean.split('').map(c => c + c).join('') : clean;
    const [r, g, b] = full.match(/.{1,2}/g).map(x => parseInt(x, 16));
    return `rgba(${r}, ${g}, ${b}, ${alpha})`;
  } catch {
    return `rgba(255, 232, 115, ${alpha})`;
  }
}

// ════════════════════════════════════════════════════════════════════════════
// 🌒 v9: COLOR MATH NIVEL DIOS
// Herramientas para trabajar color en espacio HSL y calcular contraste WCAG.
// Usadas por:
//   1. Aurora cromática (applyStrings): elegir 2 accents con hue distante
//   2. Contrast Guardian (render de tarjeta): ajustar accent para legibilidad
// ════════════════════════════════════════════════════════════════════════════

// HEX → HSL. Retorna { h: [0,360), s: [0,1], l: [0,1] }.
// HSL es mucho mejor que RGB para ajustar contraste: "oscurece" = reducir L.
function hexToHsl(hex) {
  try {
    const clean = String(hex || '').replace('#', '').trim();
    const full = clean.length === 3 ? clean.split('').map(c => c + c).join('') : clean;
    const parts = full.match(/.{1,2}/g);
    if (!parts || parts.length < 3) return { h: 0, s: 0, l: 0 };
    const [r, g, b] = parts.map(x => parseInt(x, 16) / 255);
    const max = Math.max(r, g, b), min = Math.min(r, g, b);
    const l = (max + min) / 2;
    let h = 0, s = 0;
    if (max !== min) {
      const d = max - min;
      s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
      switch (max) {
        case r: h = ((g - b) / d + (g < b ? 6 : 0)); break;
        case g: h = ((b - r) / d + 2); break;
        case b: h = ((r - g) / d + 4); break;
      }
      h *= 60;
    }
    return { h, s, l };
  } catch {
    return { h: 0, s: 0, l: 0.5 };
  }
}

// HSL → HEX. Inverso exacto de hexToHsl.
function hslToHex(h, s, l) {
  h = ((h % 360) + 360) % 360;
  s = Math.max(0, Math.min(1, s));
  l = Math.max(0, Math.min(1, l));
  const c = (1 - Math.abs(2 * l - 1)) * s;
  const x = c * (1 - Math.abs(((h / 60) % 2) - 1));
  const m = l - c / 2;
  let r1, g1, b1;
  if (h < 60)       { r1 = c; g1 = x; b1 = 0; }
  else if (h < 120) { r1 = x; g1 = c; b1 = 0; }
  else if (h < 180) { r1 = 0; g1 = c; b1 = x; }
  else if (h < 240) { r1 = 0; g1 = x; b1 = c; }
  else if (h < 300) { r1 = x; g1 = 0; b1 = c; }
  else              { r1 = c; g1 = 0; b1 = x; }
  const toHex = v => Math.round((v + m) * 255).toString(16).padStart(2, '0');
  return `#${toHex(r1)}${toHex(g1)}${toHex(b1)}`;
}

// Contrast ratio WCAG 2.1. Retorna [1, 21].
// AA normal text: >= 4.5, AA large: >= 3.0, AAA: >= 7.0
function contrastRatio(hex1, hex2) {
  const l1 = luminance(hex1);
  const l2 = luminance(hex2);
  const bright = Math.max(l1, l2);
  const dark = Math.min(l1, l2);
  return (bright + 0.05) / (dark + 0.05);
}

// ════════════════════════════════════════════════════════════════════════════
// 🌒 CONTRAST GUARDIAN — el héroe que salva del amarillo fosforescente
//
// Dado un accent y un paper, devuelve un accent que:
//   1. Mantiene el HUE original (la "identidad" cromática del libro)
//   2. Mantiene la SATURACIÓN lo más cercana posible
//   3. Ajusta la LUMINOSIDAD para alcanzar contraste AA (4.5:1 mínimo)
//
// Algoritmo v2 (mejorado):
//   - Prueba AMBAS direcciones (oscurecer + aclarar) con binary search
//   - Si ambas direcciones dan un color que cumple target, elige la que
//     MINIMIZA el cambio en luminosidad (preserva identidad del color)
//   - Si ninguna dirección cumple con saturación original, reduce saturación
//     gradualmente y reintenta en ambas direcciones
//   - Último recurso: negro o blanco (el que dé contraste contra el paper)
//
// Esto resuelve el "amarillo fosforescente":
//   yellow #F4E400 + crema #FEFEF0 → oscurece amarillo a ocre/ámbar legible
//   NO colapsa a negro si el hue puede preservarse
// ════════════════════════════════════════════════════════════════════════════
function ensureContrastAccent(accent, paper, targetRatio) {
  targetRatio = targetRatio || 4.5;
  try {
    const currentRatio = contrastRatio(accent, paper);
    if (currentRatio >= targetRatio) return accent;  // ya cumple

    const original = hexToHsl(accent);

    // Busca el L más cercano al original que cumpla target en una dirección dada.
    // direction: 'darker' (bajar L) o 'lighter' (subir L)
    // Retorna { hex, ratio, delta_l, reached }
    const searchDirection = (targetS, direction) => {
      const extreme = direction === 'darker' ? 0 : 1;
      const extremeHex = hslToHex(original.h, targetS, extreme);
      const extremeRatio = contrastRatio(extremeHex, paper);
      if (extremeRatio < targetRatio) {
        return { hex: extremeHex, ratio: extremeRatio, delta_l: Math.abs(extreme - original.l), reached: false };
      }

      // Binary search: queremos el L MÁS CERCANO al original que aún cumpla target
      let lo, hi;
      if (direction === 'darker') {
        lo = 0;           // extremo oscuro (cumple target por definición)
        hi = original.l;  // original (no cumple, por eso entramos aquí)
      } else {
        lo = original.l;  // original (no cumple)
        hi = 1;           // extremo claro (cumple target)
      }

      let bestL = extreme;
      let bestHex = extremeHex;
      let bestRatio = extremeRatio;

      for (let i = 0; i < 24; i++) {
        const mid = (lo + hi) / 2;
        const candHex = hslToHex(original.h, targetS, mid);
        const candRatio = contrastRatio(candHex, paper);
        if (candRatio >= targetRatio) {
          // cumple target — guardar y acercarse al original
          bestL = mid;
          bestHex = candHex;
          bestRatio = candRatio;
          if (direction === 'darker') {
            lo = mid;  // mover hacia el original (más claro)
          } else {
            hi = mid;  // mover hacia el original (más oscuro)
          }
        } else {
          // no cumple — alejarse del original
          if (direction === 'darker') {
            hi = mid;  // más oscuro
          } else {
            lo = mid;  // más claro
          }
        }
      }
      return { hex: bestHex, ratio: bestRatio, delta_l: Math.abs(bestL - original.l), reached: true };
    };

    // Con una saturación dada, prueba AMBAS direcciones y elige la mejor
    const searchBoth = (targetS) => {
      const darker = searchDirection(targetS, 'darker');
      const lighter = searchDirection(targetS, 'lighter');
      if (!darker.reached && !lighter.reached) return null;
      if (!darker.reached) return lighter;
      if (!lighter.reached) return darker;
      // ambos cumplen — elegir el que cambie menos L (preserva identidad)
      return darker.delta_l <= lighter.delta_l ? darker : lighter;
    };

    // Intento 1: con saturación original
    let best = searchBoth(original.s);
    if (best) return best.hex;

    // Intento 2..5: bajar saturación (0.8, 0.6, 0.4, 0.2)
    // El amarillo puro saturado no alcanza 4.5:1 contra crema en ningún L.
    // Bajar saturación lo convierte en ocre/ámbar, que sí cumple.
    for (const factor of [0.8, 0.6, 0.4, 0.2]) {
      best = searchBoth(original.s * factor);
      if (best) return best.hex;
    }

    // Último recurso: elegir entre negro o blanco el que dé más contraste
    const blackRatio = contrastRatio('#000000', paper);
    const whiteRatio = contrastRatio('#ffffff', paper);
    return blackRatio >= whiteRatio ? '#000000' : '#ffffff';
  } catch {
    try {
      const blackRatio = contrastRatio('#000000', paper);
      const whiteRatio = contrastRatio('#ffffff', paper);
      return blackRatio >= whiteRatio ? '#111111' : '#eeeeee';
    } catch {
      return '#111111';
    }
  }
}

function normalizeHighlightSyntax(text) {
  let value = String(text || '').trim();
  if (!value) return '';

  value = value
    .replace(/\{\{H\}\}/gi, '[H]')
    .replace(/\{\{\/H\}\}/gi, '[/H]')
    .replace(/\[h\]/g, '[H]')
    .replace(/\[\/h\]/g, '[/H]');

  let toggleOpen = true;
  value = value.replace(/\[H\]/g, () => {
    const token = toggleOpen ? '[H]' : '[/H]';
    toggleOpen = !toggleOpen;
    return token;
  });

  const openCount = (value.match(/\[H\]/g) || []).length;
  const closeCount = (value.match(/\[\/H\]/g) || []).length;

  if (openCount > closeCount) {
    value += '[/H]'.repeat(openCount - closeCount);
  }

  let extraClose = (value.match(/\[\/H\]/g) || []).length - (value.match(/\[H\]/g) || []).length;
  while (extraClose > 0) {
    const idx = value.lastIndexOf('[/H]');
    if (idx === -1) break;
    value = value.slice(0, idx) + value.slice(idx + 4);
    extraClose--;
  }

  return value.replace(/\[H\]\s*\[\/H\]/g, '').replace(/[ \t]{2,}/g, ' ').trim();
}

function cleanHighlightTokens(text) {
  return normalizeHighlightSyntax(text).replace(/\[H\]|\[\/H\]/gi, '');
}

function renderMarkerHTML(text) {
  return normalizeHighlightSyntax(text).replace(/\[H\]([\s\S]*?)\[\/H\]/gi, '<span class="marker-highlight">$1</span>');
}

const resetAllButtons = () => {
  document.querySelectorAll('.btn-action.is-opening').forEach(btn => {
    btn.classList.remove('is-opening');
    const span = btn.querySelector('span:not(.btn-emoji)');
    const emojiSpan = btn.querySelector('.btn-emoji');

const cleanupCardListeners = () => {
  const card = document.getElementById("tarjetaCard");
  
  // Remover event listeners
  if (visibilityHandler) {
    document.removeEventListener('visibilitychange', visibilityHandler);
    visibilityHandler = null;
  }
  if (pagehideHandler) {
    window.removeEventListener('pagehide', pagehideHandler);
    pagehideHandler = null;
  }
  if (cardClickHandler && card) {
    card.removeEventListener('click', cardClickHandler, true);
    cardClickHandler = null;
  }

  resetAllButtons();
};

  track('card_viewed', { book: libro.titulo });
};

// ══════════════════════════════════════════════════════════════════════════
// 🔍 MOTOR DE FILTRO TF-IDF NIVEL DIOS
// 
// Fundamento matemático:
// - TF (Term Frequency): qué tanto aparece una palabra en un libro
// - IDF (Inverse Document Frequency): qué tan rara es esa palabra en el catálogo
// - Score = Σ(TF × IDF) por cada palabra del query en cada libro
//
// Cero stopwords hardcodeadas. Cero palabras "basura". TODA palabra que el
// usuario escribe cuenta. Las palabras comunes (el, la, es, the, of) pesan
// poco AUTOMÁTICAMENTE porque aparecen en todos los libros (IDF bajo).
// Las palabras raras y significativas (Kasparov, dopamina, integridad,
// nada, vacío) pesan mucho porque aparecen en pocos libros (IDF alto).
//
// Costo: $0 · Latencia: <20ms para catálogo de 200 libros
// Escala: TF-IDF es el mismo algoritmo que usaba Google antes de la era de
// embeddings. Matemáticamente correcto de 1 libro a 10 millones.
// ══════════════════════════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════════════════
// 🌒 v10: Diccionario de sinónimos emocionales — expansión de query.
//
// 30 familias semánticas (estados emocionales, energía, relacionales, vitales).
// Reciprocidad matemática garantizada: si A→[B,C], entonces B→[A,C] y C→[A,B].
// 169 términos ES + 164 términos EN, ~5 sinónimos promedio cada uno.
//
// Aplicación en TrigguiFiltro:
//   - Token escrito por el usuario: peso 1.0 (gana siempre que matchea)
//   - Sinónimo expandido: peso 0.5 (rescata sin dominar)
//   - Si el usuario escribe DOS palabras del mismo cluster, ambas valen 1.0
//
// FALLBACK: si el idioma no está en el mapa o hay cualquier error,
// expandWithSynonyms devuelve solo los tokens originales — el filtro
// sigue funcionando idéntico al comportamiento previo. Cero riesgo.
// ══════════════════════════════════════════════════════════════════════════

const TrigguiFiltro = {
  // Cache del índice IDF. Se reconstruye cuando cambia el catálogo o el idioma.
  _idxCache: null,
  _idxCacheKey: null,

  normalize: function(s) {
    return String(s || '')
      .toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^\w\s]/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();
  },

  // Tokenización PURA: sin stopwords, sin listas de palabras "basura".
  // Solo descarta tokens de 1 carácter (ruido real) y números sueltos.
  tokenize: function(s) {
    return this.normalize(s)
      .split(' ')
      .filter(t => t.length >= 2 && !/^\d+$/.test(t));
  },

  // 🌒 v10: Expande tokens del usuario con sinónimos emocionales.
  // Devuelve array de {token, weight}.
  //   - Originales escritos por el usuario: peso 1.0 (gana siempre que matchea)
  //   - Sinónimos expandidos del diccionario: peso 0.5 (rescata sin dominar)
  // Defensa anti-doble-conteo: si el query ya incluye un sinónimo de otro
  // token, ese sinónimo cuenta como original (peso 1.0), nunca se duplica.
  // FALLBACK: si TRIGGUI_SYNONYMS no existe o el idioma no está en él,
  // devuelve solo los originales — el filtro funciona idéntico al previo.
  expandWithSynonyms: function(tokens) {
    try {
      const expanded = tokens.map(t => ({ token: t, weight: 1.0 }));
      if (typeof TRIGGUI_SYNONYMS === 'undefined') return expanded;
      const lang = (typeof TriggguiI18n !== 'undefined' && TriggguiI18n.lang) || 'es';
      const dict = TRIGGUI_SYNONYMS[lang];
      if (!dict) return expanded;
      const seen = new Set(tokens);
      for (const t of tokens) {
        const syns = dict[t];
        if (!Array.isArray(syns)) continue;
        for (const syn of syns) {
          if (seen.has(syn)) continue;
          expanded.push({ token: syn, weight: 0.5 });
          seen.add(syn);
        }
      }
      return expanded;
    } catch (_) {
      return tokens.map(t => ({ token: t, weight: 1.0 }));
    }
  },

  // Extrae el texto completo de un libro en 4 zonas con peso distinto.
  // Cada zona tiene un boost que refleja su importancia semántica:
  // - palabras clave del libro: las 4 palabras que el curador eligió (x5)
  // - título + autor: identidad del libro (x3)
  // - tarjeta + frases: contenido editorial (x1.5)
  // - tagline + dimension + punto: metadata contextual (x1)
  extractZones: function(libro) {
    const useEn = TriggguiI18n.lang === 'en';
    const titulo = useEn && libro.titulo_en ? libro.titulo_en : (libro.titulo || '');
    const palabras = useEn && Array.isArray(libro.palabras_en) ? libro.palabras_en : (libro.palabras || []);
    const frases = useEn && Array.isArray(libro.frases_en) ? libro.frases_en : (libro.frases || []);
    const tarjeta = useEn && libro.tarjeta_en ? libro.tarjeta_en : (libro.tarjeta || {});
    const nucleus = libro._nucleus && libro._nucleus.book_grounding_anchors;
    const anchors = nucleus ? (nucleus.concepts || []).concat(nucleus.key_terms || []) : [];
    return {
      palabras: [...palabras, ...anchors].join(' '),
      identidad: [titulo, libro.autor || ''].join(' '),
      editorial: [
        frases.join(' '),
        tarjeta.subtitulo || '',
        tarjeta.parrafoTop || '',
        tarjeta.parrafoBot || ''
      ].join(' '),
      contexto: [libro.tagline || '', libro.dimension || '', libro.punto || ''].join(' ')
    };
  },

  // Cuenta ocurrencias de cada término en un texto. Retorna { token: count }.
  termFrequency: function(text) {
    const tokens = this.tokenize(text);
    const tf = {};
    for (const t of tokens) tf[t] = (tf[t] || 0) + 1;
    return tf;
  },

  // Construye el índice IDF del catálogo completo.
  // IDF(término) = log(total_libros / libros_que_contienen_el_término)
  // Palabras en todos los libros → IDF cercano a 0 (descartadas naturalmente)
  // Palabras en 1 de N libros → IDF = log(N) (máximo peso)
  // 
  // También pre-computa los vectores TF ponderados de cada libro para scoring
  // rápido. Todo esto corre una sola vez cuando llega el contenido.json.
  buildIndex: function(libros) {
    const cacheKey = `${libros.length}_${TriggguiI18n.lang}`;
    if (this._idxCache && this._idxCacheKey === cacheKey) return this._idxCache;

    const N = libros.length;
    const docFreq = {};
    const bookVectors = [];

    const ZONE_WEIGHTS = { palabras: 5.0, identidad: 3.0, editorial: 1.5, contexto: 1.0 };

    // Primera pasada: calcular TF por libro y document frequency global
    for (const libro of libros) {
      const zones = this.extractZones(libro);
      const bookVec = {};
      const seenInThisBook = new Set();
      for (const zoneName of Object.keys(ZONE_WEIGHTS)) {
        const tf = this.termFrequency(zones[zoneName]);
        const w = ZONE_WEIGHTS[zoneName];
        for (const [term, count] of Object.entries(tf)) {
          bookVec[term] = (bookVec[term] || 0) + count * w;
          seenInThisBook.add(term);
        }
      }
      for (const term of seenInThisBook) {
        docFreq[term] = (docFreq[term] || 0) + 1;
      }
      bookVectors.push(bookVec);
    }

    // Segunda pasada: calcular IDF de cada término
    const idf = {};
    for (const [term, df] of Object.entries(docFreq)) {
      // Suavizado: log((N+1) / (df+1)) + 1 — evita IDF=0 y negativos
      idf[term] = Math.log((N + 1) / (df + 1)) + 1;
    }

    this._idxCacheKey = cacheKey;
    this._idxCache = { N, idf, bookVectors, docFreq };
    return this._idxCache;
  },

  // Cronoboost: ajuste sutil según hora/día, basado en tu marco cronobiológico.
  // No es arbitrario: cada franja horaria tiene un "punto Hawkins" afín.
  cronoBoost: function(libro) {
    const now = new Date();
    const hour = now.getHours();
    const day = now.getDay();
    let boost = 0;
    const punto = this.normalize(libro.punto || '');
    if (hour >= 5 && hour < 10) {
      if (punto.includes('cero') || punto.includes('creativo')) boost += 1.2;
    } else if (hour >= 10 && hour < 14) {
      if (punto.includes('activo') || punto.includes('maximo')) boost += 1.2;
    } else if (hour >= 14 && hour < 18) {
      if (punto.includes('activo')) boost += 0.8;
    } else if (hour >= 18 && hour < 22) {
      if (punto.includes('creativo') || punto.includes('cero')) boost += 0.8;
    } else {
      if (punto.includes('cero')) boost += 0.6;
    }
    if (day === 4 && punto.includes('maximo')) boost += 0.5;
    if ((day === 0 || day === 6) && punto.includes('cero')) boost += 0.4;
    return boost;
  },

  // Semilla pseudo-aleatoria derivada del día. Misma query el mismo día = mismo
  // libro. Al día siguiente puede rotar. Esto da sensación de "consejo del día"
  // consistente pero no repetitivo en el tiempo.
  daySeed: function(query) {
    const today = new Date().toDateString();
    const str = today + '|' + (query || '');
    let h = 5381;
    for (let i = 0; i < str.length; i++) h = ((h * 33) ^ str.charCodeAt(i)) >>> 0;
    return h;
  },

  // Selección determinística del top con semilla diaria
  seededPick: function(items, seed) {
    if (!items.length) return null;
    return items[seed % items.length];
  },

  // Función principal. Retorna { libro, index, score, reason }.
  // reason puede ser:
  //   'solo'  — solo hay 1 libro en el catálogo
  //   'empty' — query vacío o el usuario no escribió nada
  //   'match' — se encontró al menos un libro con score relevante
  //   'whisper' — ningún match claro; elige con semilla diaria del top
  filter: function(libros, query) {
    if (!libros || libros.length === 0) return null;
    if (libros.length === 1) {
      return { libro: libros[0], index: 0, score: 0, reason: 'solo' };
    }

    const q = String(query || '').trim();
    if (!q) {
      // Query vacío: elige con semilla diaria sobre todo el catálogo.
      // Esto da "libro del día" consistente si el usuario abre sin escribir.
      const seed = this.daySeed('');
      const idx = seed % libros.length;
      return { libro: libros[idx], index: idx, score: 0, reason: 'empty' };
    }

    const idx = this.buildIndex(libros);
    const queryTokens = this.tokenize(q);

    if (queryTokens.length === 0) {
      // El usuario escribió solo puntuación, emojis, o 1 carácter
      const seed = this.daySeed(q);
      const i = seed % libros.length;
      return { libro: libros[i], index: i, score: 0, reason: 'empty' };
    }

    // 🌒 v10: Expansión con sinónimos emocionales.
    // Originales: peso 1.0. Sinónimos del diccionario: peso 0.5.
    // El match parcial (subcadena) solo se aplica a originales — los sinónimos
    // ya son aproximaciones, no aproximamos sobre aproximaciones.
    const expandedTokens = this.expandWithSynonyms(queryTokens);

    // Scoring TF-IDF: por cada libro, score = Σ(token_tf_in_book × idf_of_token × weight)
    const scored = libros.map((libro, index) => {
      const bookVec = idx.bookVectors[index];
      let tfidfScore = 0;
      for (const { token, weight } of expandedTokens) {
        const tf = bookVec[token] || 0;
        if (tf === 0) {
          // Match parcial SOLO para originales (peso 1.0). Los sinónimos no
          // hacen match parcial — eso sería aproximación de aproximación = ruido.
          if (weight < 1.0) continue;
          for (const bookTerm of Object.keys(bookVec)) {
            if (bookTerm.length >= 4 && token.length >= 4) {
              if (bookTerm.includes(token) || token.includes(bookTerm)) {
                const partialTf = bookVec[bookTerm] * 0.5;
                tfidfScore += partialTf * (idx.idf[bookTerm] || 1) * weight;
                break;
              }
            }
          }
        } else {
          const termIdf = idx.idf[token] || 1;
          tfidfScore += tf * termIdf * weight;
        }
      }
      const crono = tfidfScore > 0 ? this.cronoBoost(libro) : 0;
      return { libro, index, score: tfidfScore + crono };
    });

    scored.sort((a, b) => b.score - a.score);

    const best = scored[0];
    if (best.score <= 0.01) {
      // Ningún libro matcheó nada del query. Usar semilla para dar consistencia
      // diaria sin parecer random puro. Top 3 con semilla para variedad sutil.
      const top3 = scored.slice(0, Math.min(3, scored.length));
      const seed = this.daySeed(q);
      const pick = top3[seed % top3.length];
      return { ...pick, reason: 'whisper' };
    }

    // Hay match real. Elegir del grupo con score >= 85% del mejor
    // para dar variedad sin perder precisión. Semilla diaria = consistencia.
    const topGroup = scored.filter(s => s.score >= best.score * 0.85).slice(0, 3);
    const seed = this.daySeed(q);
    const pick = topGroup[seed % topGroup.length];
    return { ...pick, reason: 'match' };
  }
};

// Segmenta una frase en [w1, w2, w3] con regla C.
// w3 es la ancla (1 palabra si ≤4 palabras totales, 2 si ≥5).
// La concatenación con espacios de las piezas no vacías = frase original.
BarraMagica.segmentQuestion = function(phrase) {
  try {
    const words = String(phrase).split(/\s+/).filter(w => w.length > 0);
    const n = words.length;
    if (n < 2) return ['', '', words.join(' ')];
    const anchorCount = n <= 4 ? 1 : 2;
    const w3 = words.slice(n - anchorCount).join(' ');
    const remaining = words.slice(0, n - anchorCount);
    if (remaining.length === 0) return ['', '', w3];
    if (remaining.length === 1) return [remaining[0], '', w3];
    return [remaining[0], remaining.slice(1).join(' '), w3];
  } catch (_) {
    return null;
  }
};

// Selecciona una variante aleatoria del idioma activo y la segmenta.
// Devuelve [w1, w2, w3] o null si algo falla (cae al fallback i18n).
BarraMagica.pickQuestion = function() {
  try {
    const lang = (TriggguiI18n && TriggguiI18n.lang) || 'es';
    const bank = BarraMagica.QUESTIONS[lang];
    if (!Array.isArray(bank) || bank.length === 0) return null;
    const phrase = bank[Math.floor(Math.random() * bank.length)];
    return BarraMagica.segmentQuestion(phrase);
  } catch (_) {
    return null;
  }
};

BarraMagica.applyStrings = function() {
  const qEl = document.getElementById('barraQuestion');
  const iEl = document.getElementById('barraInput');
  const sEl = document.getElementById('barraSkip');
  const eyEl = document.getElementById('barraEyebrow');
  const w1El = qEl ? qEl.querySelector('.bm-w1') : null;
  const w2El = qEl ? qEl.querySelector('.bm-w2') : null;
  const w3El = qEl ? qEl.querySelector('.bm-w3') : null;
  if (eyEl) eyEl.textContent = TriggguiI18n.get('barra.eyebrow');
  // 🌒 v10: pregunta rotatoria. Si pickQuestion falla, fallback al i18n original.
  const seg = BarraMagica.pickQuestion();
  if (seg && Array.isArray(seg) && seg.length === 3) {
    if (w1El) w1El.textContent = seg[0];
    if (w2El) w2El.textContent = seg[1];
    if (w3El) w3El.textContent = seg[2];
  } else {
    if (w1El) w1El.textContent = TriggguiI18n.get('barra.question.word1');
    if (w2El) w2El.textContent = TriggguiI18n.get('barra.question.word2');
    if (w3El) w3El.textContent = TriggguiI18n.get('barra.question.word3');
  }

  // 🌒 v9: Color rotatorio + 2 auroras cromáticas — todo del catálogo real.
  //
  // Derivado del día: misma fecha = mismos colores (consistencia del ritual).
  // Día siguiente = tres colores distintos (sorpresa del día).
  //
  // Garantiza 3 colores VISUALMENTE DISTINTOS tomando accents separados en el
  // espacio HSL (Δhue >= 60° entre pares). Sin esto, un catálogo con muchos
  // accents similares daría aurora monocromática aburrida.
  let accentColor = '#4A90E2';        // Fallback azul espacial (más padre que naranja)
  let aurora1 = 'rgba(40, 100, 220, 0.48)';
  let aurora2 = 'rgba(80, 230, 200, 0.42)';
  try {
    const data = window.__TRIGGUI_DATA__;
    if (data && Array.isArray(data.libros) && data.libros.length > 0) {
      const accents = data.libros
        .map(l => l && l.tarjeta && l.tarjeta.style && l.tarjeta.style.accent)
        .filter(c => typeof c === 'string' && /^#[0-9a-f]{3,8}$/i.test(c));
      if (accents.length > 0) {
        const today = new Date().toDateString();
        let h = 5381;
        for (let i = 0; i < today.length; i++) h = ((h * 33) ^ today.charCodeAt(i)) >>> 0;

        // Elegir accent principal (palabra "sientes")
        accentColor = accents[h % accents.length];

        // Para las auroras, buscar 2 accents con HUE distante del principal
        // y entre sí. Esto da contraste visual nivel dios.
        const mainHue = hexToHsl(accentColor).h;
        const candidates = accents
          .map(c => ({ color: c, hue: hexToHsl(c).h }))
          .filter(c => Math.abs(((c.hue - mainHue + 180) % 360) - 180) >= 50);

        if (candidates.length >= 2) {
          // Elegir 2 candidatos distintos entre sí con semilla del día
          const seed1 = (h ^ 0x9e3779b9) >>> 0;
          const seed2 = (h ^ 0x85ebca6b) >>> 0;
          const c1 = candidates[seed1 % candidates.length];
          let c2 = candidates[seed2 % candidates.length];
          // Si por semilla cayó el mismo, tomar el siguiente
          if (c2.color === c1.color && candidates.length > 1) {
            c2 = candidates[(seed2 + 1) % candidates.length];
          }
          aurora1 = hexToRgba(c1.color, 0.48);
          aurora2 = hexToRgba(c2.color, 0.42);
        } else if (accents.length >= 2) {
          // Fallback: si no hay candidatos distantes, usar 2 accents aleatorios
          const seed1 = (h ^ 0x9e3779b9) >>> 0;
          const seed2 = (h ^ 0x85ebca6b) >>> 0;
          let idx1 = seed1 % accents.length;
          let idx2 = seed2 % accents.length;
          if (idx1 === idx2) idx2 = (idx2 + 1) % accents.length;
          aurora1 = hexToRgba(accents[idx1], 0.48);
          aurora2 = hexToRgba(accents[idx2], 0.42);
        }
      }
    }
  } catch(_) {}
  const overlay = document.getElementById('barraMagicaOverlay');
  if (overlay) {
    overlay.style.setProperty('--bm-accent', accentColor);
    overlay.style.setProperty('--bm-aurora-1', aurora1);
    overlay.style.setProperty('--bm-aurora-2', aurora2);
  }

  // Placeholder contextual: elige basado en comportamiento del usuario
  if (iEl) {
    const books = getLocal('books_opened', 0);
    const dow = new Date().getDay();
    let phKey = 'barra.placeholder.default';
    if (books >= 10) phKey = 'barra.placeholder.ritual';
    else if (dow === 0) phKey = 'barra.placeholder.sunday';
    else if (books >= 5) phKey = 'barra.placeholder.returning';
    iEl.placeholder = TriggguiI18n.get(phKey);
  }
  if (sEl) {
    const sInner = sEl.querySelector('.bm-skip-inner');
    if (sInner) sInner.textContent = TriggguiI18n.get('barra.skip');
    else sEl.textContent = TriggguiI18n.get('barra.skip');
  }
  const microEl = document.getElementById('barraMicro');
  if (microEl && window.__TRIGGUI_DATA__ && window.__TRIGGUI_DATA__.libros) {
    const key = this.getMicroCopyKey(window.__TRIGGUI_DATA__.libros.length);
    microEl.innerHTML = TriggguiI18n.get(key);
  }
  // Racha (solo si >= 2, no mostramos si es la primera visita)
  const streakEl = document.getElementById('barraStreak');
  const streakNumEl = document.getElementById('barraStreakNum');
  const streakUnitEl = document.getElementById('barraStreakUnit');
  if (streakEl && streakNumEl) {
    const streak = getLocal('streak', 0);
    if (streak >= 2) {
      streakNumEl.textContent = String(streak);
      if (streakUnitEl) {
        const unitKey = streak === 1 ? 'barra.streak.day' : 'barra.streak.days';
        streakUnitEl.textContent = TriggguiI18n.get(unitKey);
      }
      streakEl.classList.add('visible');
    } else {
      streakEl.classList.remove('visible');
    }
  }
  const esEl = document.getElementById('langToggleEs');
  const enEl = document.getElementById('langToggleEn');
  if (esEl && enEl) {
    if (TriggguiI18n.lang === 'en') { esEl.className = 'lang-inactive'; enEl.className = 'lang-active'; }
    else { esEl.className = 'lang-active'; enEl.className = 'lang-inactive'; }
  }
};
BarraMagica.openOverlay = function(force) {
  if (!force && !this.shouldShowToday()) return false;
  const overlay = document.getElementById('barraMagicaOverlay');
  if (!overlay) return false;

  // 🌒 v12: Apertura cinematográfica nivel dios.
  //
  // Regla matemática: el gate (html.booting, body.booting) debe estar activo
  // durante TODO el fade-in del overlay. Sin gate, los bloques son visibles
  // detrás del overlay semi-transparente — exactamente el flash que el usuario
  // reportó.
  //
  // Secuencia exacta:
  //   1. Aplicar gate AL INSTANTE (si no estaba) → bloques visibility:hidden
  //   2. applyStrings pinta strings/colores
  //   3. Pre-mount overlay opacity:0 con transition:none (no animar el display)
  //   4. Doble rAF para garantizar que el CSS aplicó
  //   5. Enable transition + opacity:1 → fade-in 450ms
  //   6. transitionend dispara → remover gate (solo cuando opacity === 1)

  // Gate INMEDIATO — antes de cualquier otra cosa
  document.documentElement.classList.add('booting');
  document.body.classList.add('booting');

  this.applyStrings();

  overlay.style.display = 'flex';
  overlay.style.opacity = '0';
  overlay.style.transition = 'none';
  overlay.style.pointerEvents = ''; // 🌒 v11: restaurar por si cerró con pointer-events:none
  void overlay.offsetWidth; // reflow

  const lupa = document.getElementById('barraLupaBtn');
  if (lupa) lupa.classList.remove('visible');

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      // Listener que remueve el gate SOLO cuando opacity llegue a 1
      const onFadeInDone = (e) => {
        if (e.propertyName !== 'opacity') return;
        overlay.removeEventListener('transitionend', onFadeInDone);
        document.body.classList.remove('booting');
        document.documentElement.classList.remove('booting');
      };
      overlay.addEventListener('transitionend', onFadeInDone);
      // Fallback 500ms (por si transitionend no dispara)
      setTimeout(() => {
        overlay.removeEventListener('transitionend', onFadeInDone);
        document.body.classList.remove('booting');
        document.documentElement.classList.remove('booting');
      }, 500);

      overlay.style.transition = 'opacity 450ms cubic-bezier(0.25, 0.1, 0.25, 1)';
      overlay.style.opacity = '1';
      overlay.classList.add('visible');

      setTimeout(() => {
        const inp = document.getElementById('barraInput');
        if (inp && !('ontouchstart' in window)) inp.focus();
      }, 500);
    });
  });

  track('barra_opened', { force: !!force, lang: TriggguiI18n.lang });
  return true;
};
BarraMagica.closeOverlay = function(skipped, skipRender) {
  const overlay = document.getElementById('barraMagicaOverlay');
  if (!overlay) return;

  this._clearSubmitTimers && this._clearSubmitTimers();

  // 🌒 v12: Si venimos de requestNewBook(), body.booting está activo.
  // Hay que removerlo ANTES de que el overlay se desvanezca, así los
  // bloques nuevos aparecen limpios (sin el gate de visibility:hidden).
  // Los bloques YA están renderizados debajo del overlay (por requestNewBook
  // o por BarraMagica.submit), así que removerlos del gate los vuelve
  // visibles al mismo tiempo que el overlay desaparece.
  document.documentElement.classList.remove('booting');
  document.body.classList.remove('booting');

  // 🌒 v11: CRÍTICO — quitar pointer-events DEL INSTANTE que inicia el fade-out.
  overlay.style.pointerEvents = 'none';

  // Transición cinematográfica: overlay se desvanece en 650ms
  overlay.style.transition = 'opacity 650ms cubic-bezier(0.33, 1, 0.68, 1)';
  overlay.style.opacity = '0';
  overlay.classList.remove('visible');

  setTimeout(() => {
    overlay.style.display = 'none';
    overlay.style.transition = '';
    overlay.style.pointerEvents = ''; // restaurar para próxima apertura
    // Reset visual para próxima apertura
    const submitBtn = document.getElementById('barraSubmit');
    const inputEl = document.getElementById('barraInput');
    const skipEl = document.getElementById('barraSkip');
    const microEl = document.getElementById('barraMicro');
    const questionEl = document.getElementById('barraQuestion');
    if (submitBtn) submitBtn.disabled = false;
    if (inputEl) inputEl.value = '';
    if (skipEl) skipEl.style.opacity = '';
    if (microEl) { microEl.style.opacity = ''; }
    if (questionEl) {
      questionEl.style.opacity = '';
      questionEl.style.transform = '';
    }
    overlay.style.opacity = '';
  }, 700);
  this.markShownToday();
  if (revealed) {
    const lupa = document.getElementById('barraLupaBtn');
    if (lupa) lupa.classList.add('visible');
  }
  track('barra_closed', { skipped: !!skipped });
};
// 🌒 v8: tokens de submit para evitar que timeouts viejos ejecuten callbacks
// cuando el usuario cierra/abre la barra rápido, o re-submite.
// Cada llamada a submit() incrementa el token; los setTimeout verifican que
// el token no haya cambiado antes de hacer su trabajo.
BarraMagica._submitToken = 0;
BarraMagica._submitTimers = [];

BarraMagica._clearSubmitTimers = function() {
  while (this._submitTimers.length) {
    clearTimeout(this._submitTimers.pop());
  }
};

BarraMagica.submit = function(query) {
  // 🌒 v10: Nueva arquitectura del submit — simple, robusta, sin bugs.
  //
  // Problema del v9: token se incrementaba en closeOverlay Y en submit,
  // creando condiciones de carrera donde algunos timers se invalidaban
  // a sí mismos. Además, inputEl.blur() en mobile cortaba la cadena de
  // eventos táctiles y hacía que "nada pasara" al presionar enter.
  //
  // v10:
  //   - Token solo se incrementa en submit() (invalidar submits anteriores).
  //   - closeOverlay NO incrementa el token (solo limpia timers).
  //   - No blur() del input en mobile (blur puede suceder natural al cerrar).
  //   - No disabled del botón (ya hay debounce en doSubmit).
  const myToken = ++this._submitToken;
  this._clearSubmitTimers();

  const data = window.__TRIGGUI_DATA__;
  if (!data || !data.libros || data.libros.length === 0) {
    // Sin data no podemos elegir libro — cerrar la barra limpiamente
    this.closeOverlay(true);
    return;
  }
  const q = String(query || '').trim();

  let result;
  try {
    result = TrigguiFiltro.filter(data.libros, q);
  } catch (err) {
    console.error('[Triggui] filter error:', err);
    result = null;
  }

  if (q) {
    try {
      const hist = getLocal('queries_history', []);
      hist.push({ q: q.slice(0, 140), t: Date.now(), lang: TriggguiI18n.lang, dow: new Date().getDay(), hour: new Date().getHours() });
      saveLocal('queries_history', hist.slice(-50));
    } catch(_) {}
    track('barra_query', { len: q.length, lang: TriggguiI18n.lang, reason: result?.reason || 'none', dow: new Date().getDay(), hour: new Date().getHours() });
  } else {
    track('barra_skipped');
  }
  if (result && result.libro) {
    libro = result.libro;
    try { sessionStorage.setItem('lastLibroIdx', String(result.index)); } catch(_) {}
  }

  // 🎨 Breathing moment elegante antes del reveal
  // Solo visual — NO blur() del input (puede cortar eventos táctiles)
  const skipEl = document.getElementById('barraSkip');
  const microEl = document.getElementById('barraMicro');
  const questionEl = document.getElementById('barraQuestion');
  if (skipEl) skipEl.style.opacity = '0.3';
  if (microEl) {
    microEl.style.transition = 'opacity 0.4s ease';
    microEl.style.opacity = '1';
    microEl.textContent = TriggguiI18n.get('barra.loading');
  }
  if (questionEl) {
    questionEl.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
    questionEl.style.opacity = '0.35';
    questionEl.style.transform = 'scale(0.96)';
  }

  const self = this;

  // Paso 2: Construir los 4 bloques DEBAJO (invisibles aún, overlay los cubre)
  this._submitTimers.push(setTimeout(() => {
    if (myToken !== self._submitToken) return; // submit fue cancelado
    self.markShownToday();
    try { render(); } catch(e) { console.error('[Triggui] render error:', e); }
    try { updateBadge(); } catch(_) {}
  }, 300));

  // Paso 3: Fade-out del overlay, revelando los bloques ya construidos
  this._submitTimers.push(setTimeout(() => {
    if (myToken !== self._submitToken) return;
    self.closeOverlay(!q, /*skipRender=*/ true);
  }, 900));

  // Paso 4: First-visit hint si aplica
  if (!getLocal('has_visited')) {
    this._submitTimers.push(setTimeout(() => {
      // No checar token aquí — el first-visit es cosmético y queremos que
      // corra independiente de submits posteriores.
      try {
        document.querySelectorAll('.block').forEach(b => b.classList.add('first-visit-hint'));
        saveLocal('has_visited', true);
      } catch(_) {}
    }, 1600));
  }
};

// ══════════════════════════════════════════════════════════════════════════
// 🎯 Wiring de eventos de la barra mágica
// ══════════════════════════════════════════════════════════════════════════
// 🌒 v10: wireBarraMagicaEvents IDEMPOTENTE.
// Si se llama dos veces, la segunda es un no-op. Esto previene el bug donde
// los mismos listeners se registran varias veces y el submit se ejecuta
// múltiples veces en cadena.
//
// Se marca con _wired=true en la primera invocación exitosa.
let __trigguiEventsWired = false;

function wireBarraMagicaEvents() {
  if (__trigguiEventsWired) return; // ya wireado, no re-registrar listeners

  const input = document.getElementById('barraInput');
  const submit = document.getElementById('barraSubmit');
  const skip = document.getElementById('barraSkip');
  const langToggle = document.getElementById('barraLangToggle');
  const lupa = document.getElementById('barraLupaBtn');

  if (input && submit) {
    // 🌒 v10: doSubmit SIEMPRE dispara, con fallback robusto.
    // NO usamos submit.disabled para prevenir doble click, porque:
    //   - en iOS/Android WebView, disabled tras click del botón puede perder
    //     el focus del input y rompe la cadena de eventos táctiles.
    //   - mejor: flag local + markShownToday/closeOverlay hacen idempotente
    //     a BarraMagica.submit.
    // En vez de disabled, usamos un lock de 600ms sobre la función.
    let lastSubmitTime = 0;
    const doSubmit = () => {
      const now = Date.now();
      if (now - lastSubmitTime < 600) return; // debounce
      lastSubmitTime = now;
      const q = input.value;
      try {
        BarraMagica.submit(q);
      } catch (err) {
        console.error('[Triggui] BarraMagica.submit error:', err);
      }
    };
    submit.addEventListener('click', doSubmit);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        doSubmit();
      }
    });
    // En iOS y Android WebView, a veces el evento form submit es más fiable
    // que keydown. No hay <form> pero podemos aprovechar el enterkeyhint.
  }
  if (skip) {
    skip.addEventListener('click', () => {
      try { BarraMagica.submit(''); } catch(e) { console.error('[Triggui] skip error:', e); }
    });
  }
  if (langToggle) {
    langToggle.addEventListener('click', () => {
      const newLang = TriggguiI18n.lang === 'en' ? 'es' : 'en';
      TriggguiI18n.setLang(newLang);
      BarraMagica.applyStrings();
      const toast = document.getElementById('toast');
      if (toast) {
        toast.textContent = TriggguiI18n.get('toast.langChanged.' + newLang);
        toast.classList.add('visible');
        setTimeout(() => toast.classList.remove('visible'), 2000);
      }
      try {
        const overlay = document.getElementById('barraMagicaOverlay');
        if (!overlay || !overlay.classList.contains('visible')) {
          if (libro) { render(); updateBadge(); }
        }
      } catch(_) {}
    });
  }
  if (lupa) {
    lupa.addEventListener('click', () => { BarraMagica.openOverlay(true); });
  }

  // 🌒 v14: Remover clase .bm-first-appear del langToggle tras la animación.
  // Durante los primeros 2.7s (1.7s delay + 1s duration) el langToggle hace
  // su entrada con fade-up. Después, se remueve la clase para que el elemento
  // tenga opacity:1 estable (del CSS base). Así, al re-abrir la barra por
  // lupa/requestNewBook, el elemento YA está en opacity:1 sin depender de
  // ninguna animación.
  const langToggleEl = document.getElementById('barraLangToggle');
  if (langToggleEl && langToggleEl.classList.contains('bm-first-appear')) {
    setTimeout(() => {
      langToggleEl.classList.remove('bm-first-appear');
    }, 2800);
  }

  __trigguiEventsWired = true;
}

// ══════════════════════════════════════════════════════════════════════════
// 🌒 v8 — INIT NIVEL DIOS
// Contrato: el usuario NUNCA ve pantalla negra infinita.
// Rutas de fallo manejadas:
//   1. Timeout de red (>10s)         → mensaje + reintento
//   2. Error HTTP (404, 500)          → mensaje + reintento
//   3. JSON corrupto en CDN           → mensaje + reintento
//   4. Catálogo vacío (libros=[])     → mensaje "Preparando catálogo"
//   5. localStorage quotaExceeded     → continúa (la app funciona sin persistir)
//   6. renderizado inicial tira       → catch externo deja app usable
// ══════════════════════════════════════════════════════════════════════════

// Mensaje visible si algo falla antes de tener catálogo. No depende del DOM
// principal; se inyecta en <body>. Reemplazable por retry().
function showLoadingOrError(state, opts) {
  opts = opts || {};
  // Remover cualquier mensaje previo
  const prev = document.getElementById('trigguiBootMsg');
  if (prev) prev.remove();
  if (state === 'hide') return;

  const isEn = (typeof TriggguiI18n !== 'undefined' && TriggguiI18n.lang === 'en');
  const copy = {
    loading: isEn ? 'Loading your catalog…' : 'Cargando tu catálogo…',
    preparing: isEn
      ? 'Triggui is preparing fresh books. Come back in a few minutes.'
      : 'Triggui está preparando libros nuevos. Vuelve en unos minutos.',
    netError: isEn
      ? 'Network issue. Tap to try again.'
      : 'Problema de red. Toca para reintentar.',
    retryLabel: isEn ? 'Try again' : 'Reintentar'
  };

  let title, action;
  if (state === 'loading') {
    title = copy.loading;
    action = null;
  } else if (state === 'empty_catalog') {
    title = copy.preparing;
    action = null;
  } else {
    title = copy.netError;
    action = copy.retryLabel;
  }

  const wrap = document.createElement('div');
  wrap.id = 'trigguiBootMsg';
  wrap.setAttribute('role', 'status');
  wrap.setAttribute('aria-live', 'polite');
  wrap.style.cssText = [
    'position:fixed',
    'top:50%',
    'left:50%',
    'transform:translate(-50%,-50%)',
    'max-width:300px',
    'padding:22px 26px',
    'background:rgba(20,24,38,0.92)',
    'border:1px solid rgba(255,0,85,0.22)',
    'border-radius:22px',
    'color:#fff',
    'font-family:Archivo,sans-serif',
    'font-size:15px',
    'line-height:1.4',
    'text-align:center',
    'z-index:200',
    'backdrop-filter:blur(8px)',
    '-webkit-backdrop-filter:blur(8px)',
    'box-shadow:0 10px 40px rgba(0,0,0,0.5)'
  ].join(';');

  const t = document.createElement('div');
  t.textContent = title;
  t.style.cssText = 'opacity:0.92;margin-bottom:' + (action ? '14px' : '0');
  wrap.appendChild(t);

  if (action && opts.onRetry) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.textContent = action;
    btn.style.cssText = [
      'margin-top:4px',
      'padding:10px 20px',
      'background:linear-gradient(90deg,#FF5E00,#FF0055)',
      'border:0',
      'border-radius:999px',
      'color:#fff',
      'font-family:Archivo,sans-serif',
      'font-weight:600',
      'font-size:14px',
      'cursor:pointer',
      'letter-spacing:0.2px'
    ].join(';');
    btn.addEventListener('click', () => {
      showLoadingOrError('loading');
      opts.onRetry();
    });
    wrap.appendChild(btn);
  }

  if (state === 'loading') {
    const dot = document.createElement('div');
    dot.style.cssText = 'margin-top:12px;width:6px;height:6px;border-radius:50%;background:#FF5E00;margin-left:auto;margin-right:auto;animation:trigguiBootPulse 1.2s ease-in-out infinite;';
    wrap.appendChild(dot);
    // Keyframes inyectados solo si no existen
    if (!document.getElementById('trigguiBootKeyframes')) {
      const s = document.createElement('style');
      s.id = 'trigguiBootKeyframes';
      s.textContent = '@keyframes trigguiBootPulse{0%,100%{opacity:0.3;transform:scale(0.85)}50%{opacity:1;transform:scale(1.1)}}';
      document.head.appendChild(s);
    }
  }

  document.body.appendChild(wrap);
}

// Fetch con timeout duro + retry con backoff exponencial.
// No confía en el default del browser (30-60s). 10s max por intento.
async function fetchWithTimeout(url, timeoutMs) {
  timeoutMs = timeoutMs || 10000;
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), timeoutMs);
  try {
    const res = await fetch(url, { signal: ctrl.signal, cache: 'no-store' });
    clearTimeout(timer);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res;
  } catch (err) {
    clearTimeout(timer);
    throw err;
  }
}

async function loadCatalogWithRetry(maxAttempts) {
  maxAttempts = maxAttempts || 3;
  const url = "https://raw.githubusercontent.com/badirnakid/triggui-content/main/contenido.json?ts=" + Date.now();
  let lastErr;
  for (let attempt = 1; attempt <= maxAttempts; attempt++) {
    try {
      const r = await fetchWithTimeout(url, 10000);
      const text = await r.text();
      // .trim() tolera BOM UTF-8 (U+FEFF es whitespace)
      const clean = text.trim();
      if (!clean) throw new Error('empty_response');
      const data = JSON.parse(clean);
      if (!data || !Array.isArray(data.libros)) throw new Error('invalid_shape');
      return data;
    } catch (err) {
      lastErr = err;
      console.warn('[Triggui] intento ' + attempt + '/' + maxAttempts + ' falló:', err.message);
      if (attempt < maxAttempts) {
        // Backoff: 1s, 2s (no total >3s para no frustrar al usuario)
        await new Promise(r => setTimeout(r, 1000 * attempt));
      }
    }
  }
  throw lastErr || new Error('unknown');
}

// INIT
function isWebView(){ const ua=navigator.userAgent||navigator.vendor||window.opera; return (/wv/i.test(ua)||/WebView/i.test(ua)||(ua.includes("Android")&&ua.includes("Version/"))||(ua.includes("iPhone")&&!ua.includes("Safari"))); }
if(isWebView()) document.body.classList.add("webview");

function pickLibroNoRepetido(libros){
  let last=sessionStorage.getItem("lastLibroIdx"); if(last!==null)last=parseInt(last);
  let idx=Math.floor(Math.random()*libros.length);
  if(idx===last){ idx=Math.floor(Math.random()*libros.length); if(idx===last)idx=(idx+1)%libros.length; }
  sessionStorage.setItem("lastLibroIdx", idx); return idx;
}

// Estado compartido del boot: no declaramos variables globales adicionales,
// usamos una closure que la IIFE captura.
async function bootTriggui() {
  // 🌒 v10: LO PRIMERO QUE SE VE ES LA BARRA MÁGICA. PUNTO.
  //
  // 1. body.booting está activo desde ANTES del DOMContentLoaded (boot-gate script).
  //    CSS oculta: .intro, .block, #likeBtnTarjeta, #barraLupaBtn, .card-reveal-trigger.
  // 2. Solo el overlay de la barra mágica puede ser visible durante esta fase.
  // 3. Pre-montamos el overlay en opacity:0, display:flex desde ya (cubre cualquier
  //    render() que pase por detrás).
  // 4. Cuando el overlay está TOTALMENTE listo (strings, colores, fade-in iniciado),
  //    removemos body.booting. Cualquier otro elemento que el JS haya tocado
  //    (intro, bloques) sigue invisible hasta que se necesiten (al cerrar la barra).

  const overlay = document.getElementById('barraMagicaOverlay');
  if (overlay) {
    overlay.style.display = 'flex';
    overlay.style.opacity = '0';
    overlay.style.transition = 'none';
    // Forzar reflow antes de habilitar la transición
    void overlay.offsetWidth;
  }

  // 🌒 v10: CANCELAR la animación del .intro — en el HTML original entra
  // automáticamente con animation:introIn. Como ya tenemos la barra mágica
  // como la primera pantalla, la intro NO debe verse nunca al boot.
  // La escondemos y anulamos su animación para que no consuma ciclos.
  const introEl = document.getElementById('intro');
  if (introEl) {
    introEl.style.display = 'none';
    introEl.style.animation = 'none';
  }

  try {
    const data = await loadCatalogWithRetry(3);
    window.__TRIGGUI_DATA__ = data;
    wireBarraMagicaEvents();

    // Catálogo vacío: la app está lista pero no hay nada que mostrar.
    if (!data.libros || data.libros.length === 0) {
      console.warn('[Triggui] catálogo vacío');
      if (overlay) overlay.style.display = 'none';
      document.body.classList.remove('booting'); document.documentElement.classList.remove('booting');
      showLoadingOrError('empty_catalog');
      track('empty_catalog_seen', { lang: TriggguiI18n.lang });
      try { updateBadge(); } catch(_) {}
      try { refreshGlobalCounter(); } catch(_) {}
      return;
    }

    // Elegir libro y pre-renderizar bloques MIENTRAS body.booting los oculta
    libro = data.libros[pickLibroNoRepetido(data.libros)];
    render();
    updateBadge();
    refreshGlobalCounter();

    // Aplicar strings (pinta la pregunta con el accent del día)
    BarraMagica.applyStrings();

    // ═══ APERTURA CINEMATOGRÁFICA v10 ═══
    // Secuencia exacta:
    //   1. overlay opacity:0 ya está montado con display:flex
    //   2. Doble rAF para garantizar que TODO está pintado (aurora, accent, strings)
    //   3. Habilitar transition y subir opacity a 1
    //   4. AL MISMO TIEMPO remover body.booting (los bloques ocultos debajo
    //      se vuelven "visibles" pero el overlay a 100% los tapa totalmente)
    //   5. El usuario SOLO ve: negro → barra mágica entra suavemente
    // 🌒 v12: remover gate DESPUÉS de que el overlay esté al 100% de opacity.
    // Antes se removía al INSTANTE del fade-in, lo que creaba una ventana de
    // 50-400ms donde el overlay estaba semi-transparente y los bloques eran
    // visibles detrás. Ahora usamos transitionend para matemática exacta.
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        if (overlay) {
          // Listener que remueve el gate SOLO cuando opacity llegue a 1
          const onFadeInDone = (e) => {
            if (e.propertyName !== 'opacity') return;
            overlay.removeEventListener('transitionend', onFadeInDone);
            document.body.classList.remove('booting');
            document.documentElement.classList.remove('booting');
          };
          overlay.addEventListener('transitionend', onFadeInDone);
          // Fallback de seguridad: si transitionend no dispara (navegador raro,
          // animaciones deshabilitadas por OS), removemos el gate tras 500ms.
          setTimeout(() => {
            overlay.removeEventListener('transitionend', onFadeInDone);
            document.body.classList.remove('booting');
            document.documentElement.classList.remove('booting');
          }, 500);

          overlay.style.transition = 'opacity 450ms cubic-bezier(0.25, 0.1, 0.25, 1)';
          overlay.style.opacity = '1';
          overlay.classList.add('visible');
        } else {
          // Sin overlay → remover gate de inmediato (caso degradado)
          document.body.classList.remove('booting');
          document.documentElement.classList.remove('booting');
        }
        // Focus al terminar la transición (solo desktop)
        setTimeout(() => {
          const inp = document.getElementById('barraInput');
          if (inp && !('ontouchstart' in window)) inp.focus();
        }, 500);
      });
    });

    // Tracking
    track('barra_opened', { force: true, lang: TriggguiI18n.lang });
    track('app_loaded', { streak: getLocal('streak',0), books: getLocal('books_opened',0), lang: TriggguiI18n.lang });

    if (!getLocal('has_visited')) {
      setTimeout(() => {
        document.querySelectorAll('.block').forEach(b => b.classList.add('first-visit-hint'));
        saveLocal('has_visited', true);
      }, 100);
    }
  } catch (err) {
    console.error('[Triggui] init error:', err);
    track('boot_error', { message: String(err && err.message || err).slice(0, 80) });
    // NO re-wire aquí — ya se hizo arriba. Re-wiring causa dobles listeners.
    if (overlay) overlay.style.display = 'none';
    document.body.classList.remove('booting'); document.documentElement.classList.remove('booting');
    showLoadingOrError('network_error', { onRetry: bootTriggui });
  }
}

bootTriggui();
</script>

<script id="js-react-native-bridge">
  const signalFirstPaint = () => { requestAnimationFrame(() => { try { window.ReactNativeWebView?.postMessage("FIRST_PAINT"); } catch (_) {} }); };
  if (document.readyState === "interactive" || document.readyState === "complete") { signalFirstPaint(); } else { document.addEventListener("DOMContentLoaded", signalFirstPaint, { once: true }); }
</script>
