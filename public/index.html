      'voy','vas','va','vamos','van','iba','iban',
      'pero','como','cómo','cuando','cuándo','porque','porqué','aunque',
      'más','menos','muy','mucho','mucha','muchos','muchas','poco','poca','pocos','pocas',
      'todo','toda','todos','todas','algo','alguien','nada','nadie',
      'a','con','sin','por','para','sobre','entre','hasta','desde','contra',
      'también','tampoco','solo','sólo','siempre','nunca','jamás',
      // Inglés
      'not','yes','the','an','of','to','in','on','at','for',
      'and','or','but','if','then','than','so','as','because','though',
      'i','you','he','she','it','we','they','him','her','us','them',
      'your','his','its','our','their','that','these','those',
      'can','could','will','would','should','may','might','must','shall',
      'am','are','was','were','be','being','been',
      'have','has','had','having','do','does','did','doing','done',
      'want','need','feel','think','know','make','get','take','give',
      'when','where','why','how','what','which','who','whom','whose',
      'more','less','very','much','little','few','any','all','none',
      'here','there','everywhere','somewhere','anywhere','nowhere',
      'too','also','either','neither','both','each','every'
    ]);

    // Tokens del usuario filtrados de stopwords y de palabras <3 chars
    const userTokensFiltered = queryTokens.filter(t =>
      t.length >= 3 && !STOPWORDS_QUANTUM.has(t)
    );

    // Setear para pickPhrase() (matching semántico del bocado/eco)
    this._lastQueryTokens = userTokensFiltered.slice();

    // ════════════════════════════════════════════════════════════════════
    // V15 SPRINT B FASE 1 — setear hooks globales
    // Doctrina cuántica: si usuario menciona punto explícito → ese gana sobre hora
    // ════════════════════════════════════════════════════════════════════
    try {
      var _analysis = analyzeInput(userTokensFiltered);
      var _ciclo = inferPuntoCiclo();
      // Punto final: input gana sobre hora si hay detección clara del usuario
      var _puntoFinal = _analysis.punto_inferido || _ciclo.punto;
      var _puntoLabelFinal = _analysis.punto_label_en || _ciclo.label_en;

      window.__TRIGGUI_QUERY_HAWKINS__ = _analysis.hawkins_current;
      window.__TRIGGUI_QUERY_HAWKINS_TARGET__ = _analysis.hawkins_target;
      window.__TRIGGUI_QUERY_PILARES__ = _analysis.pilares;
      window.__TRIGGUI_PUNTO_CICLO__ = _puntoFinal;
      window.__TRIGGUI_PUNTO_LABEL_EN__ = _puntoLabelFinal;
      window.__TRIGGUI_PUNTO_SOURCE__ = _analysis.punto_inferido ? 'input' : 'hora';
      window.__TRIGGUI_ENERGIA__ = _ciclo.energia;
    } catch (_eAnalysis) {
      // Degradación graceful: si análisis falla, limpiar hooks
      console.warn('[Sprint B Fase 1] análisis falló:', _eAnalysis.message);
      window.__TRIGGUI_QUERY_HAWKINS__ = null;
      window.__TRIGGUI_QUERY_HAWKINS_TARGET__ = null;
      window.__TRIGGUI_QUERY_PILARES__ = [];
      window.__TRIGGUI_PUNTO_CICLO__ = null;
      window.__TRIGGUI_PUNTO_LABEL_EN__ = null;
      window.__TRIGGUI_PUNTO_SOURCE__ = null;
      window.__TRIGGUI_ENERGIA__ = null;
    }


    // Si después del filtro no quedan tokens, semilla diaria
    if (userTokensFiltered.length === 0) {
      const seed = this.daySeed(q);
      const i = seed % libros.length;
      return { libro: libros[i], index: i, score: 0, reason: 'empty' };
    }

    // ════════════════════════════════════════════════════════════════════
    // CAMINO 1 — CSAL MATCHING (preferido cuando los libros tienen _csal)
    // ════════════════════════════════════════════════════════════════════
    const csalIdx = this.buildCSALIndex(libros, TriggguiI18n.lang);
    const csalCoverage = csalIdx.coverageCount / csalIdx.total;

    // Si al menos 30% del catálogo tiene CSAL, intentamos primero por CSAL.
    // Threshold conservador: con catálogo regenerado desde cero será 100%.
    if (csalCoverage >= 0.30) {
      const csalScores = libros.map((libro, index) => {
        const bookData = csalIdx.perBook[index];
        const csalScore = this.scoreCSAL(userTokensFiltered, bookData);
        return { libro, index, csalScore };
      });

      // Normalizar al máximo del batch para que el peso 0-1 sea consistente
      let maxCSAL = 0;
      for (const r of csalScores) if (r.csalScore > maxCSAL) maxCSAL = r.csalScore;

      // Si hay match real CSAL (max > umbral), usar camino CSAL puro
      if (maxCSAL > 0.5) {
        const idx = this.buildIndex(libros);

        // PASS 2 con CSAL: combinar CSAL (85%) + TF-IDF (10%) + crono (5%)
        const expandedTokens = this.expandWithSynonyms(queryTokens);
        const tfidfRawByBook = libros.map((libro, index) => {
          const bookVec = idx.bookVectors[index];
          let tfidfRaw = 0;
          for (const { token, weight } of expandedTokens) {
            if (token.length < 3 || STOPWORDS_QUANTUM.has(token)) continue;
            const tf = bookVec[token] || 0;
            if (tf === 0) {
              if (weight < 1.0) continue;
              for (const bookTerm of Object.keys(bookVec)) {
                if (bookTerm.length >= 4 && token.length >= 4) {
                  if (bookTerm.includes(token) || token.includes(bookTerm)) {
                    const partialTf = bookVec[bookTerm] * 0.5;
                    tfidfRaw += partialTf * (idx.idf[bookTerm] || 1) * weight;
                    break;
                  }
                }
              }
            } else {
              const termIdf = idx.idf[token] || 1;
              tfidfRaw += tf * termIdf * weight;
            }
          }
          return tfidfRaw;
        });

        let maxTfidf = 0;
        for (const t of tfidfRawByBook) if (t > maxTfidf) maxTfidf = t;
        const useTfidf = maxTfidf > 1.5;

        const scoredCSAL = csalScores.map(({ libro, index, csalScore }) => {
          const csalNorm = csalScore / maxCSAL; // 0-1
          const tfidfNorm = useTfidf ? (tfidfRawByBook[index] / maxTfidf) : 0;
          const crono = (csalNorm > 0 || tfidfNorm > 0) ? this.cronoBoost(libro) : 0;
          // Pesos nivel dios: CSAL 85% + TF-IDF 10% + crono 5%
          const finalScore = (csalNorm * 0.85) + (tfidfNorm * 0.10) + (crono * 0.05);
          return {
            libro, index, score: finalScore,
            _csal: csalNorm, _csalRaw: csalScore,
            _tfidf: tfidfNorm, _tfidfRaw: tfidfRawByBook[index],
            _crono: crono
          };
        });

        scoredCSAL.sort((a, b) => b.score - a.score);
        const best = scoredCSAL[0];

        // Top-group con semilla diaria (variedad sutil)
        const topGroup = scoredCSAL.filter(s => s.score >= best.score * 0.85).slice(0, 3);
        const seed = this.daySeed(q);
        const pick = topGroup[seed % topGroup.length];
        return { ...pick, reason: 'csal' };
      }
      // Si CSAL no encontró match fuerte (max ≤ 0.5), caemos a QUANTUM
      // Ojo: NO usamos un fallback más permisivo de CSAL, porque sin matches
      // fuertes el QUANTUM clásico (con sinónimos hardcoded) puede rescatar
      // queries que CSAL no cubre (palabras del copy editorial directo).
    }

    // ════════════════════════════════════════════════════════════════════
    // CAMINO 2 — QUANTUM CLÁSICO (fallback pre-sprint, siempre disponible)
    // ════════════════════════════════════════════════════════════════════
    const idx = this.buildIndex(libros);
    const expandedTokens = this.expandWithSynonyms(queryTokens);
    const queryVecQuantum = buildQueryVector(queryTokens, TriggguiI18n.lang);

    const rawScores = libros.map((libro, index) => {
      const bookVec = idx.bookVectors[index];
      let tfidfRaw = 0;
      for (const { token, weight } of expandedTokens) {
        if (token.length < 3 || STOPWORDS_QUANTUM.has(token)) continue;
        const tf = bookVec[token] || 0;
        if (tf === 0) {
          if (weight < 1.0) continue;
          for (const bookTerm of Object.keys(bookVec)) {
            if (bookTerm.length >= 4 && token.length >= 4) {
              if (bookTerm.includes(token) || token.includes(bookTerm)) {
                const partialTf = bookVec[bookTerm] * 0.5;
                tfidfRaw += partialTf * (idx.idf[bookTerm] || 1) * weight;
                break;
              }
            }
          }
        } else {
          const termIdf = idx.idf[token] || 1;
          tfidfRaw += tf * termIdf * weight;
        }
      }
      const quantum = quantumScore(queryVecQuantum.vector, libro);
      return { libro, index, tfidfRaw, quantum };
    });

    let maxTfidf = 0;
    for (const r of rawScores) if (r.tfidfRaw > maxTfidf) maxTfidf = r.tfidfRaw;
    const useTfidf = maxTfidf > 1.5;

    const scored = rawScores.map(({ libro, index, tfidfRaw, quantum }) => {
      const tfidfNorm = useTfidf ? (tfidfRaw / maxTfidf) : 0;
      const crono = (tfidfNorm > 0 || quantum > 0) ? this.cronoBoost(libro) : 0;
      const finalScore = (quantum * 0.80) + (tfidfNorm * 0.20) + (crono * 0.05);
      return { libro, index, score: finalScore, _tfidf: tfidfNorm, _tfidfRaw: tfidfRaw, _quantum: quantum, _crono: crono };
    });

    scored.sort((a, b) => b.score - a.score);

    const best = scored[0];
    if (best.score <= 0.01) {
      const top3 = scored.slice(0, Math.min(3, scored.length));
      const seed = this.daySeed(q);
      const pick = top3[seed % top3.length];
      return { ...pick, reason: 'whisper' };
    }

    const topGroup = scored.filter(s => s.score >= best.score * 0.85).slice(0, 3);
    const seed = this.daySeed(q);
    const pick = topGroup[seed % topGroup.length];
    return { ...pick, reason: 'match' };
  }
};

// Segmenta una frase en [w1, w2, w3] con regla C.
// w3 es la ancla (1 palabra si ≤4 palabras totales, 2 si ≥5).
// La concatenación con espacios de las piezas no vacías = frase original.
BarraMagica.segmentQuestion = function(phrase) {
  try {
    const words = String(phrase).split(/\s+/).filter(w => w.length > 0);
    const n = words.length;
    if (n < 2) return ['', '', words.join(' ')];
    const anchorCount = n <= 4 ? 1 : 2;
    const w3 = words.slice(n - anchorCount).join(' ');
    const remaining = words.slice(0, n - anchorCount);
    if (remaining.length === 0) return ['', '', w3];
    if (remaining.length === 1) return [remaining[0], '', w3];
    return [remaining[0], remaining.slice(1).join(' '), w3];
  } catch (_) {
    return null;
  }
};

// Selecciona una variante aleatoria del idioma activo y la segmenta.
// Devuelve [w1, w2, w3] o null si algo falla (cae al fallback i18n).
BarraMagica.pickQuestion = function() {
  try {
    const lang = (TriggguiI18n && TriggguiI18n.lang) || 'es';
    const bank = BarraMagica.QUESTIONS[lang];
    if (!Array.isArray(bank) || bank.length === 0) return null;
    const phrase = bank[Math.floor(Math.random() * bank.length)];
    return BarraMagica.segmentQuestion(phrase);
  } catch (_) {
    return null;
  }
};

BarraMagica.applyStrings = function() {
  const qEl = document.getElementById('barraQuestion');
  const iEl = document.getElementById('barraInput');
  const sEl = document.getElementById('barraSkip');
  const eyEl = document.getElementById('barraEyebrow');
  const w1El = qEl ? qEl.querySelector('.bm-w1') : null;
  const w2El = qEl ? qEl.querySelector('.bm-w2') : null;
  const w3El = qEl ? qEl.querySelector('.bm-w3') : null;
  if (eyEl) eyEl.textContent = TriggguiI18n.get('barra.eyebrow');
  // 🌒 v10: pregunta rotatoria. Si pickQuestion falla, fallback al i18n original.
  const seg = BarraMagica.pickQuestion();
  if (seg && Array.isArray(seg) && seg.length === 3) {
    if (w1El) w1El.textContent = seg[0];
    if (w2El) w2El.textContent = seg[1];
    if (w3El) w3El.textContent = seg[2];
  } else {
    if (w1El) w1El.textContent = TriggguiI18n.get('barra.question.word1');
    if (w2El) w2El.textContent = TriggguiI18n.get('barra.question.word2');
    if (w3El) w3El.textContent = TriggguiI18n.get('barra.question.word3');
  }

  // 🌒 v9: Color rotatorio + 2 auroras cromáticas — todo del catálogo real.
  //
  // Derivado del día: misma fecha = mismos colores (consistencia del ritual).
  // Día siguiente = tres colores distintos (sorpresa del día).
  //
  // Garantiza 3 colores VISUALMENTE DISTINTOS tomando accents separados en el
  // espacio HSL (Δhue >= 60° entre pares). Sin esto, un catálogo con muchos
  // accents similares daría aurora monocromática aburrida.
  let accentColor = '#4A90E2';        // Fallback azul espacial (más padre que naranja)
  let aurora1 = 'rgba(40, 100, 220, 0.48)';
  let aurora2 = 'rgba(80, 230, 200, 0.42)';
  try {
    const data = window.__TRIGGUI_DATA__;
    if (data && Array.isArray(data.libros) && data.libros.length > 0) {
      const accents = data.libros
        .map(l => l && l.tarjeta && l.tarjeta.style && l.tarjeta.style.accent)
        .filter(c => typeof c === 'string' && /^#[0-9a-f]{3,8}$/i.test(c));
      if (accents.length > 0) {
        const today = new Date().toDateString();
        let h = 5381;
        for (let i = 0; i < today.length; i++) h = ((h * 33) ^ today.charCodeAt(i)) >>> 0;

        // Elegir accent principal (palabra "sientes")
        accentColor = accents[h % accents.length];

        // Para las auroras, buscar 2 accents con HUE distante del principal
        // y entre sí. Esto da contraste visual nivel dios.
        const mainHue = hexToHsl(accentColor).h;
        const candidates = accents
          .map(c => ({ color: c, hue: hexToHsl(c).h }))
          .filter(c => Math.abs(((c.hue - mainHue + 180) % 360) - 180) >= 50);

        if (candidates.length >= 2) {
          // Elegir 2 candidatos distintos entre sí con semilla del día
          const seed1 = (h ^ 0x9e3779b9) >>> 0;
          const seed2 = (h ^ 0x85ebca6b) >>> 0;
          const c1 = candidates[seed1 % candidates.length];
          let c2 = candidates[seed2 % candidates.length];
          // Si por semilla cayó el mismo, tomar el siguiente
          if (c2.color === c1.color && candidates.length > 1) {
            c2 = candidates[(seed2 + 1) % candidates.length];
          }
          aurora1 = hexToRgba(c1.color, 0.48);
          aurora2 = hexToRgba(c2.color, 0.42);
        } else if (accents.length >= 2) {
          // Fallback: si no hay candidatos distantes, usar 2 accents aleatorios
          const seed1 = (h ^ 0x9e3779b9) >>> 0;
          const seed2 = (h ^ 0x85ebca6b) >>> 0;
          let idx1 = seed1 % accents.length;
          let idx2 = seed2 % accents.length;
          if (idx1 === idx2) idx2 = (idx2 + 1) % accents.length;
          aurora1 = hexToRgba(accents[idx1], 0.48);
          aurora2 = hexToRgba(accents[idx2], 0.42);
        }
      }
    }
  } catch(_) {}
  const overlay = document.getElementById('barraMagicaOverlay');
  if (overlay) {
    overlay.style.setProperty('--bm-accent', accentColor);
    overlay.style.setProperty('--bm-aurora-1', aurora1);
    overlay.style.setProperty('--bm-aurora-2', aurora2);
    // 🌒 v21: variables con alpha para que el input border, glow y shadow usen
    // EXACTAMENTE el mismo color del accent (última palabra + subrayado).
    // hexToRgba está definido arriba en el archivo.
    overlay.style.setProperty('--bm-accent-40', hexToRgba(accentColor, 0.40));
    overlay.style.setProperty('--bm-accent-10', hexToRgba(accentColor, 0.10));
    overlay.style.setProperty('--bm-accent-18', hexToRgba(accentColor, 0.18));
  }

  // Placeholder contextual: elige basado en comportamiento del usuario
  if (iEl) {
    const books = getLocal('books_opened', 0);
    const dow = new Date().getDay();
    let phKey = 'barra.placeholder.default';
    if (books >= 10) phKey = 'barra.placeholder.ritual';
    else if (dow === 0) phKey = 'barra.placeholder.sunday';
    else if (books >= 5) phKey = 'barra.placeholder.returning';
    iEl.placeholder = TriggguiI18n.get(phKey);
  }
  // 🌒 v3.8.8 — chip Kids: texto via applyKidsBtnStrings (NO via barra.skip i18n viejo)
  if (sEl) {
    if (typeof applyKidsBtnStrings === 'function') {
      try { applyKidsBtnStrings(); } catch(_) {}
    }
  }
  const microEl = document.getElementById('barraMicro');
  if (microEl && window.__TRIGGUI_DATA__ && window.__TRIGGUI_DATA__.libros) {
    const key = this.getMicroCopyKey(window.__TRIGGUI_DATA__.libros.length);
    microEl.innerHTML = TriggguiI18n.get(key);
  }
  // Racha (solo si >= 2, no mostramos si es la primera visita)
  const streakEl = document.getElementById('barraStreak');
  const streakNumEl = document.getElementById('barraStreakNum');
  const streakUnitEl = document.getElementById('barraStreakUnit');
  if (streakEl && streakNumEl) {
    const streak = getLocal('streak', 0);
    if (streak >= 2) {
      streakNumEl.textContent = String(streak);
      if (streakUnitEl) {
        const unitKey = streak === 1 ? 'barra.streak.day' : 'barra.streak.days';
        streakUnitEl.textContent = TriggguiI18n.get(unitKey);
      }
      streakEl.classList.add('visible');
    } else {
      streakEl.classList.remove('visible');
    }
  }
  const esEl = document.getElementById('langToggleEs');
  const enEl = document.getElementById('langToggleEn');
  if (esEl && enEl) {
    if (TriggguiI18n.lang === 'en') { esEl.className = 'lang-inactive'; enEl.className = 'lang-active'; }
    else { esEl.className = 'lang-active'; enEl.className = 'lang-inactive'; }
  }
};
BarraMagica.openOverlay = function(force) {
  if (!force && !this.shouldShowToday()) return false;
  const overlay = document.getElementById('barraMagicaOverlay');
  if (!overlay) return false;

  // 🌒 v19.2: REGLA ABSOLUTA — booting solo primer paint, mood-active para todo
  // lo demás. Aquí en reapertura usamos SOLO mood-active porque:
  //   - mood-active esconde la app principal (.grid, .cta, etc) por CSS
  //   - mood-active mantiene el overlay con display:flex pero NO fuerza opacity
  //   - Eso permite que JS controle opacity con fade-in real (450ms)
  // Si usáramos booting, su CSS forzaría opacity:1 !important + transition:none
  // y rompería completamente la animación.
  document.documentElement.classList.add('mood-active');
  // Defensa: por si quedó booting prendido por error previo, lo apagamos.
  document.documentElement.classList.remove('booting');
  document.body.classList.remove('booting');

  this.applyStrings();

  overlay.classList.remove('visible');
  overlay.style.display = 'flex';
  overlay.style.opacity = '0';
  overlay.style.transition = 'none';
  overlay.style.pointerEvents = ''; // 🌒 v11: restaurar por si cerró con pointer-events:none
  void overlay.offsetWidth; // reflow

  const lupa = document.getElementById('barraLupaBtn');
  if (lupa) lupa.classList.remove('visible');

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      // 🌒 v19.2: fade-in puro, sin remover booting (ya no está activa).
      overlay.style.transition = 'opacity 450ms cubic-bezier(0.25, 0.1, 0.25, 1)';
      overlay.classList.add('visible');
      overlay.style.opacity = '1';

      setTimeout(() => {
        // 🌒 v20: activación visual unificada (focus en desktop, .touch-active en mobile)
        activateInputVisual();
      }, 500);
    });
  });

  track('barra_opened', { force: !!force, lang: TriggguiI18n.lang });
  return true;
};
BarraMagica.closeOverlay = function(skipped, skipRender) {
  const overlay = document.getElementById('barraMagicaOverlay');
  if (!overlay) return;

  this._clearSubmitTimers && this._clearSubmitTimers();

  // 🌒 v19.2: revelar la app principal debajo del fade-out.
  // Quitamos mood-active al inicio para que .grid/.cta/etc. dejen de ser
  // display:none. Los bloques YA están renderizados (por bootTriggui o
  // requestNewBook), así que aparecen limpios cuando el overlay termine
  // de desvanecerse.
  document.documentElement.classList.remove('mood-active');

  // Defensa: booting nunca debería estar activo aquí (v19.2 nunca lo activa
  // fuera del boot inicial), pero por seguridad lo apagamos.
  document.documentElement.classList.remove('booting');
  document.body.classList.remove('booting');

  // 🌒 v11: CRÍTICO — quitar pointer-events DEL INSTANTE que inicia el fade-out.
  overlay.style.pointerEvents = 'none';

  // Transición cinematográfica: overlay se desvanece en 650ms
  overlay.style.transition = 'opacity 650ms cubic-bezier(0.33, 1, 0.68, 1)';
  overlay.style.opacity = '0';
  overlay.classList.remove('visible');

  setTimeout(() => {
    overlay.style.display = 'none';
    overlay.style.transition = '';
    overlay.style.pointerEvents = ''; // restaurar para próxima apertura
    // Reset visual para próxima apertura
    const submitBtn = document.getElementById('barraSubmit');
    const inputEl = document.getElementById('barraInput');
    const skipEl = document.getElementById('barraSkip');
    const microEl = document.getElementById('barraMicro');
    const questionEl = document.getElementById('barraQuestion');
    if (submitBtn) submitBtn.disabled = false;
    if (inputEl) inputEl.value = '';
    if (skipEl) skipEl.style.opacity = '';
    if (microEl) { microEl.style.opacity = ''; }
    if (questionEl) {
      questionEl.style.opacity = '';
      questionEl.style.transform = '';
    }
    overlay.style.opacity = '';
  }, 700);
  this.markShownToday();
  if (revealed) {
    const lupa = document.getElementById('barraLupaBtn');
    if (lupa) lupa.classList.add('visible');
  }
  track('barra_closed', { skipped: !!skipped });
};
// 🌒 v8: tokens de submit para evitar que timeouts viejos ejecuten callbacks
// cuando el usuario cierra/abre la barra rápido, o re-submite.
// Cada llamada a submit() incrementa el token; los setTimeout verifican que
// el token no haya cambiado antes de hacer su trabajo.
BarraMagica._submitToken = 0;
BarraMagica._submitTimers = [];

BarraMagica._clearSubmitTimers = function() {
  while (this._submitTimers.length) {
    clearTimeout(this._submitTimers.pop());
  }
};

BarraMagica.submit = function(query) {
  // 🌒 v10: Nueva arquitectura del submit — simple, robusta, sin bugs.
  //
  // Problema del v9: token se incrementaba en closeOverlay Y en submit,
  // creando condiciones de carrera donde algunos timers se invalidaban
  // a sí mismos. Además, inputEl.blur() en mobile cortaba la cadena de
  // eventos táctiles y hacía que "nada pasara" al presionar enter.
  //
  // v10:
  //   - Token solo se incrementa en submit() (invalidar submits anteriores).
  //   - closeOverlay NO incrementa el token (solo limpia timers).
  //   - No blur() del input en mobile (blur puede suceder natural al cerrar).
  //   - No disabled del botón (ya hay debounce en doSubmit).
  const myToken = ++this._submitToken;
  this._clearSubmitTimers();

  const data = window.__TRIGGUI_DATA__;
  if (!data || !data.libros || data.libros.length === 0) {
    // Sin data no podemos elegir libro — cerrar la barra limpiamente
    this.closeOverlay(true);
    return;
  }
  const q = String(query || '').trim();

  let result;
  try {
    result = TrigguiFiltro.filter(data.libros, q);
  } catch (err) {
    console.error('[Triggui] filter error:', err);
    result = null;
  }

  if (q) {
    try {
      const hist = getLocal('queries_history', []);
      hist.push({ q: q.slice(0, 140), t: Date.now(), lang: TriggguiI18n.lang, dow: new Date().getDay(), hour: new Date().getHours() });
      saveLocal('queries_history', hist.slice(-50));
    } catch(_) {}
    track('barra_query', { len: q.length, lang: TriggguiI18n.lang, reason: result?.reason || 'none', dow: new Date().getDay(), hour: new Date().getHours() });
  } else {
    track('barra_skipped');
  }
  if (result && result.libro) {
    libro = result.libro;
    try { sessionStorage.setItem('lastLibroIdx', String(result.index)); } catch(_) {}
  }

  // 🎨 Breathing moment elegante antes del reveal
  // Solo visual — NO blur() del input (puede cortar eventos táctiles)
  const skipEl = document.getElementById('barraSkip');
  const microEl = document.getElementById('barraMicro');
  const questionEl = document.getElementById('barraQuestion');
  if (skipEl) skipEl.style.opacity = '0.3';
  if (microEl) {
    microEl.style.transition = 'opacity 0.4s ease';
    microEl.style.opacity = '1';
    microEl.textContent = TriggguiI18n.get('barra.loading');
  }
  if (questionEl) {
    questionEl.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
    questionEl.style.opacity = '0.35';
    questionEl.style.transform = 'scale(0.96)';
  }

  const self = this;

  // Paso 2: Construir los 4 bloques DEBAJO (invisibles aún, overlay los cubre)
  this._submitTimers.push(setTimeout(() => {
    if (myToken !== self._submitToken) return; // submit fue cancelado
    self.markShownToday();
    try { render(); } catch(e) { console.error('[Triggui] render error:', e); }
    try { updateBadge(); } catch(_) {}
  }, 300));

  // Paso 3: Fade-out del overlay, revelando los bloques ya construidos
  this._submitTimers.push(setTimeout(() => {
    if (myToken !== self._submitToken) return;
    self.closeOverlay(!q, /*skipRender=*/ true);
  }, 900));

  // Paso 4: First-visit hint si aplica
  if (!getLocal('has_visited')) {
    this._submitTimers.push(setTimeout(() => {
      // No checar token aquí — el first-visit es cosmético y queremos que
      // corra independiente de submits posteriores.
      try {
        document.querySelectorAll('.block').forEach(b => b.classList.add('first-visit-hint'));
        saveLocal('has_visited', true);
      } catch(_) {}
    }, 1600));
  }
};

// ══════════════════════════════════════════════════════════════════════════
// 🎯 Wiring de eventos de la barra mágica
// ══════════════════════════════════════════════════════════════════════════
// 🌒 v10: wireBarraMagicaEvents IDEMPOTENTE.
// Si se llama dos veces, la segunda es un no-op. Esto previene el bug donde
// los mismos listeners se registran varias veces y el submit se ejecuta
// múltiples veces en cadena.
//
// Se marca con _wired=true en la primera invocación exitosa.
let __trigguiEventsWired = false;

function wireBarraMagicaEvents() {
  if (__trigguiEventsWired) return; // ya wireado, no re-registrar listeners

  const input = document.getElementById('barraInput');
  const submit = document.getElementById('barraSubmit');
  const skip = document.getElementById('barraSkip');
  const langToggle = document.getElementById('barraLangToggle');
  const lupa = document.getElementById('barraLupaBtn');

  if (input && submit) {
    // 🌒 v20: cuando el usuario hace tap real en el input, el :focus nativo
    // aplica el mismo estilo que .touch-active. Quitamos la clase para no
    // duplicar reglas y para que al perder focus el input vuelva a su estado
    // base limpio (sin border activo "fantasma").
    input.addEventListener('focus', deactivateInputVisual);
    // 🌒 v10: doSubmit SIEMPRE dispara, con fallback robusto.
    // NO usamos submit.disabled para prevenir doble click, porque:
    //   - en iOS/Android WebView, disabled tras click del botón puede perder
    //     el focus del input y rompe la cadena de eventos táctiles.
    //   - mejor: flag local + markShownToday/closeOverlay hacen idempotente
    //     a BarraMagica.submit.
    // En vez de disabled, usamos un lock de 600ms sobre la función.
    let lastSubmitTime = 0;
    const doSubmit = () => {
      const now = Date.now();
      if (now - lastSubmitTime < 600) return; // debounce
      lastSubmitTime = now;
      const q = input.value;
      try {
        BarraMagica.submit(q);
      } catch (err) {
        console.error('[Triggui] BarraMagica.submit error:', err);
      }
    };
    submit.addEventListener('click', doSubmit);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        doSubmit();
      }
    });
    // En iOS y Android WebView, a veces el evento form submit es más fiable
    // que keydown. No hay <form> pero podemos aprovechar el enterkeyhint.
  }
  if (skip) {
    // 🌒 v3.8.10 — Click del pill Kids: SPA-style switch (sin reload)
    skip.addEventListener('click', () => {
      const targetMode = (window.TRIGGUI_MODE === 'kids') ? 'adult' : 'kids';
      try { track('mode_toggle_click', { from: window.TRIGGUI_MODE, to: targetMode }); } catch(_) {}
      if (typeof switchTrigguiMode === 'function') {
        switchTrigguiMode(targetMode);
      } else {
        window.location.href = (targetMode === 'kids') ? '/kids/' : '/';
      }
    });
  }
  if (langToggle) {
    langToggle.addEventListener('click', () => {
      const newLang = TriggguiI18n.lang === 'en' ? 'es' : 'en';
      TriggguiI18n.setLang(newLang);
      BarraMagica.applyStrings();
      const toast = document.getElementById('toast');
      if (toast) {
        toast.textContent = TriggguiI18n.get('toast.langChanged.' + newLang);
        toast.classList.add('visible');
        setTimeout(() => toast.classList.remove('visible'), 2000);
      }
      try {
        const overlay = document.getElementById('barraMagicaOverlay');
        if (!overlay || !overlay.classList.contains('visible')) {
          if (libro) { render(); updateBadge(); }
        }
      } catch(_) {}
      // 🌒 v3.8.6 — sincronizar texto del toggle kids con el nuevo idioma
      try { applyKidsBtnStrings(); } catch(_) {}
    });
  }

  // 🌒 v3.8.6 — Toggle Kids/Adultos: click → navegar al home del otro modo
  if (lupa) {
    lupa.addEventListener('click', () => { BarraMagica.openOverlay(true); });
  }

  // 🌒 v14: Remover clase .bm-first-appear del langToggle tras la animación.
  // Durante los primeros 2.7s (1.7s delay + 1s duration) el langToggle hace
  // su entrada con fade-up. Después, se remueve la clase para que el elemento
  // tenga opacity:1 estable (del CSS base). Así, al re-abrir la barra por
  // lupa/requestNewBook, el elemento YA está en opacity:1 sin depender de
  // ninguna animación.
  const langToggleEl = document.getElementById('barraLangToggle');
  if (langToggleEl && langToggleEl.classList.contains('bm-first-appear')) {
    setTimeout(() => {
      langToggleEl.classList.remove('bm-first-appear');
    }, 2800);
  }

  // 🌒 v3.8.6 — Toggle Kids: estado inicial + cleanup animación
  try { applyKidsBtnStrings(); } catch(_) {}

  __trigguiEventsWired = true;
}

// 🌒 v3.8.10 — SWITCH SPA NIVEL DIOS CUÁNTICO-QUARK
// ════════════════════════════════════════════════════════════════════════════
// Cambia entre catálogo adulto y kids SIN page reload, con transición fluida:
//   1. Inmediato: html[data-mode] cambia → pill indicator desliza (CSS spring)
//   2. history.pushState: URL cambia sin recargar
//   3. Fetch del nuevo JSON en paralelo al fade-out del grid (250ms)
//   4. Re-pickeo libro, applyStrings (cambia color de "sientes?"), render()
//   5. Fade-in del grid (350ms) — usuario nunca ve flash blanco
//
// Defensas cuántico-quark:
//   - Flag __TRIGGUI_SWITCHING__ bloquea re-entrada (click múltiple)
//   - Try/catch global con fallback graceful a window.location.href
//   - sessionStorage.removeItem('lastLibroIdx') limpia state stale
//   - Reverso de URL si catálogo nuevo está vacío
async function switchTrigguiMode(targetMode) {
  if (window.__TRIGGUI_SWITCHING__) return;
  if (targetMode !== 'kids' && targetMode !== 'adult') return;
  if (targetMode === window.TRIGGUI_MODE) return;
  window.__TRIGGUI_SWITCHING__ = true;

  const targetUrl = targetMode === 'kids' ? '/kids/' : '/';
  const prevMode = window.TRIGGUI_MODE;
  const prevUrl = prevMode === 'kids' ? '/kids/' : '/';
  const grid = document.getElementById('grid');

  try {
    // FASE 1: Cambio inmediato del modo + URL (UI feedback instantáneo)
    window.TRIGGUI_MODE = targetMode;
    document.documentElement.classList.toggle('kids-mode', targetMode === 'kids');
    document.documentElement.classList.toggle('adult-mode', targetMode !== 'kids');
    document.documentElement.setAttribute('data-mode', targetMode);
    try { applyKidsBtnStrings(); } catch(_) {}
    try { history.pushState({ mode: targetMode, source: 'switch' }, '', targetUrl); } catch(_) {}

    // FASE 2: Fade-out del grid (paralelo al fetch)
    if (grid) {
      grid.style.transition = 'opacity 250ms cubic-bezier(0.4, 0, 0.2, 1)';
      grid.style.opacity = '0';
    }

    // FASE 3: Fetch nuevo catálogo + esperar fade-out simultáneamente
    const [dataRaw] = await Promise.all([
      loadCatalogWithRetry(3),
      new Promise(resolve => setTimeout(resolve, 250))
    ]);

    // FASE 4: Validar + sanitizar
    if (!dataRaw || !Array.isArray(dataRaw.libros) || dataRaw.libros.length === 0) {
      throw new Error('empty_or_invalid_catalog');
    }
    const data = window.__TRIGGUI_SANITIZE__(dataRaw);

    // FASE 5: Reset state stale + aplicar nuevo data
    try { sessionStorage.removeItem('lastLibroIdx'); } catch(_) {}
    window.__TRIGGUI_DATA__ = data;
    libro = data.libros[pickLibroNoRepetido(data.libros)];

    // FASE 6: Re-aplicar strings (cambia accent color "sientes?") + render
    try { BarraMagica.applyStrings(); } catch(_) {}
    try { render(); } catch(e) { console.error('[Triggui] render error tras switch:', e); }
    try { updateBadge(); } catch(_) {}
    try { refreshGlobalCounter(); } catch(_) {}

    // FASE 7: Fade-in del grid (post-render pintado)
    requestAnimationFrame(() => {
      if (grid) {
        grid.style.transition = 'opacity 350ms cubic-bezier(0.4, 0, 0.2, 1)';
        grid.style.opacity = '1';
      }
    });

    // FASE 8: Tracking
    try { track('mode_switched', { from: prevMode, to: targetMode, lang: TriggguiI18n.lang }); } catch(_) {}

  } catch (err) {
    console.error('[Triggui] switchTrigguiMode error:', err);
    // Fallback graceful: revertir modo en memoria + page reload (comportamiento clásico)
    window.TRIGGUI_MODE = prevMode;
    document.documentElement.classList.toggle('kids-mode', prevMode === 'kids');
    document.documentElement.classList.toggle('adult-mode', prevMode !== 'kids');
    document.documentElement.setAttribute('data-mode', prevMode);
    try { history.replaceState({ mode: prevMode }, '', prevUrl); } catch(_) {}
    window.__TRIGGUI_SWITCHING__ = false;
    window.location.href = targetUrl;
    return;
  } finally {
    setTimeout(() => {
      window.__TRIGGUI_SWITCHING__ = false;
      if (grid) grid.style.transition = '';
    }, 700);
  }
}

// 🌒 v3.8.10 — Back/forward del browser sincronizado con el modo
window.addEventListener('popstate', function(e) {
  const targetMode = window.location.pathname.startsWith('/kids') ? 'kids' : 'adult';
  if (targetMode !== window.TRIGGUI_MODE && typeof switchTrigguiMode === 'function') {
    switchTrigguiMode(targetMode);
  }
});

// 🌒 v3.8.9 — Sincroniza segmented pill: texto + estado activo según TRIGGUI_MODE + idioma
// El color del segmento activo lo aplica el CSS automáticamente via var(--bm-accent),
// heredado del libro current (mismo color que .bm-w3 "sientes?" en la pregunta).
// Cero JS para color: todo declarativo via CSS variable cuántico-quark.
function applyKidsBtnStrings() {
  const allEl = document.querySelector('#barraSkip .bm-skip-seg-all');
  const kidsEl = document.querySelector('#barraSkip .bm-skip-seg-kids');
  if (!allEl || !kidsEl) return;
  const isKids = window.TRIGGUI_MODE === 'kids';
  const lang = TriggguiI18n.lang;
  allEl.textContent = lang === 'en' ? 'All' : 'Todos';
  kidsEl.textContent = lang === 'en' ? 'Kids' : 'Niños';
  if (isKids) {
    allEl.classList.remove('active');
    kidsEl.classList.add('active');
  } else {
    allEl.classList.add('active');
    kidsEl.classList.remove('active');
  }
}

// ══════════════════════════════════════════════════════════════════════════
// 🌒 v8 — INIT NIVEL DIOS
// Contrato: el usuario NUNCA ve pantalla negra infinita.
// Rutas de fallo manejadas:
//   1. Timeout de red (>10s)         → mensaje + reintento
//   2. Error HTTP (404, 500)          → mensaje + reintento
//   3. JSON corrupto en CDN           → mensaje + reintento
//   4. Catálogo vacío (libros=[])     → mensaje "Preparando catálogo"
//   5. localStorage quotaExceeded     → continúa (la app funciona sin persistir)
//   6. renderizado inicial tira       → catch externo deja app usable
// ══════════════════════════════════════════════════════════════════════════

// Mensaje visible si algo falla antes de tener catálogo. No depende del DOM
// principal; se inyecta en <body>. Reemplazable por retry().
function showLoadingOrError(state, opts) {
  opts = opts || {};
  // Remover cualquier mensaje previo
  const prev = document.getElementById('trigguiBootMsg');
  if (prev) prev.remove();
  if (state === 'hide') return;

  const isEn = (typeof TriggguiI18n !== 'undefined' && TriggguiI18n.lang === 'en');
  const copy = {
    loading: isEn ? 'Loading your catalog…' : 'Cargando tu catálogo…',
    preparing: isEn
      ? 'Triggui is preparing fresh books. Come back in a few minutes.'
      : 'Triggui está preparando libros nuevos. Vuelve en unos minutos.',
    netError: isEn
      ? 'Network issue. Tap to try again.'
      : 'Problema de red. Toca para reintentar.',
    offline: isEn
      ? 'No internet connection. Triggui will continue when the connection returns.'
      : 'Sin conexión a internet. Triggui seguirá cuando regrese la conexión.',

  let title, action;

// Fetch con timeout duro + retry con backoff exponencial.
// No confía en el default del browser (30-60s). 10s max por intento.
async function fetchWithTimeout(url, timeoutMs) {
  timeoutMs = timeoutMs || 10000;
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), timeoutMs);
  try {
    const res = await fetch(url, { signal: ctrl.signal, cache: 'no-store' });
    clearTimeout(timer);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res;
  } catch (err) {
    clearTimeout(timer);
    throw err;
  }
}

// ════════════════════════════════════════════════════════════════════════════
// 🌒 SANITIZACIÓN CUÁNTICA-QUARK DEL JSON
// ════════════════════════════════════════════════════════════════════════════
// El modelo gpt-4o-mini, al serializar emojis Unicode en JSON, a veces escribe
// notación inválida como "\u001f440" en lugar del surrogate pair correcto
// "\uD83D\uDC40" o el caracter directo "👀". El parser JSON interpreta "\u001f"
// como U+001F (control char invisible) + "440" como texto literal → en pantalla
// aparece un rectángulo roto.
//
// Esta sanitización al cargar el JSON garantiza matemáticamente:
//   - 0 control chars residuales en el JSON expuesto a la app
//   - Emojis con el bug \u001f<hex> se reparan al emoji correcto (\u001f440 → 👀)
//   - Emojis legítimos se preservan intactos (1300+ emojis válidos en frases, etc.)
//   - Texto natural con whitespace (\t \n \r) se preserva
//   - Surrogates huérfanos y replacement chars (U+FFFD) se eliminan silenciosamente
//
// Tests cuánticos: 26/26 casos cubiertos (bug real + edge cases sintéticos +
// preservación de contenido legítimo + texto natural).
//
// Aplicado UNA SOLA VEZ al cargar contenido.json — todo el resto del frontend
// recibe datos limpios sin necesidad de defensas adicionales por campo.
function __triggguiSanitizeText(s) {
  if (typeof s !== 'string' || s.length === 0) return s;
  
  // 🌒 v3.8.9 Pase 0a: ANSI escape sequences COMPLETAS (CSI \x1B[...m)
  // El LLM ocasionalmente genera ANSI codes para "bold": "\x1B[1m❄\x1B[0m ternura"
  let result = s.replace(/\x1B\[[0-9;]*[a-zA-Z]/g, '');
  
  // 🌒 v3.8.9 Pase 0b: residuos ANSI SIN escape prefix ("[1m", "[m", "[N;Nm"
  // sueltos en texto, defensa contra sanitización previa que removió \x1B).
  result = result.replace(/\[[\d;]*m/g, '');
  
  // 🌒 v3.8.9 Pase 0c: brackets "[" huérfanos sin "]" cercano (residuos ANSI parciales).
  // Lookahead negativo (?![^\[\]]{0,40}\]) garantiza que SOLO se limpia "[" si NO
  // hay "]" correspondiente en los próximos 40 chars. Preserva "[NOTE]", "[1]", etc.
  result = result.replace(/ \[ (?![^\[\]]{0,40}\])/g, ' ');
  result = result.replace(/^\[ (?![^\[\]]{0,40}\])/g, '');
  result = result.replace(/ \[$(?![^\[\]]{0,40}\])/g, '');
  
  // Pase 1: control char (U+0000-U+001F excepto \t \n \r) seguido de hex literal.
  // Caso del bug: "\u001f440" donde firstCP="1f" + resto="440" → 0x1F440 → 👀
  result = result.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F]([0-9a-fA-F]{2,5})/g, function(match, hexRest) {
    var firstCP = match.codePointAt(0);
    var intentedCP = parseInt(firstCP.toString(16) + hexRest, 16);
    var isValidEmoji = (
      (intentedCP >= 0x1F000 && intentedCP <= 0x1FAFF) ||
      (intentedCP >= 0x2600  && intentedCP <= 0x27BF)  ||
      (intentedCP >= 0x1F600 && intentedCP <= 0x1F64F) ||
      (intentedCP >= 0x1F680 && intentedCP <= 0x1F6FF) ||
      (intentedCP >= 0x1F900 && intentedCP <= 0x1F9FF)
    );
    if (isValidEmoji) {
      try { return String.fromCodePoint(intentedCP); } catch (_) {}
    }
    // No reparable como emoji → eliminar el control char pero preservar el resto del texto
    return hexRest;
  });
  
  // Pase 2: control chars residuales (sin hex después)
  result = result.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F]/g, '');
  
  // Pase 3: surrogates huérfanos (sin pareja válida) — defensa contra UTF-16 corrupto
  result = result.replace(/[\uD800-\uDBFF](?![\uDC00-\uDFFF])|(?<![\uD800-\uDBFF])[\uDC00-\uDFFF]/g, '');
  
  // Pase 4: replacement char U+FFFD (síntoma de UTF-8 mal codificado en algún lado)
  result = result.replace(/\uFFFD/g, '');
  
  return result;
}

function __triggguiSanitizeAll(obj) {
  if (typeof obj === 'string') return __triggguiSanitizeText(obj);
  if (Array.isArray(obj)) {
    var out = [];
    for (var i = 0; i < obj.length; i++) out.push(__triggguiSanitizeAll(obj[i]));
    return out;
  }
  if (obj && typeof obj === 'object') {
    var out2 = {};
    for (var k in obj) {
      if (Object.prototype.hasOwnProperty.call(obj, k)) {
        out2[k] = __triggguiSanitizeAll(obj[k]);
      }
    }
    return out2;
  }
  return obj;
}
window.__TRIGGUI_SANITIZE__ = __triggguiSanitizeAll;

async function loadCatalogWithRetry(maxAttempts) {
  maxAttempts = maxAttempts || 3;
  // 🌒 v3.8.6 — catalog dinámico según TRIGGUI_MODE
  const catalogFile = (window.TRIGGUI_MODE === 'kids') ? 'contenido_kids.json' : 'contenido.json';
  const url = "https://raw.githubusercontent.com/badirnakid/triggui-content/main/" + catalogFile + "?ts=" + Date.now();
  let lastErr;
  for (let attempt = 1; attempt <= maxAttempts; attempt++) {
    try {
      const r = await fetchWithTimeout(url, 10000);
      const text = await r.text();
      // .trim() tolera BOM UTF-8 (U+FEFF es whitespace)
      const clean = text.trim();
      if (!clean) throw new Error('empty_response');
      const data = JSON.parse(clean);
      if (!data || !Array.isArray(data.libros)) throw new Error('invalid_shape');
      return data;
    } catch (err) {
      lastErr = err;
      console.warn('[Triggui] intento ' + attempt + '/' + maxAttempts + ' falló:', err.message);
      if (attempt < maxAttempts) {
        // Backoff: 1s, 2s (no total >3s para no frustrar al usuario)
        await new Promise(r => setTimeout(r, 1000 * attempt));
      }
    }
  }
  throw lastErr || new Error('unknown');
}

// 🌒 v20: Activación visual del input para mobile.
//
// Problema: en desktop, autofocus al input hace que el border se ponga naranja-rosa
// y el usuario sabe inmediatamente que ahí debe escribir. En mobile, hacer focus
// abriría el teclado virtual (intrusivo), así que NO hacemos focus.
// Pero el usuario mobile no tiene pista visual de dónde escribir.
//
// Solución: en mobile aplicamos clase .touch-active al input que replica
// visualmente el estilo de :focus (mismo border, mismo glow), SIN abrir teclado.
// Cuando el usuario hace tap real en el input, el :focus nativo aplica y la
// clase deja de ser necesaria — la quitamos para no acumular estilos.
function isTouchDevice() {
  return ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
}
function activateInputVisual() {
  const inp = document.getElementById('barraInput');
  if (!inp) return;
  if (isTouchDevice()) {
    // Mobile: pista visual sin abrir teclado
    inp.classList.add('touch-active');
  } else {
    // Desktop: focus real (abre cursor, mismo estilo activo)
    inp.focus();
  }
}
function deactivateInputVisual() {
  const inp = document.getElementById('barraInput');
  if (inp) inp.classList.remove('touch-active');
}

function pickLibroNoRepetido(libros){
  let last=sessionStorage.getItem("lastLibroIdx"); if(last!==null)last=parseInt(last);
  let idx=Math.floor(Math.random()*libros.length);
  if(idx===last){ idx=Math.floor(Math.random()*libros.length); if(idx===last)idx=(idx+1)%libros.length; }
  sessionStorage.setItem("lastLibroIdx", idx); return idx;
}

// Estado compartido del boot: no declaramos variables globales adicionales,
// usamos una closure que la IIFE captura.
// ═══════════════════════════════════════════════════════════════════════
// 🌒 v19: BOOT COMO ESTADO, NO COREOGRAFÍA
// ═══════════════════════════════════════════════════════════════════════
//
// Arquitectura v19 — eliminar el flash de raíz:
//
// 1. <html class="mood-active"> está aplicada desde el primer paint.
// 2. CSS hace que #barraMagicaOverlay sea visible al 100% durante mood-active.
// 3. CSS oculta TODA la app principal (.grid, .cta, .intro, etc) durante
//    mood-active — no solo .block. La app NO existe en el render tree.
// 4. bootTriggui NO hace fade-in ni double rAF ni transitionend ni setTimeout
//    fallback. Solo:
//      a. carga catálogo
//      b. elige libro
//      c. aplica strings al overlay (que ya es visible)
//      d. renderiza bloques (que están display:none por mood-active)
//      e. cierra el boot con finishBootOnce() — guard idempotente
// 5. mood-active SE QUEDA hasta que el usuario submite/salta. Ahí se quita
//    con fade-out el overlay y la app principal aparece.
//
// El primer frame que ve el usuario es: NEGRO + barra mágica. PUNTO.
// No hay coreografía de boot. No hay race conditions posibles.
// ═══════════════════════════════════════════════════════════════════════

let __trigguiBootFinalized = false;
function finishBootOnce() {
  if (__trigguiBootFinalized) return;
  __trigguiBootFinalized = true;
  
  // Quitar booting (mood-active SE QUEDA — el overlay sigue visible)
  document.body.classList.remove('booting');
  document.documentElement.classList.remove('booting');
  
  // Notificar al splash móvil
  signalFirstPaintOnce();
}

async function bootTriggui() {
  // 🌒 v19: el overlay YA es visible por contrato CSS (html.mood-active).
  // No hacemos overlay.style.display = 'flex' ni opacity = '0'. CSS lo gestiona.
  // Solo aseguramos que la clase 'visible' exista (para compatibilidad con
  // los handlers de re-apertura que existen en el código).
  const overlay = document.getElementById('barraMagicaOverlay');
  if (overlay) {
    overlay.classList.add('visible');
  }

  // 🌒 v19: cancelar la animación del .intro (legacy, ya no se ve por mood-active)
  const introEl = document.getElementById('intro');
  if (introEl) {
    introEl.style.animation = 'none';
  }

  // 🌒 v20: detección preventiva de offline.
  //
  // navigator.onLine == false → certero: NO hay red, mostrar mensaje
  // inmediato sin esperar 33s de retries fallidos.
  //
  // navigator.onLine == true → puede ser unreliable (router sin internet,
  // captive portal, etc), por eso seguimos al fetch normal y dejamos que
  // loadCatalogWithRetry haga su trabajo.
  //
  // El listener 'online' se registra UNA vez para retry automático cuando
  // la conexión regrese.
  if (typeof navigator !== 'undefined' && navigator.onLine === false) {
    console.warn('[Triggui] navigator.onLine = false, esperando conexión');
    document.documentElement.classList.remove('mood-active');
    if (overlay) overlay.style.display = 'none';
    showLoadingOrError('offline');
    track('offline_detected', { lang: TriggguiI18n.lang });
    finishBootOnce();
    // Listener para retry automático cuando regrese la red
    if (!window.__trigguiOnlineListenerWired) {
      window.__trigguiOnlineListenerWired = true;
      window.addEventListener('online', () => {
        console.log('[Triggui] conexión restaurada, reintentando boot');
        track('online_restored', { lang: TriggguiI18n.lang });
        // Reset flag boot para permitir re-finishBoot tras retry exitoso
        __trigguiBootFinalized = false;
        // Re-mostrar la barra mágica (estado activo)
        document.documentElement.classList.add('mood-active');
        if (overlay) {
          overlay.style.display = '';
          overlay.style.opacity = '';
          overlay.classList.add('visible');
        }
        showLoadingOrError('hide');
        // Re-bootear
        bootTriggui();
      }, { once: true });
    }
    return;
  }

  try {
    const dataRaw = await loadCatalogWithRetry(3);
    // 🌒 Sanitización cuántica-quark del JSON cargado.
    // Garantía matemática: ningún rectángulo roto puede aparecer en pantalla.
    // Repara emojis con bug "\u001f<hex>" del modelo (ej: \u001f440 → 👀) y
    // elimina cualquier control char residual antes de exponer los datos.
    const data = window.__TRIGGUI_SANITIZE__(dataRaw);
    window.__TRIGGUI_DATA__ = data;
    wireBarraMagicaEvents();

    // Catálogo vacío: la app está lista pero no hay nada que mostrar.
    if (!data.libros || data.libros.length === 0) {
      console.warn('[Triggui] catálogo vacío');
      // Limpiar mood-active para que el mensaje de error sea visible
      document.documentElement.classList.remove('mood-active');
      if (overlay) overlay.style.display = 'none';
      showLoadingOrError('empty_catalog');
      track('empty_catalog_seen', { lang: TriggguiI18n.lang });
      try { updateBadge(); } catch(_) {}
      try { refreshGlobalCounter(); } catch(_) {}
      finishBootOnce();
      return;
    }

    // Elegir libro y aplicar strings al overlay
    libro = data.libros[pickLibroNoRepetido(data.libros)];
    updateBadge();
    refreshGlobalCounter();
    BarraMagica.applyStrings();

    // 🌒 v19: render() ahora puede correr libre. Los .block están display:none
    // por html.mood-active. No hay forma de que sean candidatos a primer paint.
    try { render(); } catch(e) { console.error('[Triggui] render error:', e); }

    // Cerrar boot — idempotente, una sola vez
    finishBootOnce();

    // 🌒 v20: activación visual unificada del input
    // Desktop: focus real → cursor parpadeante + estilo activo
    // Mobile: clase .touch-active → estilo activo SIN abrir teclado virtual
    requestAnimationFrame(() => {
      activateInputVisual();
    });

    // Tracking
    track('barra_opened', { force: true, lang: TriggguiI18n.lang });
    track('app_loaded', { streak: getLocal('streak',0), books: getLocal('books_opened',0), lang: TriggguiI18n.lang });

    // Hint de primera visita (en background, no afecta el boot)
    if (!getLocal('has_visited')) {
      setTimeout(() => {
        document.querySelectorAll('.block').forEach(b => b.classList.add('first-visit-hint'));
        saveLocal('has_visited', true);
      }, 100);
    }
  } catch (err) {
    console.error('[Triggui] init error:', err);
    track('boot_error', { message: String(err && err.message || err).slice(0, 80) });
    // En error: limpiar mood-active para que se vea el mensaje de error
    document.documentElement.classList.remove('mood-active');
    if (overlay) overlay.style.display = 'none';

    // 🌒 v20: distinguir offline vs error genérico de red.
    // Si navigator.onLine cayó a false durante el fetch, mostrar mensaje
    // de offline (sin botón retry) y montar listener para retry automático.
    // Si onLine sigue true pero el fetch falló (servidor caído, DNS, etc),
    // mensaje genérico con botón de reintentar manual.
    const isOffline = (typeof navigator !== 'undefined' && navigator.onLine === false);
    if (isOffline) {
      showLoadingOrError('offline');
      track('offline_during_fetch', { lang: TriggguiI18n.lang });
      if (!window.__trigguiOnlineListenerWired) {
        window.__trigguiOnlineListenerWired = true;
        window.addEventListener('online', () => {
          console.log('[Triggui] conexión restaurada, reintentando boot');
          track('online_restored', { lang: TriggguiI18n.lang });
          __trigguiBootFinalized = false;
          document.documentElement.classList.add('mood-active');
          if (overlay) {
            overlay.style.display = '';
            overlay.style.opacity = '';
            overlay.classList.add('visible');
          }
          showLoadingOrError('hide');
          bootTriggui();
        }, { once: true });
      }
    } else {
      showLoadingOrError('network_error', { onRetry: bootTriggui });
    }
    finishBootOnce();
  }
}

bootTriggui();

  var rand = function(min, max) { return min + Math.random() * (max - min); };
  var randInt = function(min, max) { return Math.floor(rand(min, max + 1)); };
  var randPick = function(arr) { return arr[Math.floor(Math.random() * arr.length)]; };
  var clamp = function(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); };

  // HSL → CSS string
  var hsl = function(h, s, l) {
    return 'hsl(' + h.toFixed(1) + ', ' + (s * 100).toFixed(0) + '%, ' + (l * 100).toFixed(0) + '%)';
  };
  var hsla = function(h, s, l, a) {
    return 'hsla(' + h.toFixed(1) + ', ' + (s * 100).toFixed(0) + '%, ' + (l * 100).toFixed(0) + '%, ' + a.toFixed(3) + ')';
  };

  // ── PALETA CROMÁTICA — armonía matemática infinita ────────────────────
  function generatePalette() {
    var strategies = [
      'analogous', 'triadic', 'tetradic', 'complementary',
      'split-complementary', 'monochromatic-shifted', 'tetradic-rectangle',
      'freeform'
    ];
    var strategy = randPick(strategies);
    var baseHue = rand(0, 360);
    var hues = [];

    if (strategy === 'analogous') {
      var spread = rand(20, 60);
      hues = [baseHue, (baseHue + spread) % 360, (baseHue - spread + 360) % 360, (baseHue + spread * 2) % 360];
    } else if (strategy === 'triadic') {
      hues = [baseHue, (baseHue + 120 + rand(-15, 15)) % 360, (baseHue + 240 + rand(-15, 15)) % 360];
    } else if (strategy === 'tetradic') {
      hues = [
        baseHue,
        (baseHue + 90 + rand(-12, 12)) % 360,
        (baseHue + 180 + rand(-12, 12)) % 360,
        (baseHue + 270 + rand(-12, 12)) % 360
      ];
    } else if (strategy === 'tetradic-rectangle') {
      var off = rand(40, 80);
      hues = [baseHue, (baseHue + off) % 360, (baseHue + 180) % 360, (baseHue + 180 + off) % 360];
    } else if (strategy === 'complementary') {
      hues = [baseHue, (baseHue + 180 + rand(-12, 12)) % 360, (baseHue + rand(-30, 30) + 360) % 360];
    } else if (strategy === 'split-complementary') {
      hues = [baseHue, (baseHue + 150 + rand(-15, 15)) % 360, (baseHue + 210 + rand(-15, 15)) % 360];
    } else if (strategy === 'monochromatic-shifted') {
      hues = [
        baseHue,
        (baseHue + rand(-18, 18) + 360) % 360,
        (baseHue + rand(-18, 18) + 360) % 360,
        (baseHue + rand(-18, 18) + 360) % 360
      ];
    } else {
      // freeform — caos curado
      var n = randInt(3, 5);
      for (var i = 0; i < n; i++) hues.push(rand(0, 360));
    }

    // Cada color tiene SU PROPIA saturación y lightness
    return {
      strategy: strategy,
      colors: hues.map(function(h) {
        return {
          h: h,
          s: rand(0.55, 1.0),
          l: rand(0.42, 0.66)
        };
      })
    };
  }

  // ── ATMÓSFERA COMPLETA ────────────────────────────────────────────────
  function generateAtmosphere() {
    var palette = generatePalette();
    var colors = palette.colors;

    // Blobs aurora — cantidad y propiedades random
    var blobCount = randInt(2, 5);
    var blobs = [];
    for (var i = 0; i < blobCount; i++) {
      var c = colors[i % colors.length];
      blobs.push({
        top: rand(-25, 85),
        left: rand(-25, 85),
        size: rand(280, 520),
        blur: rand(65, 110),
        opacity: rand(0.20, 0.40),
        color: c,
        speed: rand(14, 34),
        driftX1: rand(-55, 55),
        driftY1: rand(-55, 55),
        driftX2: rand(-55, 55),
        driftY2: rand(-55, 55),
        scaleA: rand(0.85, 1.05),
        scaleB: rand(0.95, 1.18),
        delay: rand(0, 4)
      });
    }

    // Partículas — cantidad random, posición random, color del set
    var particleCount = randInt(6, 14);
    var particles = [];
    for (var j = 0; j < particleCount; j++) {
      var pc = colors[j % colors.length];
      particles.push({
        top: rand(4, 96),
        left: rand(4, 96),
        size: rand(0.8, 2.6),
        opacityHigh: rand(0.4, 0.95),
        speed: rand(10, 24),
        driftX: rand(-7, 7),
        driftY: rand(-7, 7),
        color: pc,
        delay: rand(0, 5)
      });
    }

    // Background base — cantidad y tipos de gradientes random
    var gradLayerCount = randInt(2, 4);
    var bgLayers = [];
    var gTypes = ['radial'];
    for (var k = 0; k < gradLayerCount; k++) {
      var lc = colors[k % colors.length];
      bgLayers.push({
        type: randPick(gTypes),
        x: rand(-10, 110),
        y: rand(-10, 110),
        angle: rand(0, 360),
        spread: rand(35, 90),
        color: hsla(lc.h, lc.s, lc.l, rand(0.06, 0.20))
      });
    }

    return {
      palette: palette,
      blobs: blobs,
      particles: particles,
      bgLayers: bgLayers,
      accentColor: colors[0],
      sparkColor: colors[Math.min(1, colors.length - 1)],
      eyebrowColor: colors[Math.min(2, colors.length - 1)],
      breatheSpeed: rand(5, 14)
    };
  }

  // ── APLICACIÓN AL DOM ─────────────────────────────────────────────────
  var lastStyleEl = null;
  var lastApplyTime = 0;

  function applyAtmosphere() {
    var now = Date.now();
    if (now - lastApplyTime < 1200) return;
    lastApplyTime = now;

    var overlay = document.getElementById('barraMagicaOverlay');
    if (!overlay) return;

               (layer.spread * 0.65).toFixed(0) + '% at ' + layer.x.toFixed(0) + '% ' +
               layer.y.toFixed(0) + '%, ' + layer.color + ' 0%, transparent 80%)';
      } else if (layer.type === 'linear') {
        return 'linear-gradient(' + layer.angle.toFixed(0) + 'deg, ' + layer.color + ' 0%, transparent 70%)';

               layer.x.toFixed(0) + '% ' + layer.y.toFixed(0) + '%, ' +
               layer.color + ' 0%, transparent 50%)';

    css.push('  background-image: ' + bgImage + ' !important;');

    css.push('#barraAurora .bm-aurora-blob { display: none !important; }');
    css.push('#barraDust .bm-particle { display: none !important; }');
    css.push('#barraAurora { opacity: 1 !important; }');

    // ── Blobs nuevos — keyframes únicos por blob ────────────────────────

      css.push('  33% { transform: translate(' + blob.driftX1.toFixed(1) + 'px, ' +
               blob.driftY1.toFixed(1) + 'px) scale(' + blob.scaleB.toFixed(3) + '); }');
      css.push('  66% { transform: translate(' + blob.driftX2.toFixed(1) + 'px, ' +
               blob.driftY2.toFixed(1) + 'px) scale(' + blob.scaleA.toFixed(3) + '); }');
      css.push('}');

      css.push('.qa-blob-' + i + ' {');
      css.push('  position: absolute;');
      css.push('  top: ' + blob.top.toFixed(1) + '%;');
      css.push('  left: ' + blob.left.toFixed(1) + '%;');
      css.push('  width: ' + blob.size.toFixed(0) + 'px;');
      css.push('  height: ' + blob.size.toFixed(0) + 'px;');
      css.push('  border-radius: 50%;');
      css.push('  background: ' + hsla(blob.color.h, blob.color.s, blob.color.l, blob.opacity) + ';');
      css.push('  filter: blur(' + blob.blur.toFixed(0) + 'px);');
      css.push('  will-change: transform;');
      css.push('  animation: ' + animName + ' ' + blob.speed.toFixed(1) + 's ease-in-out ' +
               blob.delay.toFixed(2) + 's infinite;');
      css.push('  pointer-events: none;');
      css.push('}');
    });

    // ── Partículas nuevas — cada una única ──────────────────────────────
    atm.particles.forEach(function(p, i) {
      var animName = 'qa-pdrift-' + styleSuffix + '-' + i;
      css.push('@keyframes ' + animName + ' {');
      css.push('  0%, 100% { opacity: ' + (p.opacityHigh * 0.35).toFixed(3) +
               '; transform: translate(0, 0); }');
      css.push('  50% { opacity: ' + p.opacityHigh.toFixed(3) +
               '; transform: translate(' + p.driftX.toFixed(1) + 'px, ' + p.driftY.toFixed(1) + 'px); }');
      css.push('}');

      css.push('.qa-particle-' + i + ' {');
      css.push('  position: absolute;');
      css.push('  top: ' + p.top.toFixed(1) + '%;');
      css.push('  left: ' + p.left.toFixed(1) + '%;');
      css.push('  width: ' + p.size.toFixed(2) + 'px;');
      css.push('  height: ' + p.size.toFixed(2) + 'px;');
      css.push('  background: ' + hsla(p.color.h, clamp(p.color.s * 0.7, 0, 1),
               clamp(p.color.l * 1.4, 0.4, 0.92), p.opacityHigh) + ';');
      css.push('  border-radius: 50%;');
      css.push('  animation: ' + animName + ' ' + p.speed.toFixed(1) + 's ease-in-out ' +
               p.delay.toFixed(2) + 's infinite;');
      css.push('  pointer-events: none;');
      css.push('}');
    });

    // ── Spark indicator color ───────────────────────────────────────────
    var spk = atm.sparkColor;
    css.push('#barraSparkIndicator {');
    css.push('  background: ' + hsl(spk.h, spk.s, clamp(spk.l * 1.5, 0.5, 0.88)) + ' !important;');
    css.push('  box-shadow: 0 0 10px 3px ' + hsla(spk.h, spk.s, spk.l, 0.7) +
             ', 0 0 20px 6px ' + hsla(spk.h, spk.s, spk.l, 0.30) + ' !important;');
    css.push('}');

    // ── Eyebrow text — sutilmente teñido ────────────────────────────────
    var ey = atm.eyebrowColor;
    css.push('#barraEyebrow {');
    css.push('  color: ' + hsla(ey.h, ey.s * 0.5, 0.85, 0.6) + ' !important;');
    css.push('}');

    // ── Inyectar CSS al DOM ─────────────────────────────────────────────
    var styleEl = document.createElement('style');
    styleEl.id = 'quantum-atmosphere-dynamic';
    styleEl.textContent = css.join('\n');

    if (lastStyleEl && lastStyleEl.parentNode) lastStyleEl.parentNode.removeChild(lastStyleEl);
    document.head.appendChild(styleEl);
    lastStyleEl = styleEl;

    // ── Inyectar elementos blob/particle dinámicos ──────────────────────
    var auroraContainer = document.getElementById('barraAurora');
    var dustContainer = document.getElementById('barraDust');

    if (auroraContainer) {
      var oldBlobs = auroraContainer.querySelectorAll('[data-qa-blob]');
      for (var ob = 0; ob < oldBlobs.length; ob++) oldBlobs[ob].parentNode.removeChild(oldBlobs[ob]);
      atm.blobs.forEach(function(_, i) {
        var div = document.createElement('div');
        div.className = 'qa-blob-' + i;
        div.setAttribute('data-qa-blob', '1');
        div.setAttribute('aria-hidden', 'true');
        auroraContainer.appendChild(div);
      });
    }

    if (dustContainer) {
      var oldParts = dustContainer.querySelectorAll('[data-qa-particle]');
      for (var op = 0; op < oldParts.length; op++) oldParts[op].parentNode.removeChild(oldParts[op]);
      atm.particles.forEach(function(_, i) {
        var div = document.createElement('div');
        div.className = 'qa-particle-' + i;
        div.setAttribute('data-qa-particle', '1');
        div.setAttribute('aria-hidden', 'true');
        dustContainer.appendChild(div);
      });
    }

    // ── Variables CSS del accent (input border, glow, "sientes") ────────
    var ac = atm.accentColor;
    overlay.style.setProperty('--bm-accent', hsl(ac.h, ac.s, ac.l));
    overlay.style.setProperty('--bm-accent-40', hsla(ac.h, ac.s, ac.l, 0.40));
    overlay.style.setProperty('--bm-accent-10', hsla(ac.h, ac.s, ac.l, 0.10));
    overlay.style.setProperty('--bm-accent-18', hsla(ac.h, ac.s, ac.l, 0.18));

    // ── BOTÓN GO (#barraSubmit) — gradient del accent + segundo color ───
    // CSS base lo deja en linear-gradient(135deg, #FF5E00, #FF0055) hardcoded.
    // Aquí lo hacemos coherente con el accent (palabra "sientes?").
    var submitBtn = document.getElementById('barraSubmit');
    if (submitBtn) {
      var ac2 = atm.palette.colors[Math.min(1, atm.palette.colors.length - 1)];
      submitBtn.style.background = 'linear-gradient(135deg, ' +
        hsl(ac.h, ac.s, ac.l) + ' 0%, ' +
        hsl(ac2.h, ac2.s, ac2.l) + ' 100%)';
      submitBtn.style.boxShadow =
        '0 6px 18px ' + hsla(ac.h, ac.s, ac.l, 0.40) + ', ' +
        'inset 0 1px 0 rgba(255, 255, 255, 0.25), ' +
        'inset 0 -1px 0 rgba(0, 0, 0, 0.15)';
    }

    // ── Telemetría de debug (consola) ───────────────────────────────────
    if (typeof console !== 'undefined' && console.log) {
      console.log('[Triggui Quantum] atmósfera nueva:',
        'strategy=' + atm.palette.strategy,
        'colors=' + atm.palette.colors.length,
        'blobs=' + atm.blobs.length,
        'particles=' + atm.particles.length,
        'gradients=' + atm.bgLayers.length,
        'baseHue=' + atm.palette.colors[0].h.toFixed(0));
    }
  }

  // ── HOOK: monkey-patch a BarraMagica.applyStrings ─────────────────────
  function install() {
    if (typeof BarraMagica !== 'object' || typeof BarraMagica.applyStrings !== 'function') return false;
    if (BarraMagica._quantumPatched) return true;

    var original = BarraMagica.applyStrings.bind(BarraMagica);
    BarraMagica.applyStrings = function() {
      var ret;
      try { ret = original.apply(BarraMagica, arguments); } catch (e) { console.error('[Triggui Quantum] applyStrings original error:', e); }
      try { applyAtmosphere(); } catch (e) { console.error('[Triggui Quantum] apply error:', e); }
      return ret;
    };
    BarraMagica._quantumPatched = true;

    // Aplicación inicial inmediata (la primera apertura ya tiene atmósfera nueva)
    try { applyAtmosphere(); } catch (e) { console.error('[Triggui Quantum] initial apply error:', e); }

    if (typeof console !== 'undefined' && console.log) console.log('[Triggui Quantum] instalado nivel dios');
    return true;
  }

  // ── Espera que BarraMagica esté listo, retry hasta 50 veces (50ms cada) ─
  function waitFor(predicate, action, attempts) {
    if (predicate()) { action(); return; }
    if (attempts <= 0) { console.warn('[Triggui Quantum] BarraMagica nunca apareció'); return; }
    setTimeout(function() { waitFor(predicate, action, attempts - 1); }, 50);
  }

  waitFor(
    function() { return typeof BarraMagica !== 'undefined' && typeof BarraMagica.applyStrings === 'function'; },
    install,
    50
  );
})();
