<script id="core-logic">
// ========================================
// 🧠 LOGICA DE DATOS (CORE BLINDADO)
// ========================================
function saveLocal(key, value) { try { localStorage.setItem('triggui_' + key, JSON.stringify(value)); } catch(e) {} }
function getLocal(key, defaultValue = null) { try { const data = localStorage.getItem('triggui_' + key); return data ? JSON.parse(data) : defaultValue; } catch(e) { return defaultValue; } }

function getPlatform() {
  const ua = navigator.userAgent || navigator.vendor || window.opera;
  if (/wv|WebView/i.test(ua) || (ua.includes("Android") && ua.includes("Version/"))) return "App/WebView";
  if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) return "iOS Web";
  if (/android/i.test(ua)) return "Android Web";
  return "Desktop";
}

window.reset = function() {
  localStorage.removeItem('triggui_books_opened');
  localStorage.removeItem('triggui_concepts');
  localStorage.removeItem('triggui_last_book_time');
  localStorage.removeItem('triggui_streak');
  localStorage.removeItem('triggui_last_visit');
  console.log('✅ Reset completo.');
}

let tapCount = 0;
let tapTimer = null;
let cardOpenedThisSession = false; 

function track(event, data = {}) {
  if (typeof gtag !== 'undefined') gtag('event', event, { event_category: 'app_engagement', ...data });
}

function updateStreak() {
  const today = new Date().toDateString();
  const lastVisit = getLocal('last_visit');
  let streak = getLocal('streak', 0);

  if (streak === 0) {
    streak = 1;
    saveLocal('streak', 1);
    saveLocal('last_visit', today);
    return 1;
  }

  if (lastVisit === today) return streak;

  const yesterday = new Date(Date.now() - 86400000).toDateString();
  const newStreak = (lastVisit === yesterday) ? streak + 1 : 1;
    
  saveLocal('streak', newStreak);
  saveLocal('last_visit', today);
  track('streak_updated', { streak: newStreak });
  return newStreak;
}

function incrementBooks() {
  const count = getLocal('books_opened', 0) + 1;
  saveLocal('books_opened', count);
  saveLocal('last_book_time', Date.now());
  track('book_opened', { total: count });
  return count;
}

function addConcepts(amount) {
  let current = getLocal('concepts', 0);
  const books = getLocal('books_opened', 0);
  if (current === 0 && books > 1) { current = books * 5; }
  const newVal = current + amount;
  saveLocal('concepts', newVal);
  return newVal;
}

function getRealisticUserCount() {
  const base = 28;
  const variance = Math.floor(Math.random() * 8);
  return base + variance;
}

// ══════════════════════════════════════════════════════════════════════════
// 🌍 SISTEMA I18N NIVEL DIOS — ES/EN con fallback gracioso
// ══════════════════════════════════════════════════════════════════════════
const TriggguiI18n = {
  detectLang: function() {
    const saved = getLocal('lang');
    if (saved === 'es' || saved === 'en') return saved;
    const nav = (navigator.language || navigator.userLanguage || 'es').toLowerCase();
    const detected = nav.startsWith('en') ? 'en' : 'es';
    saveLocal('lang', detected);
    return detected;
  },
  get: function(key) {
    const L = this.lang || 'es';
    return (this.strings[L] && this.strings[L][key]) || this.strings.es[key] || key;
  },
  fromBook: function(libro, field) {
    if (!libro) return '';
    if (this.lang === 'en') {
      const enKey = field + '_en';
      if (libro[enKey] !== undefined && libro[enKey] !== null && libro[enKey] !== '') {
        return libro[enKey];
      }
    }
    return libro[field];
  },
  fromTarjeta: function(libro, tarjetaField, innerField) {
    if (!libro) return '';
    if (this.lang === 'en') {
      const enKey = tarjetaField + '_en';
      if (libro[enKey] && libro[enKey][innerField] !== undefined && libro[enKey][innerField] !== null && libro[enKey][innerField] !== '') {
        return libro[enKey][innerField];
      }
    }
    return (libro[tarjetaField] && libro[tarjetaField][innerField]) || '';
  },
  setLang: function(newLang) {
    if (newLang !== 'es' && newLang !== 'en') return;
    this.lang = newLang;
    saveLocal('lang', newLang);
    track('lang_changed', { lang: newLang });
  },
  strings: {
    es: {
      'barra.question.lunes': '¿Qué necesitas hoy?',
      'barra.question.martes': '¿Qué te pesa?',
      'barra.question.miercoles': '¿Qué te inquieta?',
      'barra.question.jueves': '¿Qué quieres mover?',
      'barra.question.viernes': '¿Qué te enciende?',
      'barra.question.sabado': '¿Qué te calma?',
      'barra.question.domingo': '¿Qué sientes?',
      'barra.placeholder': 'Escribe en una frase…',
      'barra.skip': 'saltar → abrir libro del día',
      'barra.micro.starting': 'Triggui apenas comienza. Abramos el primero.',
      'barra.micro.growing': 'Catálogo creciendo día a día.',
      'barra.micro.robust': '',
      'barra.loading': 'encontrando tu libro…',
      'toast.langChanged.es': 'Español activado',
      'toast.langChanged.en': 'English activated',
      'badge.loading': 'Cargando…',
      'badge.days': 'días',
      'badge.day': 'día',
      'badge.books': 'libros',
      'badge.book': 'libro',
      'badge.sparks': 'chispas juntas',
      'badge.globalSparks': 'juntos',
      'intro.default': 'Toca. Descubre. El libro te espera.',
    },
    en: {
      'barra.question.lunes': 'What do you need today?',
      'barra.question.martes': 'What\'s weighing on you?',
      'barra.question.miercoles': 'What\'s on your mind?',
      'barra.question.jueves': 'What do you want to shift?',
      'barra.question.viernes': 'What lights you up?',
      'barra.question.sabado': 'What calms you?',
      'barra.question.domingo': 'What are you feeling?',
      'barra.placeholder': 'Type in one sentence…',
      'barra.skip': 'skip → open today\'s book',
      'barra.micro.starting': 'Triggui is just beginning. Let\'s open the first one.',
      'barra.micro.growing': 'Catalog growing every day.',
      'barra.micro.robust': '',
      'barra.loading': 'finding your book…',
      'toast.langChanged.es': 'Español activado',
      'toast.langChanged.en': 'English activated',
      'badge.loading': 'Loading…',
      'badge.days': 'days',
      'badge.day': 'day',
      'badge.books': 'books',
      'badge.book': 'book',
      'badge.sparks': 'sparks together',
      'badge.globalSparks': 'together',
      'intro.default': 'Tap. Discover. Your book awaits.',
    }
  }
};
TriggguiI18n.lang = TriggguiI18n.detectLang();

// ══════════════════════════════════════════════════════════════════════════
// 🎯 BARRA MÁGICA — gestión de visibilidad diaria
// ══════════════════════════════════════════════════════════════════════════
const BarraMagica = {
  shouldShowToday: function() {
    const today = new Date().toDateString();
    const lastShown = getLocal('barra_last_shown');
    return lastShown !== today;
  },
  markShownToday: function() {
    saveLocal('barra_last_shown', new Date().toDateString());
  },
  getQuestionKey: function() {
    const d = new Date().getDay();
    const map = ['domingo','lunes','martes','miercoles','jueves','viernes','sabado'];
    return 'barra.question.' + map[d];
  },
  getMicroCopyKey: function(catSize) {
    if (catSize < 5) return 'barra.micro.starting';
    if (catSize < 50) return 'barra.micro.growing';
    return 'barra.micro.robust';
  }
};

function luminance(hex) { try { const c = hex.replace("#","").match(/.{1,2}/g).map(x=>parseInt(x,16)/255); const f = v => v<=.03928 ? v/12.92 : Math.pow((v+.055)/1.055,2.4); return 0.2126*f(c[0])+0.7152*f(c[1])+0.0722*f(c[2]); } catch { return 0; } }
function pickTextColor(bg) { try { return luminance(bg) > 0.35 ? "#000" : "#fff"; } catch { return "#fff"; } }

function hexToRgba(hex, alpha) {
  try {
    const clean = String(hex || '').replace('#', '').trim();
    const full = clean.length === 3 ? clean.split('').map(c => c + c).join('') : clean;
    const [r, g, b] = full.match(/.{1,2}/g).map(x => parseInt(x, 16));
    return `rgba(${r}, ${g}, ${b}, ${alpha})`;
  } catch {
    return `rgba(255, 232, 115, ${alpha})`;
  }
}

function normalizeHighlightSyntax(text) {
  let value = String(text || '').trim();
  if (!value) return '';

  value = value
    .replace(/\{\{H\}\}/gi, '[H]')
    .replace(/\{\{\/H\}\}/gi, '[/H]')
    .replace(/\[h\]/g, '[H]')
    .replace(/\[\/h\]/g, '[/H]');

  let toggleOpen = true;
  value = value.replace(/\[H\]/g, () => {
    const token = toggleOpen ? '[H]' : '[/H]';
    toggleOpen = !toggleOpen;
    return token;
  });

  const openCount = (value.match(/\[H\]/g) || []).length;
  const closeCount = (value.match(/\[\/H\]/g) || []).length;

  if (openCount > closeCount) {
    value += '[/H]'.repeat(openCount - closeCount);
  }

  let extraClose = (value.match(/\[\/H\]/g) || []).length - (value.match(/\[H\]/g) || []).length;
  while (extraClose > 0) {
    const idx = value.lastIndexOf('[/H]');
    if (idx === -1) break;
    value = value.slice(0, idx) + value.slice(idx + 4);
    extraClose--;
  }

  return value.replace(/\[H\]\s*\[\/H\]/g, '').replace(/[ \t]{2,}/g, ' ').trim();
}

function cleanHighlightTokens(text) {
  return normalizeHighlightSyntax(text).replace(/\[H\]|\[\/H\]/gi, '');
}

function renderMarkerHTML(text) {
  return normalizeHighlightSyntax(text).replace(/\[H\]([\s\S]*?)\[\/H\]/gi, '<span class="marker-highlight">$1</span>');
}

// 🔥 SISTEMA DE GESTIÓN DE BOTONES (DECLARADO UNA SOLA VEZ)
let activeResetTimers = new Map();
let visibilityHandler = null;
let pagehideHandler = null;
let cardClickHandler = null;

const resetAllButtons = () => {
  document.querySelectorAll('.btn-action.is-opening').forEach(btn => {
    btn.classList.remove('is-opening');
    const span = btn.querySelector('span:not(.btn-emoji)');
    const emojiSpan = btn.querySelector('.btn-emoji');
    const action = btn.dataset.action;
    
    if (span && action) {
      // Botones con texto (Comprar, Penguin)
      if (action === 'penguin') span.textContent = 'Explorar en Penguin';
      else if (action === 'buscalibre-comprar') span.textContent = 'Comprar';
    } else if (emojiSpan && action === 'buscalibre-explorar') {
      // Botón explorar (solo emoji)
      emojiSpan.textContent = '🔮';
    }
  });
  activeResetTimers.forEach(timer => clearTimeout(timer));
  activeResetTimers.clear();
};

const cleanupCardListeners = () => {
  const card = document.getElementById("tarjetaCard");
  
  // Remover event listeners
  if (visibilityHandler) {
    document.removeEventListener('visibilitychange', visibilityHandler);
    visibilityHandler = null;
  }
  if (pagehideHandler) {
    window.removeEventListener('pagehide', pagehideHandler);
    pagehideHandler = null;
  }
  if (cardClickHandler && card) {
    card.removeEventListener('click', cardClickHandler, true);
    cardClickHandler = null;
  }
  
  // Limpiar timers y estado
  resetAllButtons();
};

btnShare.onclick = () => {
  const tBase = libro.tarjeta; 
  const tEn = libro.tarjeta_en;
  const useEn = TriggguiI18n.lang === 'en' && tEn && tEn.parrafoTop;
  const t = useEn ? tEn : tBase;
  const tStyle = (tEn && tEn.style) || tBase.style || {};
  const overlay = document.getElementById("tarjetaOverlay");
  const card = document.getElementById("tarjetaCard");
  
  if (!cardOpenedThisSession) {
    addConcepts(1); updateBadge(); cardOpenedThisSession = true;
  }

  // Limpiar listeners previos si existen
  cleanupCardListeners();

  // Estilos del JSON (siempre del style base para consistencia visual)
  const sPaper = tStyle.paper || tBase.style?.paper || "#fff"; 
  const sInk = tStyle.ink || tBase.style?.ink || "#111"; 
  const sAccent = tStyle.accent || tBase.style?.accent || "#30ffe4";
  const sSerif = tStyle.serif || tBase.style?.serif || "'Playfair Display', serif";
  const sSans = tStyle.sans || tBase.style?.sans || "'Archivo', sans-serif";
  const palabrasForCard = TriggguiI18n.lang === 'en' && Array.isArray(libro.palabras_en) && libro.palabras_en.length > 0 ? libro.palabras_en : libro.palabras;
  const p = palabrasForCard && palabrasForCard.length > 0 ? palabrasForCard[Math.floor(Math.random()*palabrasForCard.length)] : "";
  const tituloCard = TriggguiI18n.fromBook(libro, 'titulo');

  // Inyectar variables CSS
  card.style.setProperty('--paper-col', sPaper);
  card.style.setProperty('--ink-col', sInk);
  card.style.setProperty('--accent-col', sAccent);
  card.style.setProperty('--serif-font', sSerif);
  card.style.setProperty('--sans-font', sSans);

  // Modo Oscuro
  const isDark = pickTextColor(sPaper) === '#fff';
  card.style.setProperty('--marker-col', isDark ? hexToRgba(sAccent, 0.34) : hexToRgba(sAccent, 0.24));
  if (isDark) { card.classList.add('card-dark-mode'); } 
  else { card.classList.remove('card-dark-mode'); }

  // URLs precalculadas
  const buscarlibreURL = `https://www.buscalibre.com.mx/libros/search/?q=${encodeURIComponent(tituloCard + ' ' + libro.autor)}`;
  const explorarURL = `https://www.buscalibre.com.mx/libros/search/?q=${encodeURIComponent(p)}`;
  const penguinURL = `https://www.penguinlibros.com/mx/?mot_q=${encodeURIComponent(p)}`;
  const portadaCardHTML = isURL(libro.portada)
    ? `<img src="${libro.portada}" alt="${tituloCard}" class="card-cover-float" loading="lazy">`
    : "";

  card.innerHTML = `
    <button class="card-lupa-btn" type="button" aria-label="Abrir barra mágica" onclick="event.stopPropagation(); window.closeCard(); setTimeout(function(){ BarraMagica.openOverlay(true); }, 350);">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="7"/>
        <path d="M20 20l-3.5-3.5"/>
      </svg>
    </button>
    <div class="card-content-wrap">
      
      <div class="card-header-logo">
        <img src="https://raw.githubusercontent.com/badirnakid/triggui-app/main/public/trigguiletras2.png" 
             alt="Triggui"
             style="filter: ${isDark ? 'invert(1) brightness(1.5)' : 'none'};">
      </div>
      
      <div class="card-header">
        <div class="card-title">${tituloCard}</div>
        <div class="card-author">${libro.autor}</div>
        <div class="card-divider"></div>
      </div>
      
      <div class="card-body">
        <div class="card-copy-top" style="margin-bottom:18px;">${portadaCardHTML}${renderMarkerHTML(t.parrafoTop)}</div>
        <div class="card-highlight">${cleanHighlightTokens(t.subtitulo)}</div>
        <div>${renderMarkerHTML(t.parrafoBot)}</div>
      </div>

      <div class="card-actions">
        
        <div class="buscalibre-row">
          <a href="${buscarlibreURL}" 
             target="_blank" 
             rel="noopener noreferrer"
             class="btn-action btn-comprar"
             data-action="buscalibre-comprar">
             <img src="https://raw.githubusercontent.com/badirnakid/triggui-app/main/public/buscalibre.png" 
                  alt="Buscalibre">
             <span>Comprar</span>
          </a>
          
          <a href="${explorarURL}" 
             target="_blank" 
             rel="noopener noreferrer"
             class="btn-action btn-explorar"
             data-action="buscalibre-explorar">
             <span class="btn-emoji">🔮</span>
          </a>
        </div>
        
        <a href="${penguinURL}" 
           target="_blank" 
           rel="noopener noreferrer"
           class="btn-action btn-penguin"
           data-action="penguin">
           <img src="logopenguin.png" 
                alt="Penguin Random House">
           <span>Explorar en Penguin</span>
        </a>
        </div>
    </div>
  `;

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // 🎯 EVENT DELEGATION SUPREMO (NIVEL DIOS TODOPODEROSO)
  // Sistema inteligente SIN MEMORY LEAKS - Listeners se remueven al cerrar
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  
  // Crear handlers únicos para esta apertura
  visibilityHandler = () => {
    if (document.visibilityState === 'visible') {
      resetAllButtons();
    }
  };
  
  pagehideHandler = resetAllButtons;
  
  cardClickHandler = function(e) {
    const target = e.target.closest('[data-action]');
    if (!target) return;
    
    e.stopPropagation();
    
    const action = target.dataset.action;
    const isLocked = target.classList.contains('is-opening');
    
    if (isLocked) {
      e.preventDefault();
      return;
    }
    
    // Feedback táctil instantáneo
    try { if(navigator.vibrate) navigator.vibrate(15); } catch(_) {}
    
    // Estado visual inmediato
    target.classList.add('is-opening');
    
    // 🎯 MANEJO INTELIGENTE: Botones con texto vs botón solo emoji
    const span = target.querySelector('span:not(.btn-emoji)');
    const emojiSpan = target.querySelector('.btn-emoji');
    
    let originalText = '';
    
    if (span) {
      // Botones con texto (Comprar, Penguin)
      originalText = span.textContent;
      span.textContent = 'Abriendo...';
    } else if (emojiSpan && action === 'buscalibre-explorar') {
      // Botón explorar (solo emoji): 🔮 → ⏳
      originalText = emojiSpan.textContent;
      emojiSpan.textContent = '⏳';
    }
    
    // Tracking asíncrono
    try { 
      track(`${action}_clicked`, { book: libro.titulo }); 
    } catch(_) {}
    
    // 🎯 TIMEOUT DINÁMICO: Penguin (antes enviaflores) puede necesitar más tiempo
    const timeoutDuration = action === 'penguin' ? 8000 : 4000;
    
    const timerId = setTimeout(() => {
      target.classList.remove('is-opening');
      if (span) {
        span.textContent = originalText;
      } else if (emojiSpan) {
        emojiSpan.textContent = originalText;
      }
      activeResetTimers.delete(target);
    }, timeoutDuration);
    
    activeResetTimers.set(target, timerId);
  };
  
  // Registrar listeners
  document.addEventListener('visibilitychange', visibilityHandler);
  window.addEventListener('pagehide', pagehideHandler);
  card.addEventListener('click', cardClickHandler, true);

  // Mostrar overlay
  overlay.style.display="flex";
  setTimeout(() => overlay.classList.add('visible'), 10);
  track('card_viewed', { book: libro.titulo });
};

// LOGICA DE CIERRE (MÁXIMA PRIORIDAD + LIMPIEZA DE MEMORIA)
window.handleCardClick = function(e) {
  if (e.target.closest('a') || e.target.closest('button')) {
    e.stopPropagation();
    return;
  }
  window.closeCard();
}

window.closeCard = function() {
  const overlay = document.getElementById("tarjetaOverlay");
  overlay.classList.remove('visible');
  setTimeout(() => { 
    overlay.style.display="none";
    // Limpiar listeners y timers al cerrar
    cleanupCardListeners();
  }, 300);
}

// ══════════════════════════════════════════════════════════════════════════
// 🔍 MOTOR DE FILTRO ADAPTATIVO — Buscador semántico sobre catálogo curado
// Escala: 1 libro → 150 libros → 700+ libros con _nucleus.book_grounding_anchors
// Costo por consulta: $0 · Latencia: <50ms · 100% client-side
// ══════════════════════════════════════════════════════════════════════════
const TrigguiFiltro = {
  normalize: function(s) {
    return String(s || '')
      .toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^\w\s]/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();
  },
  tokenize: function(s) {
    const stopES = new Set(['el','la','los','las','un','una','unos','unas','de','del','al','a','en','y','o','u','pero','si','no','que','como','con','por','para','me','te','se','lo','le','les','mi','tu','su','es','son','ser','estar','muy','mas','mucho','hoy','ya','aun','tambien','pues','solo','solo']);
    const stopEN = new Set(['the','a','an','is','are','was','were','be','been','being','to','of','and','or','but','if','in','on','at','by','for','with','about','as','from','up','down','out','off','over','under','into','onto','this','that','these','those','i','me','my','you','your','he','she','it','we','they','what','which','who','how','why','very','much','really','too','just','so','also']);
    const stop = TriggguiI18n.lang === 'en' ? stopEN : stopES;
    return this.normalize(s).split(' ').filter(t => t.length >= 3 && !stop.has(t));
  },
  extractCorpus: function(libro) {
    const useEn = TriggguiI18n.lang === 'en';
    const parts = [];
    if (useEn && libro.titulo_en) parts.push(libro.titulo_en); else parts.push(libro.titulo || '');
    parts.push(libro.autor || '');
    const palabras = useEn && Array.isArray(libro.palabras_en) ? libro.palabras_en : (libro.palabras || []);
    parts.push(palabras.join(' '));
    const frases = useEn && Array.isArray(libro.frases_en) ? libro.frases_en : (libro.frases || []);
    parts.push(frases.join(' '));
    parts.push(libro.tagline || '');
    parts.push(libro.dimension || '');
    parts.push(libro.punto || '');
    const tarjeta = useEn && libro.tarjeta_en ? libro.tarjeta_en : libro.tarjeta;
    if (tarjeta) {
      parts.push(tarjeta.subtitulo || '');
      parts.push(tarjeta.parrafoTop || '');
      parts.push(tarjeta.parrafoBot || '');
    }
    if (libro._nucleus && libro._nucleus.book_grounding_anchors) {
      const a = libro._nucleus.book_grounding_anchors;
      if (Array.isArray(a.concepts)) parts.push(a.concepts.join(' '));
      if (Array.isArray(a.key_terms)) parts.push(a.key_terms.join(' '));
    }
    return this.normalize(parts.join(' '));
  },
  scoreLibro: function(libro, queryTokens) {
    if (!queryTokens.length) return 0;
    const corpus = this.extractCorpus(libro);
    let score = 0;
    const palabras = (TriggguiI18n.lang === 'en' && Array.isArray(libro.palabras_en) ? libro.palabras_en : (libro.palabras || [])).map(p => this.normalize(p));
    const palabrasSet = new Set(palabras);
    const titulo = this.normalize(TriggguiI18n.fromBook(libro, 'titulo'));
    const autor = this.normalize(libro.autor || '');
    for (const tok of queryTokens) {
      if (!tok) continue;
      if (palabrasSet.has(tok)) score += 8;
      for (const p of palabras) {
        if (p !== tok && (p.includes(tok) || tok.includes(p))) { score += 3; break; }
      }
      if (titulo.includes(tok)) score += 6;
      if (autor.includes(tok)) score += 5;
      const reg = new RegExp('\\b' + tok.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'g');
      const matches = corpus.match(reg);
      if (matches) score += matches.length * 1.5;
      if (!matches && corpus.includes(tok)) score += 0.5;
    }
    if (libro.dimension) {
      const dimNorm = this.normalize(libro.dimension);
      for (const tok of queryTokens) if (dimNorm.includes(tok)) score += 2;
    }
    return score;
  },
  cronoBoost: function(libro) {
    const now = new Date();
    const hour = now.getHours();
    const day = now.getDay();
    let boost = 0;
    const punto = String(libro.punto || '').toLowerCase();
    if (hour >= 5 && hour < 10) {
      if (punto.includes('cero') || punto.includes('creativo')) boost += 1.5;
    } else if (hour >= 10 && hour < 14) {
      if (punto.includes('activo') || punto.includes('maximo') || punto.includes('máximo')) boost += 1.5;
    } else if (hour >= 14 && hour < 18) {
      if (punto.includes('activo')) boost += 1;
    } else if (hour >= 18 && hour < 22) {
      if (punto.includes('creativo') || punto.includes('cero')) boost += 1;
    } else {
      if (punto.includes('cero')) boost += 0.8;
    }
    if (day === 4 && punto.includes('maximo')) boost += 0.8;
    if ((day === 0 || day === 6) && punto.includes('cero')) boost += 0.5;
    return boost;
  },
  filter: function(libros, query) {
    if (!libros || libros.length === 0) return null;
    if (libros.length === 1) return { libro: libros[0], index: 0, score: 0, reason: 'solo' };
    const tokens = this.tokenize(query);
    if (tokens.length === 0) {
      const idx = Math.floor(Math.random() * libros.length);
      return { libro: libros[idx], index: idx, score: 0, reason: 'empty' };
    }
    const scored = libros.map((libro, index) => {
      const base = this.scoreLibro(libro, tokens);
      const crono = base > 0 ? this.cronoBoost(libro) : 0;
      return { libro, index, score: base + crono };
    });
    scored.sort((a, b) => b.score - a.score);
    if (scored[0].score < 1.5) {
      const topFew = scored.slice(0, Math.min(3, scored.length));
      const pick = topFew[Math.floor(Math.random() * topFew.length)];
      return { ...pick, reason: 'fallback' };
    }
    const topGroup = scored.filter(s => s.score >= scored[0].score * 0.85).slice(0, 3);
    const pick = topGroup[Math.floor(Math.random() * topGroup.length)];
    return { ...pick, reason: 'match' };
  }
};

// 🎯 BarraMagica — control de UI (extiende el objeto ya definido)
// ══════════════════════════════════════════════════════════════════════════
BarraMagica.applyStrings = function() {
  const qEl = document.getElementById('barraQuestion');
  const iEl = document.getElementById('barraInput');
  const sEl = document.getElementById('barraSkip');
  if (qEl) qEl.textContent = TriggguiI18n.get(this.getQuestionKey());
  if (iEl) iEl.placeholder = TriggguiI18n.get('barra.placeholder');
  if (sEl) sEl.textContent = TriggguiI18n.get('barra.skip');
  const microEl = document.getElementById('barraMicro');
  if (microEl && window.__TRIGGUI_DATA__ && window.__TRIGGUI_DATA__.libros) {
    const key = this.getMicroCopyKey(window.__TRIGGUI_DATA__.libros.length);
    microEl.textContent = TriggguiI18n.get(key);
  }
  const esEl = document.getElementById('langToggleEs');
  const enEl = document.getElementById('langToggleEn');
  if (esEl && enEl) {
    if (TriggguiI18n.lang === 'en') { esEl.className = 'lang-inactive'; enEl.className = 'lang-active'; }
    else { esEl.className = 'lang-active'; enEl.className = 'lang-inactive'; }
  }
};
BarraMagica.openOverlay = function(force) {
  if (!force && !this.shouldShowToday()) return false;
  const overlay = document.getElementById('barraMagicaOverlay');
  if (!overlay) return false;
  this.applyStrings();
  overlay.style.display = 'flex';
  requestAnimationFrame(() => {
    overlay.classList.add('visible');
    setTimeout(() => {
      const inp = document.getElementById('barraInput');
      if (inp && !('ontouchstart' in window)) inp.focus();
    }, 400);
  });
  const lupa = document.getElementById('barraLupaBtn');
  if (lupa) lupa.classList.remove('visible');
  track('barra_opened', { force: !!force, lang: TriggguiI18n.lang });
  return true;
};
BarraMagica.closeOverlay = function(skipped) {
  const overlay = document.getElementById('barraMagicaOverlay');
  if (!overlay) return;
  overlay.classList.remove('visible');
  setTimeout(() => { overlay.style.display = 'none'; }, 600);
  this.markShownToday();
  if (revealed) {
    const lupa = document.getElementById('barraLupaBtn');
    if (lupa) lupa.classList.add('visible');
  }
  track('barra_closed', { skipped: !!skipped });
};
BarraMagica.submit = function(query) {
  const data = window.__TRIGGUI_DATA__;
  if (!data || !data.libros || data.libros.length === 0) { this.closeOverlay(true); return; }
  const q = String(query || '').trim();
  const result = TrigguiFiltro.filter(data.libros, q);
  if (q) {
    try {
      const hist = getLocal('queries_history', []);
      hist.push({ q: q.slice(0, 140), t: Date.now(), lang: TriggguiI18n.lang, dow: new Date().getDay(), hour: new Date().getHours() });
      saveLocal('queries_history', hist.slice(-50));
    } catch(_) {}
    track('barra_query', { len: q.length, lang: TriggguiI18n.lang, reason: result?.reason || 'none', dow: new Date().getDay(), hour: new Date().getHours() });
  } else {
    track('barra_skipped');
  }
  if (result && result.libro) {
    libro = result.libro;
    sessionStorage.setItem('lastLibroIdx', String(result.index));
  }
  this.closeOverlay(!q);
  render();
  updateBadge();
  if (!getLocal('has_visited')) {
    setTimeout(() => {
      document.querySelectorAll('.block').forEach(b => b.classList.add('first-visit-hint'));
      saveLocal('has_visited', true);
    }, 500);
  }
};

// 🎯 Wiring de eventos de la barra mágica
// ══════════════════════════════════════════════════════════════════════════
function wireBarraMagicaEvents() {
  const input = document.getElementById('barraInput');
  const submit = document.getElementById('barraSubmit');
  const skip = document.getElementById('barraSkip');
  const langToggle = document.getElementById('barraLangToggle');
  const lupa = document.getElementById('barraLupaBtn');

  if (input && submit) {
    const doSubmit = () => {
      const q = input.value;
      submit.disabled = true;
      BarraMagica.submit(q);
    };
    submit.addEventListener('click', doSubmit);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSubmit(); }
    });
  }
  if (skip) {
    skip.addEventListener('click', () => { BarraMagica.submit(''); });
  }
  if (langToggle) {
    langToggle.addEventListener('click', () => {
      const newLang = TriggguiI18n.lang === 'en' ? 'es' : 'en';
      TriggguiI18n.setLang(newLang);
      BarraMagica.applyStrings();
      const toast = document.getElementById('toast');
      if (toast) {
        toast.textContent = TriggguiI18n.get('toast.langChanged.' + newLang);
        toast.classList.add('visible');
        setTimeout(() => toast.classList.remove('visible'), 2000);
      }
      try {
        const overlay = document.getElementById('barraMagicaOverlay');
        if (!overlay || !overlay.classList.contains('visible')) {
          if (libro) { render(); updateBadge(); }
        }
      } catch(_) {}
    });
  }
  if (lupa) {
    lupa.addEventListener('click', () => { BarraMagica.openOverlay(true); });
  }
}

// INIT
function isWebView(){ const ua=navigator.userAgent||navigator.vendor||window.opera; return (/wv/i.test(ua)||/WebView/i.test(ua)||(ua.includes("Android")&&ua.includes("Version/"))||(ua.includes("iPhone")&&!ua.includes("Safari"))); }
if(isWebView()) document.body.classList.add("webview");

function pickLibroNoRepetido(libros){
  let last=sessionStorage.getItem("lastLibroIdx"); if(last!==null)last=parseInt(last);
  let idx=Math.floor(Math.random()*libros.length);
  if(idx===last){ idx=Math.floor(Math.random()*libros.length); if(idx===last)idx=(idx+1)%libros.length; }
  sessionStorage.setItem("lastLibroIdx", idx); return idx;
}

(async()=>{
  try{
    const r=await fetch("https://raw.githubusercontent.com/badirnakid/triggui-content/main/contenido.json?ts="+Date.now());
    const data=await r.json();
    window.__TRIGGUI_DATA__ = data;
    wireBarraMagicaEvents();
    const shouldShow = BarraMagica.shouldShowToday();
    if (shouldShow && data.libros && data.libros.length >= 1) {
      BarraMagica.openOverlay(false);
      libro = data.libros[pickLibroNoRepetido(data.libros)];
    } else {
      libro = data.libros[pickLibroNoRepetido(data.libros)];
      render();
      if (revealed === false) {
        const lupa = document.getElementById('barraLupaBtn');
        if (lupa) setTimeout(() => lupa.classList.add('visible'), 1200);
      }
    }
    updateBadge();
    refreshGlobalCounter();
    track('app_loaded', {streak:getLocal('streak',0), books:getLocal('books_opened',0), lang: TriggguiI18n.lang});

    if (!getLocal('has_visited') && !shouldShow) {
      setTimeout(() => {
        document.querySelectorAll('.block').forEach(b => b.classList.add('first-visit-hint'));
        saveLocal('has_visited', true);
      }, 100);
    }
    
  }catch(e){ 
    console.error('[Triggui] init error:', e);
    wireBarraMagicaEvents();
  }
})();
</script>

<script id="js-react-native-bridge">
  const signalFirstPaint = () => { requestAnimationFrame(() => { try { window.ReactNativeWebView?.postMessage("FIRST_PAINT"); } catch (_) {} }); };
  if (document.readyState === "interactive" || document.readyState === "complete") { signalFirstPaint(); } else { document.addEventListener("DOMContentLoaded", signalFirstPaint, { once: true }); }
</script>

</body>
