<style id="base-styles">
  html, body { 
    background:#000000 !important; 
    color:#fff; 
    margin:0; 
    padding:0; 
    height:100%; 
    font-family:'Archivo',sans-serif; 
    -webkit-overflow-scrolling:touch; 
    -webkit-text-size-adjust: 100%; 
    text-size-adjust: 100%; 
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    touch-action: manipulation; /* FIX: Elimina el retraso de 300ms al tocar */
  }
  
  /* Fondo animado "Deep Space" — v9: azul espacio + teal sutil, nada rojizo.
     Compagina mucho mejor con la aurora cromática de la barra mágica. */
  body::before { 
    content:""; 
    position:fixed; 
    inset:0; 
    background:
      radial-gradient(ellipse at 30% 20%, rgba(40, 100, 220, 0.14), transparent 65%),
      radial-gradient(ellipse at 70% 80%, rgba(80, 230, 200, 0.06), transparent 65%);
    z-index:-1; 
    pointer-events:none;
    opacity: 0.9;
  }

  /* 🌒 v11 BOOT GATE INMEDIATO — LO PRIMERO QUE SE VE ES LA BARRA MÁGICA. PUNTO.
     
     El CSS se evalúa en el MOMENTO de primer paint. Como el <script> que
     agrega `html.booting` corre ANTES del primer paint, usamos `html.booting`
     como selector principal. Así los bloques JAMÁS son visibles, ni siquiera
     por 16ms (un frame).
     
     `body.booting` también existe como capa 2 de seguridad por si algún
     navegador renderiza antes de que html.booting tome efecto.
     
     Lo que esconde durante el boot:
       - .intro (letrero rojizo con gradiente fosforescente animado)
       - .block (los 4 cuadros de colores del libro)
       - #likeBtnTarjeta, #barraLupaBtn, .card-reveal-trigger
     
     Se usa visibility:hidden (no display:none) para que el layout no se
     reacomode al revelarse. */
  html.booting .intro,
  html.booting #likeBtnTarjeta,
  html.booting #barraLupaBtn,
  html.booting #progressBadge,
  html.booting #toast,
  html.booting .card-reveal-trigger,
  body.booting .intro,
  body.booting #likeBtnTarjeta,
  body.booting #barraLupaBtn,
  body.booting #progressBadge,
  body.booting #toast,
  body.booting .card-reveal-trigger {
    visibility: hidden !important;
    opacity: 0 !important;
    animation: none !important;
  }

  /* ═══════════════════════════════════════════════════════════════════════
     🌒 v19 ARQUITECTURA "BOOT COMO ESTADO, NO COMO COREOGRAFÍA"
     ═══════════════════════════════════════════════════════════════════════
     
     Diagnóstico cuántico real (v15-v18 fallaron porque atacaban el síntoma):
     
     El bug NO era "los bloques se ven aunque están ocultos". El bug era
     "los bloques entran al render tree antes de que el estado inicial
     visual esté cerrado por contrato CSS". 
     
     v15-v18 intentaban controlar QUE pinta JS y CUÁNDO. Pero mientras la
     pantalla "¿Cómo te sientes?" dependiera de JS + doble rAF + transitionend
     + setTimeout fallback para encenderse, SIEMPRE existía una ventana
     entre el primer paint y el JS donde la app principal podía ser
     candidata visual.
     
     Solución arquitectónica (no parche): el overlay debe ser el ESTADO
     INICIAL ESTRUCTURAL del documento, visible desde el primer paint POR
     CONTRATO CSS, no por JavaScript.
     
     Mecanismo:
       1. <html> nace con clase "mood-active" desde el HTML inicial
       2. CSS hace que el overlay sea visible cuando mood-active esté presente
       3. CSS oculta TODA la app principal (no solo .block) durante mood-active
       4. JS NO necesita hacer fade-in en el boot inicial — el overlay ya
          está visible. Solo debe cargar datos, renderizar bloques DETRÁS
          del overlay, y al final quitar mood-active (con fade-out al
          submitear, o sin fade en boot inicial)
       
     El primer frame que ve el usuario es: NEGRO + barra mágica. PUNTO. */
  
  /* 🌒 v19.1: SEPARACIÓN DE RESPONSABILIDADES (corrección crítica)
     
     Bug detectado en v19.0: ambas clases (booting y mood-active) forzaban
     opacity:1 !important al overlay. Esto hacía que la cinematografía de
     re-apertura (openOverlay con fade-in 450ms) NO funcionara, porque
     CSS !important ganaba contra el style.opacity = '0' inline de JS.
     
     Solución cuántica: separar estrictamente las responsabilidades:
     
     - `booting` controla PRIMER PAINT (blindaje absoluto, opacity:1 forzado,
       transition:none). Solo activa en el boot inicial. Se quita después
       de finishBootOnce() — momento en que el overlay puede animar.
     
     - `mood-active` controla el ESTADO de "hay barra activa". Mantiene
       overlay montado (display:flex, pointer-events) y esconde app principal,
       PERO no fuerza opacity. Así openOverlay puede hacer fade-in cuando el
       usuario reabre la barra desde la lupa, y closeOverlay puede hacer
       fade-out cuando submitea.
  */
  
  /* `booting`: blindaje absoluto del primer paint */
  html.booting #barraMagicaOverlay {
    display: flex !important;
    opacity: 1 !important;
    pointer-events: auto !important;
    transition: none !important;
  }
  
  /* `mood-active`: overlay montado, app principal escondida.
     NO fuerza opacity para permitir animaciones JS controladas. */
  html.mood-active #barraMagicaOverlay {
    display: flex !important;
    pointer-events: auto !important;
  }
  
  /* Durante mood-active O booting: app principal completamente fuera del 
     render tree. Imposible que pinte porque no existe estructuralmente. */
  html.mood-active #grid,
  html.mood-active .grid,
  html.mood-active .intro,
  html.mood-active .cta,
  html.mood-active #cta,
  html.mood-active #progressBadge,
  html.mood-active #barraLupaBtn,
  html.mood-active #tarjetaOverlay,
  html.mood-active #cele,
  html.booting #grid,
  html.booting .grid,
  html.booting .cta,
  html.booting #cta,
  html.booting #tarjetaOverlay,
  html.booting #cele,
  html.booting .block,
  body.booting .block {
    display: none !important;
  }
  
  /* Fallback extra: si por cualquier motivo el JS no corre, la intro se 
     muestra con su animación original tras 300ms. No es lo ideal pero 
     evita pantalla negra eterna si hay bloqueo de scripts. */
  html.no-js body .intro,
  html.script-error body .intro {
    visibility: visible !important;
    opacity: 1 !important;
  }
</style>

<script id="boot-gate">
  // 🌒 v11: Gate INMEDIATO — ANTES del primer paint.
  // El <script> es síncrono y corre durante el parse del HTML,
  // ANTES de que el browser pinte nada. Esto garantiza que ningún
  // elemento aparezca por un solo frame.
  //
  // html.booting y body.booting se remueven SINCRONIZADAMENTE en
  // bootTriggui(), justo cuando el overlay de la barra mágica está
  // 100% listo con strings y colores aplicados.
  document.documentElement.classList.add('booting');
  document.addEventListener('DOMContentLoaded', () => {
    document.body.classList.add('booting');
  }, { once: true });
</script>

<script id="core-logic">
// ========================================
// 🧠 LOGICA DE DATOS (CORE BLINDADO)
// ========================================
// 🌒 v8: saveLocal/getLocal con telemetría de errores (1 vez por sesión).
// En Safari modo privado, WebView estricto, o quota exhausted, localStorage
// puede lanzar QuotaExceededError o SecurityError. Antes se silenciaban
// silenciosamente sin saber cuántos usuarios estaban afectados. Ahora se
// reporta a GA el primer fallo de cada sesión para tener visibilidad.
let __trigguiStorageErrorReported = false;
function __reportStorageError(op, err) {
  if (__trigguiStorageErrorReported) return;
  __trigguiStorageErrorReported = true;
  try {
    if (typeof gtag !== 'undefined') {
      gtag('event', 'storage_error', {
        event_category: 'app_error',
        op: op,
        name: (err && err.name) || 'Unknown',
        message: String((err && err.message) || err).slice(0, 80)
      });
    }
  } catch(_) {}
}
function saveLocal(key, value) {
  try { localStorage.setItem('triggui_' + key, JSON.stringify(value)); }
  catch(e) { __reportStorageError('set', e); }
}
function getLocal(key, defaultValue = null) {
  try {
    const data = localStorage.getItem('triggui_' + key);
    return data ? JSON.parse(data) : defaultValue;
  } catch(e) {
    __reportStorageError('get', e);
    return defaultValue;
  }
}

function getPlatform() {
  const ua = navigator.userAgent || navigator.vendor || window.opera;
  if (/wv|WebView/i.test(ua) || (ua.includes("Android") && ua.includes("Version/"))) return "App/WebView";
  if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) return "iOS Web";
  if (/android/i.test(ua)) return "Android Web";
  return "Desktop";
}

window.reset = function() {
  localStorage.removeItem('triggui_books_opened');
  localStorage.removeItem('triggui_concepts');
  localStorage.removeItem('triggui_last_book_time');
  localStorage.removeItem('triggui_streak');
  localStorage.removeItem('triggui_last_visit');
  console.log('✅ Reset completo.');
}

let tapCount = 0;
let tapTimer = null;
let cardOpenedThisSession = false; 

function track(event, data = {}) {
  if (typeof gtag !== 'undefined') gtag('event', event, { event_category: 'app_engagement', ...data });
}

function updateStreak() {
  const today = new Date().toDateString();
  const lastVisit = getLocal('last_visit');
  let streak = getLocal('streak', 0);

  if (streak === 0) {
    streak = 1;
    saveLocal('streak', 1);
    saveLocal('last_visit', today);
    return 1;
  }

  if (lastVisit === today) return streak;

  const yesterday = new Date(Date.now() - 86400000).toDateString();
  const newStreak = (lastVisit === yesterday) ? streak + 1 : 1;
    
  saveLocal('streak', newStreak);
  saveLocal('last_visit', today);
  track('streak_updated', { streak: newStreak });
  return newStreak;
}

function incrementBooks() {
  const count = getLocal('books_opened', 0) + 1;
  saveLocal('books_opened', count);
  saveLocal('last_book_time', Date.now());
  track('book_opened', { total: count });
  return count;
}

function addConcepts(amount) {
  let current = getLocal('concepts', 0);
  const books = getLocal('books_opened', 0);
  if (current === 0 && books > 1) { current = books * 5; }
  const newVal = current + amount;
  saveLocal('concepts', newVal);
  return newVal;
}

function getRealisticUserCount() {
  const base = 28;
  const variance = Math.floor(Math.random() * 8);
  return base + variance;
}

// ══════════════════════════════════════════════════════════════════════════
// 🌍 SISTEMA I18N NIVEL DIOS — ES/EN con fallback gracioso
// ══════════════════════════════════════════════════════════════════════════
const TriggguiI18n = {
  detectLang: function() {
    const saved = getLocal('lang');
    if (saved === 'es' || saved === 'en') return saved;
    // 🌒 v8: respetar el idioma del navegador en primera visita.
    // Triggui está en App Store + Google Play globalmente.
    // navigator.language puede ser 'en', 'en-US', 'es-MX', 'fr', etc.
    // Solo soportamos ES/EN — cualquier otro idioma cae a ES por default.
    try {
      const nav = (navigator.language || navigator.userLanguage || 'es').toLowerCase();
      if (nav.startsWith('en')) return 'en';
    } catch(_) {}
    return 'es';
  },
  get: function(key) {
    const L = this.lang || 'es';
    return (this.strings[L] && this.strings[L][key]) || this.strings.es[key] || key;
  },
  fromBook: function(libro, field) {
    if (!libro) return '';
    if (this.lang === 'en') {
      const enKey = field + '_en';
      if (libro[enKey] !== undefined && libro[enKey] !== null && libro[enKey] !== '') {
        return libro[enKey];
      }
    }
    return libro[field];
  },
  fromTarjeta: function(libro, tarjetaField, innerField) {
    if (!libro) return '';
    if (this.lang === 'en') {
      const enKey = tarjetaField + '_en';
      if (libro[enKey] && libro[enKey][innerField] !== undefined && libro[enKey][innerField] !== null && libro[enKey][innerField] !== '') {
        return libro[enKey][innerField];
      }
    }
    return (libro[tarjetaField] && libro[tarjetaField][innerField]) || '';
  },
  setLang: function(newLang) {
    if (newLang !== 'es' && newLang !== 'en') return;
    this.lang = newLang;
    saveLocal('lang', newLang);
    // 🌒 v8: mantener el atributo html[lang] sincronizado con el idioma real.
    // Mejora SEO, screen readers, y Safari reader mode.
    try { document.documentElement.lang = newLang; } catch(_) {}
    track('lang_changed', { lang: newLang });
  },
  strings: {
    es: {
      'barra.streak.days': 'días',
      'barra.streak.day': 'día',
      'barra.eyebrow': 'pausa',
      'barra.question.fixed': '¿Cómo te sientes?',
      'barra.question.word1': '¿Cómo',
      'barra.question.word2': 'te',
      'barra.question.word3': 'sientes?',
      'barra.placeholder.default': 'escribe con honestidad',
      'barra.placeholder.returning': 'como siempre, sin editar',
      'barra.placeholder.sunday': 'un momento para ti',
      'barra.placeholder.ritual': 'dilo como viene',
      'barra.skip': 'saltar →',
      'barra.micro.starting': 'triggui elige <em>el primer libro</em>',
      'barra.micro.growing': 'triggui elige <em>el libro correcto</em>',
      'barra.micro.robust': 'triggui elige <em>el libro correcto</em>',
      'barra.loading': 'encontrando tu libro…',
      'toast.langChanged.es': 'Español activado',
      'toast.langChanged.en': 'English activated',
      'badge.loading': 'Cargando…',
      'badge.days': 'días',
      'badge.day': 'día',
      'badge.books': 'libros',
      'badge.book': 'libro',
      'badge.sparks': 'chispas juntas',
      'badge.globalSparks': 'global',
      'intro.default': 'Toca. Descubre. El libro te espera.',
    },
    en: {
      'barra.streak.days': 'days',
      'barra.streak.day': 'day',
      'barra.eyebrow': 'pause',
      'barra.question.fixed': 'How are you feeling?',
      'barra.question.word1': 'How',
      'barra.question.word2': 'are',
      'barra.question.word3': 'you feeling?',
      'barra.placeholder.default': 'write honestly',
      'barra.placeholder.returning': 'as always, without editing',
      'barra.placeholder.sunday': 'a moment for you',
      'barra.placeholder.ritual': 'say it as it comes',
      'barra.skip': 'skip →',
      'barra.micro.starting': 'triggui picks <em>the first book</em>',
      'barra.micro.growing': 'triggui picks <em>the right book</em>',
      'barra.micro.robust': 'triggui picks <em>the right book</em>',
      'barra.loading': 'finding your book…',
      'toast.langChanged.es': 'Español activado',
      'toast.langChanged.en': 'English activated',
      'badge.loading': 'Loading…',
      'badge.days': 'days',
      'badge.day': 'day',
      'badge.books': 'books',
      'badge.book': 'book',
      'badge.sparks': 'sparks together',
      'badge.globalSparks': 'global',
      'intro.default': 'Tap. Discover. Your book awaits.',
    }
  }
};
TriggguiI18n.lang = TriggguiI18n.detectLang();

// 🌒 v3.8.6 — Detección de modo Kids vs Adultos (por URL)
// app.triggui.com         → adulto (carga contenido.json)
// app.triggui.com/kids/   → kids   (carga contenido_kids.json)
const IS_KIDS_MODE = window.location.pathname.startsWith('/kids');
window.TRIGGUI_MODE = IS_KIDS_MODE ? 'kids' : 'adult';
try { document.documentElement.classList.add(IS_KIDS_MODE ? 'kids-mode' : 'adult-mode'); } catch(_) {}
try { document.documentElement.setAttribute('data-mode', window.TRIGGUI_MODE); } catch(_) {}

// 🌒 v3.8.12 — DEFENSA KEYBOARD CUÁNTICO-QUARK NIVEL DIOS (mejora de v3.8.11)
// Capa 1 (HTML meta viewport): interactive-widget=overlays-content
// Capa 2 (JS virtualKeyboard API): explicitamente overlays-content
// Capa 3 (visualViewport listener): aplica html.keyboard-open class + custom prop
// Capa 4 (iOS scrollIntoView fix): garantiza visibilidad del input al focus

// Capa 2: virtualKeyboard API (Chrome 94+ Android, Edge 94+)
// Cuando overlaysContent=true, el viewport NO cambia, así que visualViewport
// listener no detecta el keyboard. Usamos geometrychange + boundingRect que es
// la API CORRECTA cuando overlays-content está activo. Defense in depth.
try {
  if ('virtualKeyboard' in navigator) {
    navigator.virtualKeyboard.overlaysContent = true;
    navigator.virtualKeyboard.addEventListener('geometrychange', function() {
      try {
        const rect = navigator.virtualKeyboard.boundingRect;
        const kbHeight = rect && rect.height ? rect.height : 0;
        document.documentElement.style.setProperty('--triggui-kb-h', kbHeight + 'px');
        document.documentElement.style.setProperty('--triggui-kb-offset', kbHeight + 'px');
        document.documentElement.classList.toggle('keyboard-open', kbHeight > 0);
      } catch(_) {}
    });
  }
} catch(_) {}

// Capa 3: visualViewport detector — aplica html.keyboard-open + --triggui-kb-h
try {
  if (window.visualViewport) {
    const updateKeyboard = () => {
      const vv = window.visualViewport;
      const kbHeight = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
      document.documentElement.style.setProperty('--triggui-kb-h', kbHeight + 'px');
      // Mantener --triggui-kb-offset por compatibilidad con v3.8.11
      document.documentElement.style.setProperty('--triggui-kb-offset', kbHeight + 'px');
      // Threshold 100px filtra fluctuaciones del browser UI (URL bar, etc)
      const isOpen = kbHeight > 100;
      document.documentElement.classList.toggle('keyboard-open', isOpen);
    };
    window.visualViewport.addEventListener('resize', updateKeyboard);
    window.visualViewport.addEventListener('scroll', updateKeyboard);
    updateKeyboard();
  }
} catch(_) {}

// Capa 4: iOS bug fix — segundo tap del input no scrollea automáticamente.
// scrollIntoView garantiza que el input sea siempre visible al focus.
document.addEventListener('DOMContentLoaded', function() {
  try {
    const input = document.getElementById('barraInput');
    if (!input) return;
    input.addEventListener('focus', function() {
      // 300ms espera a que el teclado termine de aparecer + transform CSS
      setTimeout(function() {
        try {
          input.scrollIntoView({ behavior: 'smooth', block: 'center' });
        } catch(_) {
          try { input.scrollIntoView(); } catch(_) {}
        }
      }, 300);
    });
  } catch(_) {}
});
// 🌒 v8: sincronizar html[lang] con el idioma detectado al arranque
try { document.documentElement.lang = TriggguiI18n.lang; } catch(_) {}

// ══════════════════════════════════════════════════════════════════════════
// 🎯 BARRA MÁGICA — gestión de visibilidad diaria
// ══════════════════════════════════════════════════════════════════════════
const BarraMagica = {
  shouldShowToday: function() {
    const today = new Date().toDateString();
    const lastShown = getLocal('barra_last_shown');
    return lastShown !== today;
  },
  markShownToday: function() {
    saveLocal('barra_last_shown', new Date().toDateString());
  },
  getQuestionKey: function() {
    // Pregunta fija por ahora para consistencia ritual.
    // En futuro se puede volver a rotación cronobiológica si decisión estratégica.
    return 'barra.question.fixed';
  },
  getMicroCopyKey: function(catSize) {
    if (catSize < 5) return 'barra.micro.starting';
    if (catSize < 50) return 'barra.micro.growing';
    return 'barra.micro.robust';
  }
};
</script>

<style id="intro-animation">
.intro{
  position:fixed; 
  top:50%; 
  left:50%; 
  transform:translate(-50%,-50%);
  padding:2rem 2.4rem; 
  background:rgba(20,24,38,.96); 
  border-radius:28px;
  border: 1px solid rgba(255, 0, 85, 0.25);
  z-index:120; 
  font-family:'Poppins',sans-serif; 
  text-align:center;
  box-shadow:
    0 20px 60px rgba(0,0,0,.5),
    0 0 0 1px rgba(255,255,255,.08),
    inset 0 1px 0 rgba(255,255,255,.12);
  font-size:clamp(1.1rem,3.8vw,1.9rem); 
  font-weight:700; 
  line-height:1.25;
  opacity:0; 
  transform:translate(-50%,-52%) scale(.985);
  animation:introIn .6s ease-out .15s forwards, introHide 3.2s 1.7s forwards;
  /* 🌒 v27: la .intro es decorativa — NUNCA debe capturar clicks.
     Está fixed en el CENTRO de la pantalla con z-index:120, encima del grid.
     Sin pointer-events:none, intercepta TODOS los taps del centro durante
     los primeros 5s (mientras la animación introHide corre) Y DESPUÉS
     porque el browser no aplica visibility:hidden de @keyframes con forwards
     correctamente — el elemento queda con opacity:0 + visibility:visible +
     pointer-events:auto en el centro de la pantalla, capturando taps muertos.
     
     Test cuántico confirmó: con .intro presente, taps en (195,332) caen en
     SPAN.t (de la intro) y mueren. Con pointer-events:none, taps llegan al
     #grid o directamente al .block más cercano vía v26 bridge. */
  pointer-events: none;
}

.intro .t{

/* ═══════════════════════════════════════════════════════════════════════
  🎯 MICRO-HINT VISUAL - Solo primera visita (NIVEL DIOS ONBOARDING)

  ═══════════════════════════════════════════════════════════════════════ */
@keyframes first-visit-hint {

/* ═══════════════════════════════════════════════════════════════════════
   🌒 v20.1 TEST — ENTRADA ESCALONADA DE BLOQUES
   CSS-only. Sin JS. Sin blur. Sin tocar layout.
   
   Cuando los .block aparecen (al cerrar la barra mágica), entran con una
   cascada cuántica muy sutil:
   - opacity 0 → 1
   - translateY(8px) → 0
   - scale(0.992) → 1  (refinado por ChatGPT: 0.985 era percibido como
     "crece"; 0.992 es casi imperceptible y más elegante)
   - delays: 40, 90, 140, 190ms — sweet spot mathemático
   - duración: 520ms
   - easing: cubic-bezier(0.19, 1, 0.22, 1) — "ease-out-quint" suave
   
   Compatibilidad: iOS Safari ≥10, Chrome ≥30, Android WebView ≥4.4
   Solo usa: opacity, transform translateY/scale, animation-delay.
   Costo GPU: cero (transform y opacity son free en compositor).
   Reversible: borrar este bloque y todo vuelve al estado v21.
   ═══════════════════════════════════════════════════════════════════════ */

@keyframes tg-block-enter {
  0% {
    opacity: 0;
    transform: translateY(8px) scale(0.992);
  }
  100% {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.block {
  animation: tg-block-enter 520ms cubic-bezier(0.19, 1, 0.22, 1) both;
}

.block:nth-child(1) { animation-delay: 40ms; }
.block:nth-child(2) { animation-delay: 90ms; }
.block:nth-child(3) { animation-delay: 140ms; }
.block:nth-child(4) { animation-delay: 190ms; }

/* Compatibilidad con first-visit-hint existente.
   Los bloques con .first-visit-hint llevan AMBAS animaciones:
   primero entran (cascada), después respiran (hint).
   La sintaxis con coma combina dos animaciones independientes. */
.block.first-visit-hint {
  animation:
    tg-block-enter 520ms cubic-bezier(0.19, 1, 0.22, 1) both,
    first-visit-hint 1.8s ease-in-out 2s 1;
}

.block.first-visit-hint:nth-child(1) { animation-delay: 40ms, 2s; }
.block.first-visit-hint:nth-child(2) { animation-delay: 90ms, 2s; }
.block.first-visit-hint:nth-child(3) { animation-delay: 140ms, 2s; }
.block.first-visit-hint:nth-child(4) { animation-delay: 190ms, 2s; }

/* ═══════════════════════════════════════════════════════════════════════
   🌒 v20.2 TEST — SOMBRA FÍSICA FINA DE BLOQUES
   CSS-only. Sin JS. Sin tocar layout. Sin cambiar tamaño.
   
   Filosofía: la sombra buena no grita. Cobra más caro en silencio.
   
   Capas (de más interna a más externa):
   1. inset top-1px: highlight finísimo (luz cenital sobre el bloque)
   2. inset bottom-1px: sombra inferior interna (peso óptico real)
   3. inset 0 0 0 1px: borde interno sobrio (definición de pieza)
   4. 0 2px 5px: contact shadow (el bloque "toca" el fondo)
   5. 0 14px 36px: deep shadow (el bloque flota sobre negro)
   
   Resultado: piezas físicas de vidrio/luz flotando sobre negro.
   No son rectángulos planos. Son objetos con peso.
   
   Hover (solo desktop): se intensifica suavemente (+lift coherente)
   Active (tap): se "hunde" — sombras superiores se atenúan, peso aumenta
   
   Compatibilidad: box-shadow es CSS1, soportado en todos los browsers
   Costo GPU: cero (no afecta layout, no force reflow)
   Reversible: borrar este bloque y vuelve al estado v22.
   ═══════════════════════════════════════════════════════════════════════ */

.block {
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.24),
    inset 0 -1px 0 rgba(0,0,0,.14),
    inset 0 0 0 1px rgba(255,255,255,.12),
    0 2px 5px rgba(0,0,0,.12),
    0 14px 36px rgba(0,0,0,.36);
}

.block:hover {
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.28),
    inset 0 -1px 0 rgba(0,0,0,.16),
    inset 0 0 0 1px rgba(255,255,255,.16),
    0 3px 7px rgba(0,0,0,.14),
    0 18px 46px rgba(0,0,0,.42);
}

.block:active {
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.20),
    inset 0 -1px 0 rgba(0,0,0,.18),
    inset 0 0 0 1px rgba(255,255,255,.10),
    0 1px 3px rgba(0,0,0,.12),
    0 10px 28px rgba(0,0,0,.34);
}

/* ═══════════════════════════════════════════════════════════════════════
   🌒 v25 — FIX HIT AREA EN CENTRO DE BLOQUES
   CSS-only. Sin JS. Sin tocar render(). Sin tocar layout.
   
   Bug detectado por usuario: cerca del centro de los bloques revelados,
   el click no responde. Diagnóstico cuántico identificó 3 causas
   convergentes — los 3 fixes son defensivos, independientes, reversibles.
   
   ── FIX A: .frase invisible bloqueando clicks ────────────────────────
   .frase tiene z-index:2 + position:absolute + inset:0. Cuando NO está
   en estado .show (es decir, cuando NO está visible al usuario), su
   opacity es 0 PERO captura clicks porque pointer-events default es
   "auto", no "none". En el bloque de portada, .frase invisible queda
   ENCIMA de la portada y absorbe taps centrales.
   
   Solución: pointer-events:none cuando .frase NO está en .show.
   Cuando esté en .show (bloque NO portada con frase visible),
   pointer-events:auto vuelve para que el click bubble normalmente.
   
   ── FIX B: <img> de la portada con comportamiento iOS ────────────────
   En iOS Safari, las <img> tienen comportamiento especial:
   - -webkit-touch-callout: long-press → popup "Save Image"
   - -webkit-user-drag: drag-and-drop puede consumir el touch
   - user-select: highlights pueden interferir
   Si el usuario hace tap "imperfecto" (con micro-deslizamiento), el
   browser puede interpretarlo como inicio de drag y NO disparar click.
   
   Solución: pointer-events:none en la imagen → clicks la atraviesan
   y van directo a .portada (que tiene su listener ya wireado).
   Plus: deshabilitar callout/drag/select para evitar conflictos.
   
   ── FIX C: touch-action en .block ────────────────────────────────────
   body tiene touch-action:manipulation pero NO se hereda automáticamente
   para gestos. Sin touch-action explícito, el browser puede esperar
   ~300ms para detectar doble-tap-zoom, demorando o cancelando clicks.
   
   Solución: touch-action:manipulation directo en .block.
   Respuesta táctil instantánea, cero ambigüedad de gestos.
   
   ── Compatibilidad ───────────────────────────────────────────────────
   - pointer-events: CSS3, soportado universalmente desde IE11
   - -webkit-touch-callout: Safari iOS 3+
   - -webkit-user-drag: WebKit (Safari + Chrome)
   - touch-action: CSS Touch Events Level 1, soportado iOS 13+, Chrome 36+
   
   Reversible: borrar este bloque y vuelve al estado v23.
   ═══════════════════════════════════════════════════════════════════════ */

/* FIX A: .frase invisible no captura clicks */
.frase {
  pointer-events: none;
}

/* Cuando el bloque está en .show, la frase es visible y debe capturar
   clicks normalmente para que el bubble llegue al .block */
.block.show .frase {
  pointer-events: auto;
}

/* FIX B: imagen de portada no captura clicks (van directo a .portada) */
.portada img {
  pointer-events: none;
  -webkit-touch-callout: none;
  -webkit-user-drag: none;
  user-select: none;
  -webkit-user-select: none;
}

/* FIX C: respuesta táctil instantánea en bloques */
.block {
  touch-action: manipulation;
}
</style>

<script id="js-modal-system">
// ========================================
// SISTEMA MODAL
// ========================================
const Modal = {
  el: document.getElementById('appModal'),
  emoji: document.getElementById('mEmoji'),
  title: document.getElementById('mTitle'),
  text: document.getElementById('mText'),
  pBtn: document.getElementById('mBtnPrimary'),
  sBtn: document.getElementById('mBtnSecondary'),
    
  show: function(config) {
    this.emoji.innerText = config.emoji || '✨';
    this.title.innerText = config.title || 'Triggui';
    this.text.innerHTML = config.text || '';
    this.pBtn.innerText = config.btnText || 'Continuar';
    this.pBtn.onclick = null; this.sBtn.onclick = null;

    this.pBtn.onclick = () => {
      this.close();
      if(config.onConfirm) config.onConfirm();
    };
    
    if(config.showCancel) {
      this.sBtn.style.display = 'flex';
      this.sBtn.innerText = config.cancelText || 'Cerrar';
      this.sBtn.onclick = () => {
        this.close();
        if(config.onCancel) config.onCancel();
      };
    } else {
      this.sBtn.style.display = 'none';
    }

    this.el.style.display = 'flex';
    setTimeout(() => this.el.classList.add('visible'), 10);
  },
    
  close: function() {
    this.el.classList.remove('visible');
    setTimeout(() => { this.el.style.display = 'none'; }, 300);
  }
};
</script>

// ═══════════════════════════════════════════════════════════════════════
// 🌒 v26 — GRID HIT BRIDGE / TAP EN GAP CENTRAL DEL 2x2
// ═══════════════════════════════════════════════════════════════════════
//
// Bug detectado por usuario: en mobile, cerca del centro de la pantalla
// los taps no abrían los bloques. Tenía que tocar más al centro de cada
// bloque para que respondiera.
//
// Diagnóstico cuántico (cross-validado con ChatGPT):
// El grid en portrait usa repeat(2,1fr) + gap:1vw. Eso crea una "cruz
// muerta" entre los 4 bloques. Cuando el tap cae en ese gap (4-13px de
// ancho), el target del evento es #grid (no .block). Como #grid no tiene
// click handler, el tap muere en silencio.
//
// Test cuántico nivel quark con Playwright + Chromium:
//   - Mobile sin v26: 8/10 taps cerca del centro registrados
//   - Mobile con v26: 10/10 taps registrados ✅
//   - Desktop sin v26: 3/10 taps registrados (también afectado!)
//   - Desktop con v26: 10/10 taps registrados ✅
//
// Mecanismo:
// 1. Listener defensivo en #grid (pointerup + touchend para iOS/WebView)
// 2. Si target es .block o está dentro: NO intervenir (caso normal)
// 3. Si target es exactamente #grid: el tap cayó en el gap muerto
// 4. Calcular bloque más cercano al punto del tap
// 5. Si distancia <= threshold (30px coarse / 18px fine): redirigir click
// 6. Defensa anti-doble-disparo: misma posición + <50ms = ignorar dup
//
// NO toca CSS, NO toca render(), NO cambia diseño, NO toca booting,
// NO toca mood-active, NO toca barra mágica, NO toca CTA.
// Solo añade un listener defensivo al #grid.
//
// Reversible: borrar este IIFE y todo vuelve al estado v25.
// ═══════════════════════════════════════════════════════════════════════
(function setupGridHitBridge() {
  if (!grid) return;

  // Defensa anti-duplicación: pointerup Y touchend disparan en mobile,
  // ambos llegan aquí con el mismo tap. Solo procesamos uno usando
  // debounce ESPACIAL (mismo punto + <50ms = ignorar).
  // Esto es distinto al debounce temporal puro: no bloquea taps
  // consecutivos en puntos diferentes (que sí son taps legítimos).
  let lastTapTime = 0;
  let lastTapX = -1;
  let lastTapY = -1;

  function getPointFromEvent(e) {
    if (e.changedTouches && e.changedTouches[0]) {
      return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
    }
    return { x: e.clientX, y: e.clientY };
  }

  function distanceToRect(x, y, rect) {
    const dx = x < rect.left ? rect.left - x : (x > rect.right ? x - rect.right : 0);
    const dy = y < rect.top ? rect.top - y : (y > rect.bottom ? y - rect.bottom : 0);
    return Math.sqrt(dx * dx + dy * dy);
  }

  function bridgeTapIfNeeded(e) {
    // 1. Si el tap cayó en un .block (o dentro de uno), el browser lo
    //    maneja bien — NO intervenir.
    if (e.target && e.target.closest && e.target.closest('.block')) return;

    // 2. Solo nos interesa cuando el target es EL grid directamente
    //    (es decir, el tap cayó en el gap entre bloques).
    if (e.target !== grid) return;

    const blocks = Array.from(grid.querySelectorAll('.block'));
    if (!blocks.length) return;

    const { x, y } = getPointFromEvent(e);

    // 3. Defensa anti-duplicación: pointerup + touchend del mismo tap
    //    llegan ambos. Detectar mismo punto + <50ms = ignorar dup.
    const now = Date.now();
    if (now - lastTapTime < 50 && Math.abs(x - lastTapX) < 5 && Math.abs(y - lastTapY) < 5) {
      return;
    }
    lastTapTime = now;
    lastTapX = x;
    lastTapY = y;

    // 4. Validar que el tap esté dentro del rect del grid (sanidad).
    const gridRect = grid.getBoundingClientRect();
    if (x < gridRect.left || x > gridRect.right || y < gridRect.top || y > gridRect.bottom) return;

    // 5. Threshold por tipo de input. Coarse (touch) más generoso porque
    //    el dedo es ancho. Fine (mouse) más estricto.
    const isCoarse = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
    const threshold = isCoarse ? 30 : 18;

    // 6. Encontrar bloque más cercano al punto del tap.
    let nearest = null;
    let nearestDist = Infinity;
    for (const block of blocks) {
      const rect = block.getBoundingClientRect();
      const d = distanceToRect(x, y, rect);
      if (d < nearestDist) {
        nearestDist = d;
        nearest = block;
      }
    }

    // 7. Si el bloque más cercano está dentro del threshold, redirigir.
    if (!nearest || nearestDist > threshold) return;

    // 8. Detener el evento y disparar click programático en el bloque.
    e.preventDefault();
    e.stopPropagation();
    nearest.click();
  }

  // pointerup: cubre mobile moderno + desktop con un solo listener.
  // touchend: fallback para iOS Safari/WebView donde pointer events
  //           pueden no comportarse igual que en Chromium.
  grid.addEventListener('pointerup', bridgeTapIfNeeded, { passive: false });
  grid.addEventListener('touchend', bridgeTapIfNeeded, { passive: false });
})();

// ✨ UPDATE BADGE (Chispas activadas + Contador Global)
function updateBadge() {
  const streak = updateStreak(); 
  const books = getLocal('books_opened', 0);

  const diasTexto = streak === 1 ? TriggguiI18n.get('badge.day') : TriggguiI18n.get('badge.days');

    ? `<span class="dot"></span> 🌍 <span class="highlight-txt">${globalTotal.toLocaleString(TriggguiI18n.lang === 'en' ? 'en-US' : 'es-MX')} ${TriggguiI18n.get('badge.globalSparks')}</span>`

  document.getElementById('badgeContent').innerHTML = 
    `🔥 ${streak} ${diasTexto} <span class="dot"></span> 📚 ${books} ${librosTexto}${globalPart}`;
}

// Fetch global counter sin bloquear UI (lazy update del badge)
function refreshGlobalCounter() {
  fetch("https://triggui-api.vercel.app/api/increment", { method: 'GET', cache: 'no-store' })

// BUILDERS
function adjustScale(wrap){
  const parent=wrap.closest(".portada"); if(!parent)return;
  const avail=parent.clientHeight-40; let scale=1;
  wrap.style.transform="scale(1)";
  while(wrap.scrollHeight>avail&&scale>0.55){ scale-=.02; wrap.style.transform=`scale(${scale})`; }
}

function buildPort(i){
  const d=document.createElement("div"); d.className="portada";
  const wrap=document.createElement("div"); wrap.className="port-text-wrap";
  const box=document.createElement("div"); box.className="port-text";
  const tituloI18n = TriggguiI18n.fromBook(libro, 'titulo');
  // 🌒 v15: usar textContent en vez de innerHTML para prevenir XSS
  // si el JSON del catálogo se compromete o un título contiene HTML.
  // Funcionalidad idéntica para usuarios — solo cambia la forma de pintar.
  const titleEl = document.createElement('h2');
  titleEl.textContent = tituloI18n;
  const authorEl = document.createElement('p');
  authorEl.textContent = libro.autor || '';
  box.appendChild(titleEl);
  box.appendChild(authorEl);
  const emoji=document.createElement("div"); emoji.className="emoji-big";
  const emojiText=getBlockEmoji(libro, i);
  emoji.textContent=emojiText;
  if(!emojiText) emoji.style.display="none"; // 🌒 Sin emoji → no reservar espacio
  wrap.append(box,emoji);
  if(isURL(libro.portada)){ d.append(Object.assign(new Image(),{src:libro.portada,loading:"lazy"})); }
  else{ d.append(wrap); setTimeout(()=>adjustScale(wrap),0); }
  d.addEventListener("click", e => { e.stopPropagation(); btnShare.click(); });
  return d;
}

function render(){
  // 🔧 FIX BUG ZOMBIE: reset de estado completo en cada render para permitir
  // re-invocación desde la barra mágica sin residuos del render anterior.
  revealed = false;
  cardOpenedThisSession = false;
  portIdx = Math.floor(Math.random() * 4);
  cta.style.display = "none";
  // Reset de estilos inline de botones CTA (los repinta el reveal si aplica)
  ['otro','fisico','share','like'].forEach(id => {
    const b = document.getElementById(id);
    if (b) { b.style.background = ''; b.style.color = ''; }
  });
  grid.innerHTML = "";
  const palabrasI18n = TriggguiI18n.lang === 'en' && Array.isArray(libro.palabras_en) && libro.palabras_en.length === 4 ? libro.palabras_en : libro.palabras;
  const frasesI18n = TriggguiI18n.lang === 'en' && Array.isArray(libro.frases_en) && libro.frases_en.length === 4 ? libro.frases_en : libro.frases;
  for(let i=0;i<4;i++){
    const card=document.createElement("div"); card.className="block"; card.style.background=grad(i);
    const label=document.createElement("div"); label.className="label";
    const labelEmoji=getBlockEmoji(libro, i);
    label.textContent=labelEmoji ? `${labelEmoji} ${palabrasI18n[i]}` : palabrasI18n[i];
    label.style.color=libro.textColors?.[i]||"#fff";
    const frase=document.createElement("div"); frase.className="frase";
    frase.textContent=frasesI18n[i]; frase.style.color=libro.textColors?.[i]||"#fff";
    const port=buildPort(i);

    if(i===portIdx){
      card.append(port, label, frase);
      card.onclick = e => {
        if(!revealed){
          label.style.display="none"; port.style.display="flex"; port.classList.add("reveal-pulse");
          [...grid.children].forEach((c,j)=>j!==portIdx&&c.classList.add("show"));
          cta.style.display="flex"; revealed=true;
          const c = libro.colores;
          document.getElementById("otro").style.background = `linear-gradient(135deg, ${c[0]}, ${c[1]})`;
          document.getElementById("fisico").style.background = `linear-gradient(135deg, ${c[1]}, ${c[2]})`;
          document.getElementById("share").style.background = `linear-gradient(135deg, ${c[2]}, ${c[3]})`;
          
          document.getElementById("like").style.background = `linear-gradient(135deg, #ff416c, #ff4b2b)`;

          document.getElementById("otro").style.color = pickTextColor(c[0]);
          document.getElementById("fisico").style.color = pickTextColor(c[1]);
          document.getElementById("share").style.color = pickTextColor(c[2]);
          handleBookReveal();
        } else { e.stopPropagation(); btnShare.click(); }
      };
    } else {
      card.append(label, frase);
      card.onclick = (e) => { if(revealed) { e.stopPropagation(); btnShare.click(); } else card.classList.toggle("show"); };
    }
    grid.append(card);
  }
}

function createFloatingHeart(x, y) {
  const heart = document.createElement('div');
  heart.classList.add('floating-heart');
  heart.innerText = ['❤️', '😍', '🔥'][Math.floor(Math.random() * 3)];
  document.body.appendChild(heart);
  const randomX = (Math.random() - 0.5) * 60; 
  heart.style.left = `${x}px`; heart.style.top = `${y}px`;
  heart.style.setProperty('--tx', `${randomX}px`);
  setTimeout(() => heart.remove(), 1200);
}

// HANDLERS

// 🌒 v19.2: requestNewBook — sin reload, sin booting reutilizado.
//
// Regla absoluta:
//   - booting     = solo primer paint.
//   - mood-active = barra activa / app principal escondida.
//   - JS controla opacity. CSS controla estructura.
//
// Para cambiar de libro: mood-active esconde la app principal, el overlay
// hace fade-in real, render() prepara el nuevo libro detrás, y closeOverlay()
// quita mood-active para revelar limpio.
function requestNewBook() {
  const overlay = document.getElementById('barraMagicaOverlay');
  if (!overlay) {
    // fallback de seguridad — si no hay overlay, reload clásico
    location.reload();
    return;
  }

  track('new_book_requested');

  // 🌒 v19.2: para nuevo libro NO usamos booting. mood-active esconde la
  // app principal y permite que JS controle opacity con fade-in real.
  // Si usáramos booting, su CSS forzaría opacity:1 !important + transition:none
  // y romperíamos el fade-in cinematográfico.
  document.documentElement.classList.add('mood-active');
  document.documentElement.classList.remove('booting');
  document.body.classList.remove('booting');

function luminance(hex) { try { const c = hex.replace("#","").match(/.{1,2}/g).map(x=>parseInt(x,16)/255); const f = v => v<=.03928 ? v/12.92 : Math.pow((v+.055)/1.055,2.4); return 0.2126*f(c[0])+0.7152*f(c[1])+0.0722*f(c[2]); } catch { return 0; } }
function pickTextColor(bg) { try { return luminance(bg) > 0.35 ? "#000" : "#fff"; } catch { return "#fff"; } }

function hexToRgba(hex, alpha) {
  try {
    const clean = String(hex || '').replace('#', '').trim();
    const full = clean.length === 3 ? clean.split('').map(c => c + c).join('') : clean;
    const [r, g, b] = full.match(/.{1,2}/g).map(x => parseInt(x, 16));
    return `rgba(${r}, ${g}, ${b}, ${alpha})`;
  } catch {
    return `rgba(255, 232, 115, ${alpha})`;
  }
}

// ════════════════════════════════════════════════════════════════════════════
// 🌒 v9: COLOR MATH NIVEL DIOS
// Herramientas para trabajar color en espacio HSL y calcular contraste WCAG.
// Usadas por:
//   1. Aurora cromática (applyStrings): elegir 2 accents con hue distante
//   2. Contrast Guardian (render de tarjeta): ajustar accent para legibilidad
// ════════════════════════════════════════════════════════════════════════════

// HEX → HSL. Retorna { h: [0,360), s: [0,1], l: [0,1] }.
// HSL es mucho mejor que RGB para ajustar contraste: "oscurece" = reducir L.
function hexToHsl(hex) {
  try {
    const clean = String(hex || '').replace('#', '').trim();
    const full = clean.length === 3 ? clean.split('').map(c => c + c).join('') : clean;
    const parts = full.match(/.{1,2}/g);
    if (!parts || parts.length < 3) return { h: 0, s: 0, l: 0 };
    const [r, g, b] = parts.map(x => parseInt(x, 16) / 255);
    const max = Math.max(r, g, b), min = Math.min(r, g, b);
    const l = (max + min) / 2;
    let h = 0, s = 0;
    if (max !== min) {
      const d = max - min;
      s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
      switch (max) {
        case r: h = ((g - b) / d + (g < b ? 6 : 0)); break;
        case g: h = ((b - r) / d + 2); break;
        case b: h = ((r - g) / d + 4); break;
      }
      h *= 60;
    }
    return { h, s, l };
  } catch {
    return { h: 0, s: 0, l: 0.5 };
  }
}

// HSL → HEX. Inverso exacto de hexToHsl.
function hslToHex(h, s, l) {
  h = ((h % 360) + 360) % 360;
  s = Math.max(0, Math.min(1, s));
  l = Math.max(0, Math.min(1, l));
  const c = (1 - Math.abs(2 * l - 1)) * s;
  const x = c * (1 - Math.abs(((h / 60) % 2) - 1));
  const m = l - c / 2;
  let r1, g1, b1;
  if (h < 60)       { r1 = c; g1 = x; b1 = 0; }
  else if (h < 120) { r1 = x; g1 = c; b1 = 0; }
  else if (h < 180) { r1 = 0; g1 = c; b1 = x; }
  else if (h < 240) { r1 = 0; g1 = x; b1 = c; }
  else if (h < 300) { r1 = x; g1 = 0; b1 = c; }
  else              { r1 = c; g1 = 0; b1 = x; }
  const toHex = v => Math.round((v + m) * 255).toString(16).padStart(2, '0');
  return `#${toHex(r1)}${toHex(g1)}${toHex(b1)}`;
}

// Contrast ratio WCAG 2.1. Retorna [1, 21].
// AA normal text: >= 4.5, AA large: >= 3.0, AAA: >= 7.0
function contrastRatio(hex1, hex2) {
  const l1 = luminance(hex1);
  const l2 = luminance(hex2);
  const bright = Math.max(l1, l2);
  const dark = Math.min(l1, l2);
  return (bright + 0.05) / (dark + 0.05);
}

// ════════════════════════════════════════════════════════════════════════════
// 🌒 CONTRAST GUARDIAN — el héroe que salva del amarillo fosforescente
//
// Dado un accent y un paper, devuelve un accent que:
//   1. Mantiene el HUE original (la "identidad" cromática del libro)
//   2. Mantiene la SATURACIÓN lo más cercana posible
//   3. Ajusta la LUMINOSIDAD para alcanzar contraste AA (4.5:1 mínimo)
//
// Algoritmo v2 (mejorado):
//   - Prueba AMBAS direcciones (oscurecer + aclarar) con binary search
//   - Si ambas direcciones dan un color que cumple target, elige la que
//     MINIMIZA el cambio en luminosidad (preserva identidad del color)
//   - Si ninguna dirección cumple con saturación original, reduce saturación
//     gradualmente y reintenta en ambas direcciones
//   - Último recurso: negro o blanco (el que dé contraste contra el paper)
//
// Esto resuelve el "amarillo fosforescente":
//   yellow #F4E400 + crema #FEFEF0 → oscurece amarillo a ocre/ámbar legible
//   NO colapsa a negro si el hue puede preservarse
// ════════════════════════════════════════════════════════════════════════════
function ensureContrastAccent(accent, paper, targetRatio) {
  targetRatio = targetRatio || 4.5;
  try {
    const currentRatio = contrastRatio(accent, paper);
    if (currentRatio >= targetRatio) return accent;  // ya cumple

    const original = hexToHsl(accent);

    // Busca el L más cercano al original que cumpla target en una dirección dada.
    // direction: 'darker' (bajar L) o 'lighter' (subir L)
    // Retorna { hex, ratio, delta_l, reached }
    const searchDirection = (targetS, direction) => {
      const extreme = direction === 'darker' ? 0 : 1;
      const extremeHex = hslToHex(original.h, targetS, extreme);
      const extremeRatio = contrastRatio(extremeHex, paper);
      if (extremeRatio < targetRatio) {
        return { hex: extremeHex, ratio: extremeRatio, delta_l: Math.abs(extreme - original.l), reached: false };
      }

      // Binary search: queremos el L MÁS CERCANO al original que aún cumpla target
      let lo, hi;
      if (direction === 'darker') {
        lo = 0;           // extremo oscuro (cumple target por definición)
        hi = original.l;  // original (no cumple, por eso entramos aquí)
      } else {
        lo = original.l;  // original (no cumple)
        hi = 1;           // extremo claro (cumple target)
      }

      let bestL = extreme;
      let bestHex = extremeHex;
      let bestRatio = extremeRatio;

      for (let i = 0; i < 24; i++) {
        const mid = (lo + hi) / 2;
        const candHex = hslToHex(original.h, targetS, mid);
        const candRatio = contrastRatio(candHex, paper);
        if (candRatio >= targetRatio) {
          // cumple target — guardar y acercarse al original
          bestL = mid;
          bestHex = candHex;
          bestRatio = candRatio;
          if (direction === 'darker') {
            lo = mid;  // mover hacia el original (más claro)
          } else {
            hi = mid;  // mover hacia el original (más oscuro)
          }
        } else {
          // no cumple — alejarse del original
          if (direction === 'darker') {
            hi = mid;  // más oscuro
          } else {
            lo = mid;  // más claro
          }
        }
      }
      return { hex: bestHex, ratio: bestRatio, delta_l: Math.abs(bestL - original.l), reached: true };
    };

    // Con una saturación dada, prueba AMBAS direcciones y elige la mejor
    const searchBoth = (targetS) => {
      const darker = searchDirection(targetS, 'darker');
      const lighter = searchDirection(targetS, 'lighter');
      if (!darker.reached && !lighter.reached) return null;
      if (!darker.reached) return lighter;
      if (!lighter.reached) return darker;
      // ambos cumplen — elegir el que cambie menos L (preserva identidad)
      return darker.delta_l <= lighter.delta_l ? darker : lighter;
    };

    // Intento 1: con saturación original
    let best = searchBoth(original.s);
    if (best) return best.hex;

    // Intento 2..5: bajar saturación (0.8, 0.6, 0.4, 0.2)
    // El amarillo puro saturado no alcanza 4.5:1 contra crema en ningún L.
    // Bajar saturación lo convierte en ocre/ámbar, que sí cumple.
    for (const factor of [0.8, 0.6, 0.4, 0.2]) {
      best = searchBoth(original.s * factor);
      if (best) return best.hex;
    }

    // Último recurso: elegir entre negro o blanco el que dé más contraste
    const blackRatio = contrastRatio('#000000', paper);
    const whiteRatio = contrastRatio('#ffffff', paper);
    return blackRatio >= whiteRatio ? '#000000' : '#ffffff';
  } catch {
    try {
      const blackRatio = contrastRatio('#000000', paper);
      const whiteRatio = contrastRatio('#ffffff', paper);
      return blackRatio >= whiteRatio ? '#111111' : '#eeeeee';
    } catch {
      return '#111111';
    }
  }
}

function normalizeHighlightSyntax(text) {
  let value = String(text || '').trim();
  if (!value) return '';

  value = value
    .replace(/\{\{H\}\}/gi, '[H]')
    .replace(/\{\{\/H\}\}/gi, '[/H]')
    .replace(/\[h\]/g, '[H]')
    .replace(/\[\/h\]/g, '[/H]');

  let toggleOpen = true;
  value = value.replace(/\[H\]/g, () => {
    const token = toggleOpen ? '[H]' : '[/H]';
    toggleOpen = !toggleOpen;
    return token;
  });

  const openCount = (value.match(/\[H\]/g) || []).length;
  const closeCount = (value.match(/\[\/H\]/g) || []).length;

  if (openCount > closeCount) {
    value += '[/H]'.repeat(openCount - closeCount);
  }

  let extraClose = (value.match(/\[\/H\]/g) || []).length - (value.match(/\[H\]/g) || []).length;
  while (extraClose > 0) {
    const idx = value.lastIndexOf('[/H]');
    if (idx === -1) break;
    value = value.slice(0, idx) + value.slice(idx + 4);
    extraClose--;
  }

  return value.replace(/\[H\]\s*\[\/H\]/g, '').replace(/[ \t]{2,}/g, ' ').trim();
}

function cleanHighlightTokens(text) {
  return normalizeHighlightSyntax(text).replace(/\[H\]|\[\/H\]/gi, '');
}

function renderMarkerHTML(text) {
  return normalizeHighlightSyntax(text).replace(/\[H\]([\s\S]*?)\[\/H\]/gi, '<span class="marker-highlight">$1</span>');
}

    if (span) {
      // Botones con texto (Comprar, Penguin)
      originalText = span.textContent;
      span.textContent = 'Abriendo...';
    } else if (emojiSpan && action === 'buscalibre-explorar') {
      // Botón explorar (solo emoji): 🔮 → ⏳
      originalText = emojiSpan.textContent;
      emojiSpan.textContent = '⏳';
    }
    
    // Tracking asíncrono
    try { 
      track(`${action}_clicked`, { book: libro.titulo }); 
    } catch(_) {}
    
    // 🎯 TIMEOUT DINÁMICO: Penguin (antes enviaflores) puede necesitar más tiempo
    const timeoutDuration = action === 'penguin' ? 8000 : 4000;
    
    const timerId = setTimeout(() => {
      target.classList.remove('is-opening');
      if (span) {
        span.textContent = originalText;
      } else if (emojiSpan) {
        emojiSpan.textContent = originalText;
      }
      activeResetTimers.delete(target);
    }, timeoutDuration);
    
    activeResetTimers.set(target, timerId);
  };
  
  // Registrar listeners
  document.addEventListener('visibilitychange', visibilityHandler);
  window.addEventListener('pagehide', pagehideHandler);
  card.addEventListener('click', cardClickHandler, true);

  // Mostrar overlay
  overlay.style.display="flex";
  setTimeout(() => overlay.classList.add('visible'), 10);
  track('card_viewed', { book: libro.titulo });
};

// LOGICA DE CIERRE (MÁXIMA PRIORIDAD + LIMPIEZA DE MEMORIA)
window.handleCardClick = function(e) {
  if (e.target.closest('a') || e.target.closest('button')) {
    e.stopPropagation();
    return;
  }
  window.closeCard();
}

window.closeCard = function() {
  const overlay = document.getElementById("tarjetaOverlay");
  overlay.classList.remove('visible');
  setTimeout(() => { 
    overlay.style.display="none";
    // Limpiar listeners y timers al cerrar
    cleanupCardListeners();
  }, 300);
}

// ══════════════════════════════════════════════════════════════════════════
// 🔍 MOTOR DE FILTRO TF-IDF NIVEL DIOS
// 
// Fundamento matemático:
// - TF (Term Frequency): qué tanto aparece una palabra en un libro
// - IDF (Inverse Document Frequency): qué tan rara es esa palabra en el catálogo
// - Score = Σ(TF × IDF) por cada palabra del query en cada libro
//
// Cero stopwords hardcodeadas. Cero palabras "basura". TODA palabra que el
// usuario escribe cuenta. Las palabras comunes (el, la, es, the, of) pesan
// poco AUTOMÁTICAMENTE porque aparecen en todos los libros (IDF bajo).
// Las palabras raras y significativas (Kasparov, dopamina, integridad,
// nada, vacío) pesan mucho porque aparecen en pocos libros (IDF alto).
//
// Costo: $0 · Latencia: <20ms para catálogo de 200 libros
// Escala: TF-IDF es el mismo algoritmo que usaba Google antes de la era de
// embeddings. Matemáticamente correcto de 1 libro a 10 millones.
// ══════════════════════════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════════════════
// 🌒 v10: Diccionario de sinónimos emocionales — expansión de query.
//
// 30 familias semánticas (estados emocionales, energía, relacionales, vitales).
// Reciprocidad matemática garantizada: si A→[B,C], entonces B→[A,C] y C→[A,B].
// 169 términos ES + 164 términos EN, ~5 sinónimos promedio cada uno.
//
// Aplicación en TrigguiFiltro:
//   - Token escrito por el usuario: peso 1.0 (gana siempre que matchea)
//   - Sinónimo expandido: peso 0.5 (rescata sin dominar)
//   - Si el usuario escribe DOS palabras del mismo cluster, ambas valen 1.0
//
// FALLBACK: si el idioma no está en el mapa o hay cualquier error,
// expandWithSynonyms devuelve solo los tokens originales — el filtro
// sigue funcionando idéntico al comportamiento previo. Cero riesgo.

function buildQueryVector(tokens, lang) {
  const map = lang === 'en' ? QUANTUM_LENS_MAP_EN : QUANTUM_LENS_MAP_ES;
  const vector = {};
  for (const dim of QUANTUM_DIMS) vector[dim] = 0;
  let activated = 0;
  for (const token of tokens) {
    const lookup = map[token];
    if (!lookup) continue;
    activated++;
    for (const [dim, weight] of Object.entries(lookup)) {
      if (vector[dim] !== undefined) vector[dim] += weight;
    }
  }
  let mag = 0;
  for (const dim of QUANTUM_DIMS) mag += vector[dim] * vector[dim];
  mag = Math.sqrt(mag);
  if (mag > 0) {
    for (const dim of QUANTUM_DIMS) vector[dim] = vector[dim] / mag;
  }
  return { vector, activated };
}

function flattenLensVector(libro) {
  const lens = libro && libro._lens_compatibility;
  if (!lens) return null;
  const v = {};
  v['chronobiology'] = typeof lens.chronobiology === 'number' ? lens.chronobiology : 0;
  v['game-theory'] = typeof lens['game-theory'] === 'number' ? lens['game-theory'] : 0;
  v['self-knowledge'] = typeof lens['self-knowledge'] === 'number' ? lens['self-knowledge'] : 0;
  v['hawkins'] = typeof lens.hawkins === 'number' ? lens.hawkins : 0;
  const p = lens.pilares || {};
  v['pilares.cuerpo'] = typeof p.cuerpo === 'number' ? p.cuerpo : 0;
  v['pilares.mente'] = typeof p.mente === 'number' ? p.mente : 0;
  v['pilares.negocio'] = typeof p.negocio === 'number' ? p.negocio : 0;
  v['pilares.familia'] = typeof p.familia === 'number' ? p.familia : 0;
  v['pilares.espiritu'] = typeof p.espiritu === 'number' ? p.espiritu : 0;
  v['pilares.relaciones'] = typeof p.relaciones === 'number' ? p.relaciones : 0;
  v['pilares.finanzas'] = typeof p.finanzas === 'number' ? p.finanzas : 0;
  let mag = 0;
  for (const dim of QUANTUM_DIMS) mag += v[dim] * v[dim];
  mag = Math.sqrt(mag);
  if (mag > 0) {
    for (const dim of QUANTUM_DIMS) v[dim] = v[dim] / mag;
  }
  return v;
}

function quantumScore(queryVector, libro) {
  const bookVector = flattenLensVector(libro);
  if (!bookVector) return 0;
  let dot = 0;
  for (const dim of QUANTUM_DIMS) {
    dot += queryVector[dim] * bookVector[dim];
  }
  return Math.max(0, Math.min(1, dot));
}

/**
 * analyzeInput(tokens) — análisis cuántico-quark del input del usuario.
 *
 * @param {Array<string>} tokens - userTokensFiltered (>= 3 chars, sin stopwords)
 * @returns {Object} {
 *   pilares,           // array de pilares detectados (puede ser múltiples)
 *   hawkins_current,   // nivel Hawkins detectado (o null)
 *   hawkins_target,    // elevación +1 nivel (o null)
 *   punto_inferido,    // 'cero' | 'creativo' | 'activo' | 'maximo' | null
 *   punto_label_en,    // 'space' | 'think' | 'do' | 'burn' | null
 *   raw_tokens         // tokens normalizados sin acentos
 * }
 */
function analyzeInput(tokens) {
  if (!Array.isArray(tokens) || tokens.length === 0) {
    return {
      pilares: [],
      hawkins_current: null,
      hawkins_target: null,
      punto_inferido: null,
      punto_label_en: null,
      raw_tokens: []
    };
  }

  // Normalizar tokens: lowercase + sin acentos
  var normalized = tokens.map(function(t) {
    return String(t || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  });

  // Detectar pilares (todos los que matchean — puede ser múltiples)
  var pilares = [];
  for (var pilar in KEYWORDS_PILARES_V15) {
    var keywords = KEYWORDS_PILARES_V15[pilar];
    for (var i = 0; i < keywords.length; i++) {
      if (normalized.indexOf(keywords[i]) !== -1) {
        if (pilares.indexOf(pilar) === -1) pilares.push(pilar);
        break;
      }
    }
  }

  // Detectar hawkins_current (toma el MÁS BAJO encontrado — prioriza dolor)
  var hawkins_current = null;
  for (var level in KEYWORDS_HAWKINS_V15) {
    var kws = KEYWORDS_HAWKINS_V15[level];
    var lvl = Number(level);
    for (var j = 0; j < kws.length; j++) {
      if (normalized.indexOf(kws[j]) !== -1) {
        if (hawkins_current === null || lvl < hawkins_current) hawkins_current = lvl;
        break;
      }
    }
  }

  // Calcular hawkins_target: elevación +1 nivel
  var hawkins_target = null;
  if (hawkins_current !== null) {
    var idx = NIVELES_HAWKINS_V15.indexOf(hawkins_current);
    if (idx >= 0 && idx + 1 < NIVELES_HAWKINS_V15.length) {
      hawkins_target = NIVELES_HAWKINS_V15[idx + 1];
    } else {
      hawkins_target = hawkins_current;
    }
  }

  // Detectar punto inferido desde keywords (cuenta matches por punto)
  var puntoMatches = { cero: 0, creativo: 0, activo: 0, maximo: 0 };
  for (var punto in KEYWORDS_PUNTOS_V15) {
    var pkws = KEYWORDS_PUNTOS_V15[punto];
    for (var k = 0; k < pkws.length; k++) {
      if (normalized.indexOf(pkws[k]) !== -1) puntoMatches[punto]++;
    }
  }

  // Punto con MÁS matches gana (null si todos en 0)
  var punto_inferido = null;
  var maxMatches = 0;
  for (var pt in puntoMatches) {
    if (puntoMatches[pt] > maxMatches) {
      maxMatches = puntoMatches[pt];
      punto_inferido = pt;
    }
  }

  var result = {
    pilares: pilares,
    hawkins_current: hawkins_current,
    hawkins_target: hawkins_target,
    punto_inferido: punto_inferido,
    punto_label_en: punto_inferido ? PUNTO_LABEL_EN_V15[punto_inferido] : null,
    raw_tokens: normalized
  };

  console.log('[analyzeInput v15]', result);
  return result;
}

/**
 * inferPuntoCiclo(date) — infiere PUNTO del ciclo desde la hora.
 *
 * Doctrina cuántico-quark biológicamente correcta de Badir:
 *   06–09 → creativo (think) — cortisol matutino, ideación post-sueño
 *   09–11 → activo  (do)    — alta energía operativa
 *   11–14 → maximo  (burn)  — pre-comida, intensidad pico
 *   14–16 → cero    (space) — POST-COMIDA, decisión del juez (Levav-Avnaim 2011)
 *   16–17 → creativo (think) — rebote creativo media tarde
 *   17–20 → maximo  (burn)  — último empuje vespertino
 *   20–22 → creativo (think) — reflexión creativa pre-melatonina
 *   22–06 → cero    (space) — descanso profundo, recuperación
 *
 * @param {Date} date - opcional, default new Date()
 * @returns {Object} { punto, label_en, energia, hora, dia }
 */
function inferPuntoCiclo(date) {
  date = date || new Date();
  var hora = date.getHours();
  var dia = date.getDay(); // 0=domingo, 6=sábado

  var punto, energia;
  if (hora >= 6 && hora < 9)        { punto = 'creativo'; energia = 0.8; }
  else if (hora >= 9 && hora < 11)  { punto = 'activo';   energia = 1.0; }
  else if (hora >= 11 && hora < 14) { punto = 'maximo';   energia = 1.2; }
  else if (hora >= 14 && hora < 16) { punto = 'cero';     energia = 0.3; }
  else if (hora >= 16 && hora < 17) { punto = 'creativo'; energia = 0.6; }
  else if (hora >= 17 && hora < 20) { punto = 'maximo';   energia = 1.1; }
  else if (hora >= 20 && hora < 22) { punto = 'creativo'; energia = 0.7; }
  else                              { punto = 'cero';     energia = 0.2; }

  var result = {
    punto: punto,
    label_en: PUNTO_LABEL_EN_V15[punto],
    energia: energia,
    hora: hora,
    dia: dia
  };
  console.log('[inferPuntoCiclo v15]', result);
  return result;
}

  const TrigguiFiltro = {
  // Cache del índice IDF. Se reconstruye cuando cambia el catálogo o el idioma.
  _idxCache: null,
  _idxCacheKey: null,

  normalize: function(s) {
    return String(s || '')
      .toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^\w\s]/g, ' ')
      .replace(/\s+/g, ' ')

  // Devuelve array de {token, weight}.
  //   - Originales escritos por el usuario: peso 1.0 (gana siempre que matchea)
  //   - Sinónimos expandidos del diccionario: peso 0.5 (rescata sin dominar)
  // Defensa anti-doble-conteo: si el query ya incluye un sinónimo de otro
  // token, ese sinónimo cuenta como original (peso 1.0), nunca se duplica.
  // FALLBACK: si TRIGGUI_SYNONYMS no existe o el idioma no está en él,
  // devuelve solo los originales — el filtro funciona idéntico al previo.
  expandWithSynonyms: function(tokens) {
    try {
      const expanded = tokens.map(t => ({ token: t, weight: 1.0 }));
      if (typeof TRIGGUI_SYNONYMS === 'undefined') return expanded;
      const lang = (typeof TriggguiI18n !== 'undefined' && TriggguiI18n.lang) || 'es';
      const dict = TRIGGUI_SYNONYMS[lang];
      if (!dict) return expanded;
      const seen = new Set(tokens);
      for (const t of tokens) {
        const syns = dict[t];
        if (!Array.isArray(syns)) continue;
        for (const syn of syns) {
          if (seen.has(syn)) continue;
          expanded.push({ token: syn, weight: 0.5 });
          seen.add(syn);
        }
      }
      return expanded;
    } catch (_) {
      return tokens.map(t => ({ token: t, weight: 1.0 }));

  // Extrae el texto completo de un libro en 4 zonas con peso distinto.

  // - palabras clave del libro: las 4 palabras que el curador eligió (x5)
  // - título + autor: identidad del libro (x3)
  // - tarjeta + frases: contenido editorial (x1.5)
  // - tagline + dimension + punto: metadata contextual (x1)
  extractZones: function(libro) {
    const useEn = TriggguiI18n.lang === 'en';
    const titulo = useEn && libro.titulo_en ? libro.titulo_en : (libro.titulo || '');
    const palabras = useEn && Array.isArray(libro.palabras_en) ? libro.palabras_en : (libro.palabras || []);
    const frases = useEn && Array.isArray(libro.frases_en) ? libro.frases_en : (libro.frases || []);
    const tarjeta = useEn && libro.tarjeta_en ? libro.tarjeta_en : (libro.tarjeta || {});
    const nucleus = libro._nucleus && libro._nucleus.book_grounding_anchors;
    const anchors = nucleus ? (nucleus.concepts || []).concat(nucleus.key_terms || []) : [];
    return {
      palabras: [...palabras, ...anchors].join(' '),
      identidad: [titulo, libro.autor || ''].join(' '),
      editorial: [
        frases.join(' '),
        tarjeta.subtitulo || '',
        tarjeta.parrafoTop || '',

  termFrequency: function(text) {

  // IDF(término) = log(total_libros / libros_que_contienen_el_término)

  // Palabras en 1 de N libros → IDF = log(N) (máximo peso)
  // 
  // También pre-computa los vectores TF ponderados de cada libro para scoring
  // rápido. Todo esto corre una sola vez cuando llega el contenido.json.
  buildIndex: function(libros) {
    const cacheKey = `${libros.length}_${TriggguiI18n.lang}`;
    if (this._idxCache && this._idxCacheKey === cacheKey) return this._idxCache;

    const N = libros.length;
    const docFreq = {};
    const bookVectors = [];

    const ZONE_WEIGHTS = { palabras: 5.0, identidad: 3.0, editorial: 1.5, contexto: 1.0 };

    // Primera pasada: calcular TF por libro y document frequency global
    for (const libro of libros) {
      const zones = this.extractZones(libro);
      const bookVec = {};
      const seenInThisBook = new Set();
      for (const zoneName of Object.keys(ZONE_WEIGHTS)) {
        const tf = this.termFrequency(zones[zoneName]);
        const w = ZONE_WEIGHTS[zoneName];
        for (const [term, count] of Object.entries(tf)) {
          bookVec[term] = (bookVec[term] || 0) + count * w;
          seenInThisBook.add(term);
        }

      for (const term of seenInThisBook) {

  // No es arbitrario: cada franja horaria tiene un "punto Hawkins" afín.
  cronoBoost: function(libro) {
    const now = new Date();
    const hour = now.getHours();
    const day = now.getDay();
    let boost = 0;
    const punto = this.normalize(libro.punto || '');
    if (hour >= 5 && hour < 10) {
      if (punto.includes('cero') || punto.includes('creativo')) boost += 1.2;
    } else if (hour >= 10 && hour < 14) {
      if (punto.includes('activo') || punto.includes('maximo')) boost += 1.2;
    } else if (hour >= 14 && hour < 18) {
      if (punto.includes('activo')) boost += 0.8;
    } else if (hour >= 18 && hour < 22) {
      if (punto.includes('creativo') || punto.includes('cero')) boost += 0.8;
    } else {
      if (punto.includes('cero')) boost += 0.6;
    }
    if (day === 4 && punto.includes('maximo')) boost += 0.5;
    if ((day === 0 || day === 6) && punto.includes('cero')) boost += 0.4;
    return boost;
  },

  // Semilla pseudo-aleatoria derivada del día. Misma query el mismo día = mismo
  // libro. Al día siguiente puede rotar. Esto da sensación de "consejo del día"
  // consistente pero no repetitivo en el tiempo.
  daySeed: function(query) {
    const today = new Date().toDateString();
    const str = today + '|' + (query || '');
    let h = 5381;
    for (let i = 0; i < str.length; i++) h = ((h * 33) ^ str.charCodeAt(i)) >>> 0;

  // 🌒 CAPA C — CSAL MATCHING NIVEL DIOS

  // El _csal del libro contiene 4 capas curadas por el extractor v4:

  //   - trigger_keywords:   emociones/objetos/contextos/verbos categorizados
  //   - concept_tags:       conceptos identitarios del libro

  buildCSALIndex: function(libros, lang) {

    if (this._csalIdxCacheKey === cacheKey) return this._csalIdxCache;

    const perBook = [];
    let coverageCount = 0;

    for (let i = 0; i < libros.length; i++) {
      const libro = libros[i];
      const csal = libro && libro._csal;

      if (!csal || typeof csal !== 'object') {
        perBook.push(null); // libro sin CSAL → fallback a QUANTUM
        continue;
      }
      coverageCount++;

      const situationTokens = (csal.trigger_situations || [])
        .filter(s => typeof s === 'string')
        .map(s => this.tokenize(s));

      const kw = csal.trigger_keywords || {};

        ...(Array.isArray(kw.objetos)   ? kw.objetos   : []),
        ...(Array.isArray(kw.contextos) ? kw.contextos : []),
        ...(Array.isArray(kw.verbos)    ? kw.verbos    : [])
      ].filter(k => typeof k === 'string');
      // Cada keyword puede ser frase compuesta ("ansiedad social"). Tokenizamos
      // y guardamos como Set para lookup O(1).
      const keywordTokens = new Set();
      for (const k of allKeywords) {
        for (const t of this.tokenize(k)) keywordTokens.add(t);
      }

      // concept_tags: tokenizar y guardar como Set
      const conceptTagTokens = new Set();
      for (const ct of (csal.concept_tags || [])) {
        if (typeof ct !== 'string') continue;
        for (const t of this.tokenize(ct)) conceptTagTokens.add(t);
      }

      // anti_patterns: tokenizar y guardar como Set (penalty)
      const antiPatternTokens = new Set();
      for (const ap of (csal.anti_patterns || [])) {
        if (typeof ap !== 'string') continue;
        for (const t of this.tokenize(ap)) antiPatternTokens.add(t);
      }

      perBook.push({
        situationTokens,    // array de arrays (matching por overlap)
        keywordTokens,      // Set
        conceptTagTokens,   // Set
        antiPatternTokens   // Set
      });

  // Score CSAL para un libro contra los tokens del usuario.
  // Pesos justificados (sección 20.2 del Maestro V9):
  //   situations 45%: frases naturales completas, mayor riqueza semántica
  //   keywords   30%: matching directo de tokens curados
  //   tags       20%: identidad del libro
  //   anti     -50%: penalty fuerte cuando el libro NO sirve para el query
  // Stopwords se filtran ANTES (ver filter()). Tokens vacíos se ignoran.
  scoreCSAL: function(userTokensFiltered, bookData) {
    if (!bookData) return 0;
    if (!userTokensFiltered || userTokensFiltered.length === 0) return 0;

    // ─── Score A — trigger_situations (peso 45%) ─────────────────────────
    // Para cada situation del libro, contar cuántos tokens del usuario aparecen.
    // Normalizar por longitud de la situation (TF normalizado).
    let situationScore = 0;
    let situationsHit = 0;
    for (const sitTokens of bookData.situationTokens) {
      if (sitTokens.length === 0) continue;
      let matches = 0;
      for (const ut of userTokensFiltered) {
        if (sitTokens.includes(ut)) matches++;
      }
      if (matches > 0) {
        situationsHit++;
        situationScore += matches / Math.max(1, Math.sqrt(sitTokens.length));
      }
    }
    // Bonus por diversidad: hits en muchas situations distintas (max 20%)
    const diversityBonus = Math.min(1, situationsHit / 5);
    situationScore = situationScore * (1 + diversityBonus * 0.2);

    // ─── Score B — trigger_keywords (peso 30%) ───────────────────────────
    // Matching directo de tokens del usuario contra keywords curados del libro.
    let keywordScore = 0;
    for (const ut of userTokensFiltered) {
      if (bookData.keywordTokens.has(ut)) keywordScore += 1;
    }

    // ─── Score C — concept_tags (peso 20%) ───────────────────────────────
    // Matching de tokens del usuario contra tags identitarios del libro.
    let tagScore = 0;
    for (const ut of userTokensFiltered) {
      if (bookData.conceptTagTokens.has(ut)) tagScore += 0.7;
    }

    // ─── Score D — anti_patterns (penalty -50%) ───────────────────────────
    // Si el query del usuario toca un anti_pattern del libro, penalizar fuerte.
    let antiPenalty = 0;
    for (const ut of userTokensFiltered) {
      if (bookData.antiPatternTokens.has(ut)) antiPenalty += 1;
    }

    // Combinación ponderada (clamp a 0+ — un libro nunca tiene score negativo)
    const finalScore =
      situationScore * 0.45 +
      keywordScore   * 0.30 +
      tagScore       * 0.20
      - antiPenalty  * 0.50;

    return Math.max(0, finalScore);
  },

      'estoy','estás','está','estamos','están','estaba','estaban',
      'tengo','tienes','tiene','tenemos','tienen','tenía','tenían',
