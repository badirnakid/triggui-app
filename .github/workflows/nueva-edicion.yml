name: Nueva Edición Triggui

run-name: >-
  Nueva edición ·
  ${{ inputs.modo_entrada || 'book' }} ·
  ${{ inputs.selector_mode || 'direct' }} ·
  ${{ inputs.entrada || inputs.libro }}

on:
  workflow_dispatch:
    inputs:
      libro:
        description: 'LEGACY opcional: Título del libro | Autor (ej: Generación Dopamina | Anna Lembke)'
        required: false
        type: string

      modo_entrada:
        description: 'Tipo de entrada'
        required: true
        default: 'book'
        type: choice
        options:
          - book
          - trigger

      selector_mode:
        description: 'Cómo resolver el libro'
        required: true
        default: 'direct'
        type: choice
        options:
          - direct
          - constrained
          - discover

      entrada:
        description: 'Libro o trigger (puede venir mezclado; el pipeline ahora limpia la intención y separa ruido editorial)'
        required: false
        type: string

      autor:
        description: 'Autor opcional si en modo book no lo incluyes en "entrada"'
        required: false
        type: string

      catalog_scope:
        description: 'Catálogo a usar cuando selector_mode=constrained'
        required: true
        default: 'libros_master_csv'
        type: choice
        options:
          - libros_master_csv
          - none

      editorial_mode:
        description: 'Qué prompt editorial usar en build-contenido'
        required: true
        default: 'legacy'
        type: choice
        options:
          - legacy
          - external

concurrency:
  group: nueva-edicion-triggui-content-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  nueva-edicion:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout triggui-app
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Checkout triggui-content
        uses: actions/checkout@v4
        with:
          repository: badirnakid/triggui-content
          token: ${{ secrets.CONTENT_REPO_TOKEN }}
          path: triggui-content
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (triggui-app)
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Paso 0 — Resolver contrato de entrada
        id: contract
        shell: bash
        env:
          INPUT_LIBRO: ${{ inputs.libro }}
          INPUT_MODO: ${{ inputs.modo_entrada }}
          INPUT_SELECTOR: ${{ inputs.selector_mode }}
          INPUT_ENTRADA: ${{ inputs.entrada }}
          INPUT_AUTOR: ${{ inputs.autor }}
          INPUT_CATALOG_SCOPE: ${{ inputs.catalog_scope }}
          INPUT_EDITORIAL_MODE: ${{ inputs.editorial_mode }}
        run: |
          set -euo pipefail

          LEGACY_BOOK="${INPUT_LIBRO}"
          INPUT_MODE_RAW="${INPUT_MODO}"
          INPUT_SELECTOR_RAW="${INPUT_SELECTOR}"
          INPUT_ENTRADA_RAW="${INPUT_ENTRADA}"
          INPUT_AUTOR_RAW="${INPUT_AUTOR}"
          INPUT_CATALOG_SCOPE_RAW="${INPUT_CATALOG_SCOPE}"
          INPUT_EDITORIAL_MODE_RAW="${INPUT_EDITORIAL_MODE}"

          # Prioridad de entrada:
          # 1) si viene libro legacy y entrada está vacía -> usa libro legacy
          # 2) si viene entrada -> usa entrada
          if [ -n "${LEGACY_BOOK}" ] && [ -z "${INPUT_ENTRADA_RAW}" ]; then
            MODO_EFFECTIVE="book"
            SELECTOR_EFFECTIVE="direct"
            ENTRADA_EFFECTIVE="${LEGACY_BOOK}"
            LIBRO_INPUT="${LEGACY_BOOK}"
          else
            MODO_EFFECTIVE="${INPUT_MODE_RAW}"
            SELECTOR_EFFECTIVE="${INPUT_SELECTOR_RAW}"
            ENTRADA_EFFECTIVE="${INPUT_ENTRADA_RAW}"
            LIBRO_INPUT=""
          fi

          if [ -z "${ENTRADA_EFFECTIVE}" ]; then
            echo "❌ Debes proporcionar 'entrada' o 'libro'"
            exit 1
          fi

          if [ "${MODO_EFFECTIVE}" = "book" ]; then
            SELECTOR_EFFECTIVE="direct"

            if [[ -n "${INPUT_AUTOR_RAW}" && "${ENTRADA_EFFECTIVE}" != *"|"* ]]; then
              LIBRO_INPUT="${ENTRADA_EFFECTIVE} | ${INPUT_AUTOR_RAW}"
            else
              LIBRO_INPUT="${ENTRADA_EFFECTIVE}"
            fi
          else
            if [ "${SELECTOR_EFFECTIVE}" = "direct" ]; then
              echo "❌ selector_mode=direct no tiene sentido con modo_entrada=trigger"
              exit 1
            fi
          fi

          if [ "${INPUT_EDITORIAL_MODE_RAW}" = "external" ]; then
            USE_EXTERNAL_EDITORIAL_PROMPTS="true"
          else
            USE_EXTERNAL_EDITORIAL_PROMPTS="false"
          fi

          {
            echo "input_mode=${MODO_EFFECTIVE}"
            echo "selector_mode=${SELECTOR_EFFECTIVE}"
            echo "entrada_raw=${ENTRADA_EFFECTIVE}"
            echo "libro_input=${LIBRO_INPUT}"
            echo "catalog_scope=${INPUT_CATALOG_SCOPE_RAW}"
            echo "editorial_mode=${INPUT_EDITORIAL_MODE_RAW}"
            echo "use_external_editorial_prompts=${USE_EXTERNAL_EDITORIAL_PROMPTS}"
          } >> "$GITHUB_OUTPUT"

          echo "══════════════════════════════════════════"
          echo "🧠 CONTRATO DE ENTRADA RESUELTO"
          echo "legacy libro      = ${LEGACY_BOOK}"
          echo "modo_entrada      = ${MODO_EFFECTIVE}"
          echo "selector_mode     = ${SELECTOR_EFFECTIVE}"
          echo "entrada_raw       = ${ENTRADA_EFFECTIVE}"
          echo "libro_input       = ${LIBRO_INPUT}"
          echo "catalog_scope     = ${INPUT_CATALOG_SCOPE_RAW}"
          echo "editorial_mode    = ${INPUT_EDITORIAL_MODE_RAW}"
          echo "prompts externos  = ${USE_EXTERNAL_EDITORIAL_PROMPTS}"
          echo "══════════════════════════════════════════"

      - name: Paso 1 — Validar libro y obtener portada
        id: validate
        continue-on-error: true
        env:
          INPUT_MODE: ${{ steps.contract.outputs.input_mode }}
          SELECTOR_MODE: ${{ steps.contract.outputs.selector_mode }}
          ENTRADA_RAW: ${{ steps.contract.outputs.entrada_raw }}
          LIBRO_INPUT: ${{ steps.contract.outputs.libro_input }}
          CATALOG_SCOPE: ${{ steps.contract.outputs.catalog_scope }}
          CATALOG_CSV_PATH: triggui-content/data/libros_master.csv
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
        run: node scripts/validate-book.js

      - name: Paso 1.1 — Mostrar diagnóstico si validación falló
        if: ${{ always() && steps.validate.outcome == 'failure' }}
        shell: bash
        run: |
          set -euo pipefail

          echo "══════════════════════════════════════════"
          echo "❌ VALIDACIÓN FALLÓ"
          echo "🧭 modo_entrada:   ${{ steps.contract.outputs.input_mode }}"
          echo "🧠 selector_mode:  ${{ steps.contract.outputs.selector_mode }}"
          echo "📝 editorial_mode: ${{ steps.contract.outputs.editorial_mode }}"
          echo "📝 entrada_raw:    ${{ steps.contract.outputs.entrada_raw }}"
          echo "══════════════════════════════════════════"

          if [ -f /tmp/triggui-validate-debug.json ]; then
            echo "🧪 DEBUG /tmp/triggui-validate-debug.json"
            cat /tmp/triggui-validate-debug.json
          else
            echo "⚠️ No se encontró /tmp/triggui-validate-debug.json"
          fi

          exit 1

      - name: Paso 2 — Enriquecer con GPT-4o-mini (modo SINGLE)
        if: ${{ steps.validate.outcome == 'success' }}
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          SINGLE_MODE: "true"
          SINGLE_BOOK: ${{ steps.validate.outputs.book_json }}
          USE_EXTERNAL_EDITORIAL_PROMPTS: ${{ steps.contract.outputs.use_external_editorial_prompts }}
        run: |
          set -euo pipefail

          cd triggui-content
          npm install
          node scripts/build-contenido.js

          # Artefacto canónico nuevo del pipeline single-book
          cp contenido.json contenido_edicion.json

          # Copias hacia triggui-app:
          # - contenido.json se conserva por backward compatibility
          # - contenido_edicion.json será el carril canónico nuevo
          cp contenido.json ../contenido.json
          cp contenido_edicion.json ../contenido_edicion.json

      - name: Paso 3 — Generar edición viva HTML
        if: ${{ steps.validate.outcome == 'success' }}
        env:
          TRIGGUI_EDICION_JSON: contenido_edicion.json
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            export BASE_URL="https://app.triggui.com"
          else
            export BASE_URL="https://beta.app.triggui.com"
          fi

          echo "BASE_URL=${BASE_URL}"
          echo "TRIGGUI_EDICION_JSON=${TRIGGUI_EDICION_JSON}"
          python3 scripts/build-editions.py

      - name: Paso 4 — Generar tarjeta PNG (1080×1920)
        if: ${{ steps.validate.outcome == 'success' }}
        env:
          TRIGGUI_EDICION_JSON: contenido_edicion.json
        run: node scripts/build-tarjeta-png.js

      - name: Paso 5 — Generar OG image PNG (1200×630)
        if: ${{ steps.validate.outcome == 'success' }}
        env:
          TRIGGUI_EDICION_JSON: contenido_edicion.json
        run: node scripts/build-og-image.js

      - name: Paso 6 — Commit y push
        if: ${{ steps.validate.outcome == 'success' }}
        run: |
          set -euo pipefail

          SLUG=$(cat /tmp/triggui-slug.txt)

          git config user.name "Triggui Bot"
          git config user.email "bot@triggui.com"

          git add public/t/ contenido.json contenido_edicion.json
          git commit -m "✨ Nueva edición: ${SLUG}" || echo "No changes to commit in triggui-app"
          git push

          cd triggui-content
          git config user.name "Triggui Bot"
          git config user.email "bot@triggui.com"

          git add contenido.json contenido_edicion.json

          if git diff --cached --quiet; then
            echo "No changes to commit in triggui-content"
          else
            git commit -m "📚 Contenido edición: ${SLUG}"
            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main
          fi

      - name: Paso 7 — Notificación
        if: ${{ steps.validate.outcome == 'success' }}
        run: |
          set -euo pipefail

          SLUG=$(cat /tmp/triggui-slug.txt)

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            BASE_URL="https://app.triggui.com"
          else
            BASE_URL="https://beta.app.triggui.com"
          fi

          echo "══════════════════════════════════════════"
          echo "✅ EDICIÓN LISTA"
          echo "🧭 modo_entrada:   ${{ steps.contract.outputs.input_mode }}"
          echo "🧠 selector_mode:  ${{ steps.contract.outputs.selector_mode }}"
          echo "📝 editorial_mode: ${{ steps.contract.outputs.editorial_mode }}"
          echo "🎯 trigger limpio: ${{ steps.validate.outputs.normalized_trigger || '—' }}"
          echo "📖 ${SLUG}"
          echo "🔗 Edición viva: ${BASE_URL}/t/${SLUG}/"
          echo "🖼️  Tarjeta PNG: public/t/${SLUG}/tarjeta.png"
          echo "🧾 JSON canónico: contenido_edicion.json"
          echo "🧪 Debug validate: ${{ steps.validate.outputs.validation_debug_path || '/tmp/triggui-validate-debug.json' }}"
          echo "══════════════════════════════════════════"
          echo ""
          echo "Descarga la tarjeta PNG y mándala por WhatsApp."
          echo "Después manda el link de la edición viva."
