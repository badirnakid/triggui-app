# ═══════════════════════════════════════════════════════════════════════════════
# 🌒 TRIGGUI — Generador único de contenido nivel dios
# ═══════════════════════════════════════════════════════════════════════════════
#
# v3.4 — Anti-duplicados FIFO: persiste recent-books.json en raíz del repo
#
# Un solo workflow para TODO:
# - 📘 Generar un libro específico (tú eliges cuál)
# - 💭 Triggui elige de tu catálogo de 700 libros según sentimiento
# - 🌍 Triggui busca en el mundo entero según sentimiento
# - 🎲 Generar 20 libros nuevos para la app (batch producción)
# - 🧪 Prueba de 20 libros sin tocar la app (shadow)
#
# Protege automáticamente los libros que generaste manualmente.
# Un batch NO sobrescribe tu curaduría — la respeta.
#
# Resiliente contra:
# - contenido.json no existe → lo crea
# - contenido.json vacío (0 bytes) → lo reconstruye
# - contenido.json corrupto (JSON inválido) → backup + rebuild
# - contenido.json válido → lo usa normalmente
# - recent-books.json no existe → arranca con ring vacío (no falla)
#
# ═══════════════════════════════════════════════════════════════════════════════
# AUTOMATIZACIÓN (cron schedule)
# ═══════════════════════════════════════════════════════════════════════════════
# Para activar ejecución automática, descomenta UNA de las líneas de "schedule"
# más abajo. Para desactivar todo el workflow: GitHub → Settings → Actions
# ═══════════════════════════════════════════════════════════════════════════════

name: 🌒 Triggui — Generar contenido

run-name: >-
  ${{ inputs.modo }}
  ${{ inputs.libro_input != '' && format('· {0}', inputs.libro_input) || '' }}
  ${{ inputs.sentimiento != '' && format('· {0}', inputs.sentimiento) || '' }}

on:
  # ───────────────────────────────────────────────────────────────────────
  # CRON SCHEDULES — descomenta UNA línea para activar automatización
  # ───────────────────────────────────────────────────────────────────────
  # schedule:
  #   - cron: '0 12 * * 1'        # LUNES 6 AM CDMX (recomendado)
  #   - cron: '0 12 * * 1,4'      # LUNES y JUEVES 6 AM CDMX
  #   - cron: '0 12 * * *'        # DIARIO 6 AM CDMX
  #   - cron: '0 12 1,15 * *'     # QUINCENAL (días 1 y 15)
  # ───────────────────────────────────────────────────────────────────────

  workflow_dispatch:
    inputs:
      modo:
        description: '¿Qué quieres generar?'
        required: true
        default: '📘 Un libro que ya sé cuál quiero'
        type: choice
        options:
          - '📘 Un libro que ya sé cuál quiero'
          - '💭 Triggui elige de mi catálogo de 700 libros'
          - '🌍 Triggui busca el libro perfecto del mundo'
          - '🎲 Generar 20 libros nuevos para la app'
          - '🧪 Prueba de 20 libros sin tocar la app'

      catalogo:
        description: '🌒 Catálogo (default: adulto)'
        required: false
        default: 'adulto'
        type: choice
        options:
          - adulto
          - kids

      libro_input:
        description: '📘 Título y autor. Solo para modo 📘. Formato: Título | Autor'
        required: false
        type: string

      sentimiento:
        description: '💭 ¿Qué siente el usuario? Solo modos 💭 y 🌍. Ej: me siento en duelo'
        required: false
        type: string

      lente:
        description: '🔍 Perspectiva especial (opcional). Ej: bajo la lente de maternidad'
        required: false
        type: string

      generar_imagenes:
        description: '🖼️ Generar tarjeta PNG + OG + edición viva'
        required: true
        default: true
        type: boolean

      preservar_manuales:
        description: '🛡️ No sobrescribir libros curados manualmente'
        required: true
        default: true
        type: boolean

      cronobiologia:
        description: '🕒 Adaptar tono al día y hora actuales'
        required: true
        default: true
        type: boolean

      modo_prueba:
        description: '🧪 Solo archivo shadow (NO toca app.triggui.com)'
        required: true
        default: false
        type: boolean

      nota_libro:
        description: '📝 Nota privada sobre el libro (casi nunca se usa)'
        required: false
        type: string

      # === 🎯 SPRINT A v14 — Contexto curatorial nivel dios ===

      punto_ciclo:
        description: '🔄 Punto del ciclo del lector destinatario'
        required: true
        default: 'auto'
        type: choice
        options:
          - 'auto (inferir de cronobiología)'
          - '0 — Cero (no pienso, no hago — contemplación)'
          - '1 — Creativo (pienso, no hago — insight)'
          - '2 — Activo (hago, no pienso — flow)'
          - '3 — Máximo (pienso y hago — peak performance)'

      pilar:
        description: '🏛 Pilar a fortalecer (default: auto/sin sesgo)'
        required: true
        default: 'auto'
        type: choice
        options:
          - 'auto (sin sesgo)'
          - 'cuerpo'
          - 'mente'
          - 'negocio'
          - 'familia'
          - 'espiritu'
          - 'relaciones'
          - 'finanzas'

      hawkins_target:
        description: '🌒 Nivel Hawkins aspirado del libro (default: auto = elevación graduada)'
        required: true
        default: 'auto'
        type: choice
        options:
          - 'auto (elevación graduada según sentimiento)'
          - 'coraje (200)'
          - 'voluntad (310)'
          - 'aceptación (350)'
          - 'razón (400)'
          - 'amor (500)'
          - 'alegría (540)'
          - 'paz (600)'

      lente_hawkins:
        description: '🌒 Lente Hawkins (mapa de conciencia)'
        required: true
        default: true
        type: boolean

      lente_pilares:
        description: '🏛 Lente Pilares (7 áreas de vida)'
        required: true
        default: true
        type: boolean

      lente_game_theory:
        description: '🎲 Lente Game-Theory (estructura de decisiones)'
        required: true
        default: true
        type: boolean

      lente_self_knowledge:
        description: '🪞 Lente Self-Knowledge (patrones internos)'
        required: true
        default: true
        type: boolean

      batch_size:
        description: '📊 Número de libros (solo modos 🎲 y 🧪). Default: 10. Cualquier entero: 2, 10, 50, 98...'
        required: false
        default: '10'
        type: string

concurrency:
  group: triggui-content-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generar:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      TZ: America/Mexico_City
      OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
      # v3.7: Google Books API key (quota 1M/dia vs anonimo 1k/dia)
      # Repository Secret. Consumido por evidence-fetcher.js > fetchGoogle.
      # Si el secret no esta seteado, el fetcher degrada a anonimo sin romper.
      GOOGLE_BOOKS_API_KEY: ${{ secrets.GOOGLE_BOOKS_API_KEY }}
      TRIGGUI_LENS: ${{ inputs.lente }}
      TRIGGUI_BOOK_CONTEXT: ${{ inputs.nota_libro }}
      TRIGGUI_CRONO_ENABLED: ${{ inputs.cronobiologia }}
      BASE_URL: ${{ github.ref_name == 'main' && 'https://app.triggui.com' || 'https://beta.app.triggui.com' }}
      # v3.4: ruta absoluta al ring para que validate-book.js no dependa de cwd
      RECENT_BOOKS_PATH: ${{ github.workspace }}/recent-books.json
      # 🌒 Triggui Kids · soporte multi-catálogo (default: adulto)
      CATALOG_MODE: ${{ inputs.catalogo || 'adulto' }}

      # === 🎯 SPRINT A v14 — Contexto curatorial ===
      TRIGGUI_PUNTO_CICLO: ${{ inputs.punto_ciclo }}
      TRIGGUI_PILAR: ${{ inputs.pilar }}
      TRIGGUI_HAWKINS_TARGET: ${{ inputs.hawkins_target }}
      TRIGGUI_LENS_CHRONOBIOLOGY: ${{ inputs.cronobiologia }}
      TRIGGUI_LENS_HAWKINS: ${{ inputs.lente_hawkins }}
      TRIGGUI_LENS_PILARES: ${{ inputs.lente_pilares }}
      TRIGGUI_LENS_GAME_THEORY: ${{ inputs.lente_game_theory }}
      TRIGGUI_LENS_SELF_KNOWLEDGE: ${{ inputs.lente_self_knowledge }}
      TRIGGUI_SENTIMIENTO: ${{ inputs.sentimiento }}
      BATCH_SIZE: ${{ inputs.batch_size }}

    steps:
      # ╔══════════════════════════════════════════════════════════════════╗
      # ║  FASE 0 — Decodificar modo humano → técnico                       ║
      # ╚══════════════════════════════════════════════════════════════════╝

      - name: 🌐 Decodificar modo
        id: modo
        shell: bash
        run: |
          set -euo pipefail
          MODO_HUMANO="${{ inputs.modo }}"

          # Default para triggers schedule (cron): batch producción
          if [ "${{ github.event_name }}" = "schedule" ]; then
            MODO_HUMANO="🎲 Generar 20 libros nuevos para la app"
            echo "🕒 Ejecutado por cron → modo forzado: ${MODO_HUMANO}"
          fi

          case "${MODO_HUMANO}" in
            *"📘"*|*"sé cuál"*) MODO_TECNICO="single_book" ;;
            *"💭"*|*"catálogo"*) MODO_TECNICO="trigger_constrained" ;;
            *"🌍"*|*"mundo"*) MODO_TECNICO="trigger_discover" ;;
            *"🎲"*|*"20 libros nuevos"*) MODO_TECNICO="production_batch" ;;
            *"🧪"*|*"Prueba"*) MODO_TECNICO="shadow_batch" ;;
            *) echo "❌ Modo desconocido: ${MODO_HUMANO}" && exit 1 ;;
          esac

          # Si el usuario activó modo_prueba y eligió batch producción → forzar shadow
          if [ "${{ inputs.modo_prueba }}" = "true" ] && [ "${MODO_TECNICO}" = "production_batch" ]; then
            MODO_TECNICO="shadow_batch"
            echo "⚠️  modo_prueba activo → degradando a shadow_batch"
          fi

          echo "modo_tecnico=${MODO_TECNICO}" >> $GITHUB_OUTPUT
          echo "modo_humano=${MODO_HUMANO}" >> $GITHUB_OUTPUT

          echo ""
          echo "═══════════════════════════════════════════"
          echo "🎯 Modo humano:       ${MODO_HUMANO}"
          echo "🔧 Modo técnico:      ${MODO_TECNICO}"
          echo "🛡️  Preservar manuales: ${{ inputs.preservar_manuales }}"
          echo "🖼️  Generar imágenes:   ${{ inputs.generar_imagenes }}"
          echo "🕒 Cronobiología:      ${{ inputs.cronobiologia }}"
          echo "🧪 Modo prueba:        ${{ inputs.modo_prueba }}"
          echo "═══════════════════════════════════════════"

      # ╔══════════════════════════════════════════════════════════════════╗
      # ║  FASE 1 — Checkout de AMBOS repos                                 ║
      # ╚══════════════════════════════════════════════════════════════════╝

      - name: 📦 Checkout triggui-app
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Checkout triggui-content (producción)
        uses: actions/checkout@v4
        with:
          repository: badirnakid/triggui-content
          token: ${{ secrets.CONTENT_REPO_TOKEN }}
          path: triggui-content
          fetch-depth: 0

      # ╔══════════════════════════════════════════════════════════════════╗
      # ║  FASE 2 — Setup entorno                                           ║
      # ╚══════════════════════════════════════════════════════════════════╝

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ⚙️ Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📚 Install nucleus deps
        working-directory: experiments/nucleus
        run: npm ci || npm install --no-audit --no-fund

      - name: 🎭 Install Playwright (solo si genera imágenes)
        if: ${{ inputs.generar_imagenes }}
        run: |
          if [ -f package.json ]; then
            npm ci || npm install --no-audit --no-fund
          else
            npm install --no-save --no-audit --no-fund playwright@1.48.0
          fi
          npx playwright install chromium --with-deps

      - name: 🔗 Linkear CSV maestro
        working-directory: experiments/nucleus
        run: |
          mkdir -p data
          # 🌒 Triggui Kids: el CSV depende de CATALOG_MODE
          if [ "$CATALOG_MODE" = "kids" ]; then
            CSV_FILE="libros_master_kids.csv"
          else
            CSV_FILE="libros_master.csv"
          fi
          echo "📚 CATALOG_MODE=$CATALOG_MODE → CSV_FILE=$CSV_FILE"
          if [ -f "$GITHUB_WORKSPACE/triggui-content/data/$CSV_FILE" ]; then
            ln -sf "$GITHUB_WORKSPACE/triggui-content/data/$CSV_FILE" "data/$CSV_FILE"
            echo "✓ CSV linkeado desde triggui-content: $CSV_FILE"
          elif [ -f "$GITHUB_WORKSPACE/data/$CSV_FILE" ]; then
            ln -sf "$GITHUB_WORKSPACE/data/$CSV_FILE" "data/$CSV_FILE"
            echo "✓ CSV linkeado desde triggui-app: $CSV_FILE"
          else
            echo "⚠️  $CSV_FILE no encontrado — modos constrained y batch fallarán"
          fi

      # ╔══════════════════════════════════════════════════════════════════╗
      # ║  FASE 2.5 — v3.4: Verificar/crear recent-books.json               ║
      # ║                                                                   ║
      # ║  Si el archivo no existe (primer run o se borró), lo inicializa  ║
      # ║  con estructura vacía válida. Si existe pero está corrupto,       ║
      # ║  validate-book.js lo arranca con ring vacío sin fallar.           ║
      # ╚══════════════════════════════════════════════════════════════════╝

      - name: 🛡️ Inicializar recent-books.json (anti-duplicados v3.4)
        shell: bash
        run: |
          set -euo pipefail
          RECENT_FILE="${GITHUB_WORKSPACE}/recent-books.json"

          if [ ! -f "${RECENT_FILE}" ]; then
            echo "ℹ️  recent-books.json no existe — inicializando estructura vacía"
            cat > "${RECENT_FILE}" <<'EOF'
          {
            "version": "3.4",
            "max_size": 30,
            "books": [],
            "_note": "FIFO ring de últimos 30 libros generados por selección automática (constrained o discover). Filtro pre-rerank en validate-book.js. Inicializa vacío y se rellena con cada run exitoso. Si se borra, el sistema arranca limpio sin daño."
          }
          EOF
            echo "✅ recent-books.json inicializado"
          else
            COUNT=$(node -e "try{const d=JSON.parse(require('fs').readFileSync('${RECENT_FILE}','utf8').trim());console.log(Array.isArray(d.books)?d.books.length:0)}catch(e){console.log('0')}" 2>/dev/null || echo "0")
            echo "🛡️  recent-books.json: ${COUNT} libros en ring"
          fi

      # ╔══════════════════════════════════════════════════════════════════╗
      # ║  FASE 3 — Linkear contenido.json histórico (BLINDADO)             ║
      # ║                                                                   ║
      # ║  Maneja 4 estados del archivo:                                    ║
      # ║  1. No existe         → crea estructura vacía válida              ║
      # ║  2. Existe pero vacío → reemplaza por estructura vacía válida    ║
      # ║  3. Existe y corrupto → backup + reemplaza                        ║
      # ║  4. Existe y válido   → lo usa (cuenta libros y manuales)         ║
      # ╚══════════════════════════════════════════════════════════════════╝

      - name: 📥 Linkear contenido.json histórico
        if: ${{ steps.modo.outputs.modo_tecnico != 'shadow_batch' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p experiments/nucleus

          # Template de catálogo vacío pero VÁLIDO
          # Timestamp ISO-8601 generado en runtime (reproducible)
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EMPTY_JSON='{"libros":[],"meta":{"version":"1.0.0","generated_at":"'"${NOW}"'","total":0,"note":"Catálogo vacío — listo para generación"}}'

          # 🌒 Triggui Kids: el archivo histórico depende de CATALOG_MODE
          if [ "$CATALOG_MODE" = "kids" ]; then
            CONTENIDO_FILE="contenido_kids.json"
          else
            CONTENIDO_FILE="contenido.json"
          fi
          echo "📥 CATALOG_MODE=$CATALOG_MODE → CONTENIDO_FILE=$CONTENIDO_FILE"

          SRC="triggui-content/$CONTENIDO_FILE"
          DEST="experiments/nucleus/$CONTENIDO_FILE"

          # Estado 1: no existe
          if [ ! -f "${SRC}" ]; then
            echo "ℹ️  $CONTENIDO_FILE no existe en triggui-content — creando estructura vacía válida"
            printf '%s' "${EMPTY_JSON}" > "${DEST}"
            echo "📚 $CONTENIDO_FILE: 0 libros (0 manuales) · inicializado"
            exit 0
          fi

          # Estado 2/3: existe, pero ¿es válido?
          # Validación con exit codes diferenciados para debug:
          #   0 → válido
          #   2 → vacío (0 bytes o solo whitespace)
          #   3 → estructura inválida (no es {libros: []})
          #   4 → JSON parse error (corrupto)
          VALIDATION_EXIT=0
          node -e "
            const fs = require('fs');
            try {
              const raw = fs.readFileSync('${SRC}', 'utf8').trim();
              if (!raw) { process.exit(2); }
              const d = JSON.parse(raw);
              if (!d || !Array.isArray(d.libros)) { process.exit(3); }
              process.exit(0);
            } catch (e) {
              process.stderr.write('parse_error: ' + e.message + '\n');
              process.exit(4);
            }
          " || VALIDATION_EXIT=$?

          case "${VALIDATION_EXIT}" in
            0)
              # Estado 4: válido
              cp "${SRC}" "${DEST}"
              # Conteo con .trim() y fallback defensivo contra BOM/whitespace.
              # set -euo pipefail + $() mataría el job si node -e falla sin ||
              LIBROS=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('${DEST}','utf8').trim()).libros.length)}catch(e){console.log('0')}" 2>/dev/null || echo "0")
              MANUALES=$(node -e "try{const d=JSON.parse(require('fs').readFileSync('${DEST}','utf8').trim()); console.log(d.libros.filter(l=>l && l._manual===true).length)}catch(e){console.log('0')}" 2>/dev/null || echo "0")
              echo "📚 $CONTENIDO_FILE histórico: ${LIBROS} libros (${MANUALES} manuales)"
              ;;
            2)
              echo "⚠️  $CONTENIDO_FILE está VACÍO — reemplazando por estructura vacía válida"
              printf '%s' "${EMPTY_JSON}" > "${DEST}"
              echo "📚 $CONTENIDO_FILE: 0 libros (0 manuales) · reinicializado"
              ;;
            3)
              echo "⚠️  $CONTENIDO_FILE tiene estructura inválida — backup + reemplazo"
              BACKUP="triggui-content/${CONTENIDO_FILE}.backup-$(date +%Y%m%d-%H%M%S)"
              cp "${SRC}" "${BACKUP}" && echo "💾 backup: ${BACKUP}"
              printf '%s' "${EMPTY_JSON}" > "${DEST}"
              echo "📚 $CONTENIDO_FILE: 0 libros (0 manuales) · reconstruido"
              ;;
            4)
              echo "⚠️  $CONTENIDO_FILE está CORRUPTO (JSON inválido) — backup + reemplazo"
              BACKUP="triggui-content/${CONTENIDO_FILE}.backup-corrupto-$(date +%Y%m%d-%H%M%S)"
              cp "${SRC}" "${BACKUP}" && echo "💾 backup: ${BACKUP}"
              printf '%s' "${EMPTY_JSON}" > "${DEST}"
              echo "📚 $CONTENIDO_FILE: 0 libros (0 manuales) · reconstruido desde corrupto"
              ;;
            *)
              echo "❌ Estado desconocido de $CONTENIDO_FILE (exit ${VALIDATION_EXIT})"
              exit 1
              ;;
          esac

          # 🌒 v3.8 cirugia 4A — Linkear edition-counter.json (SSOT contador global)
          # El counter file vive en triggui-content/ y se linkea a experiments/nucleus/
          # para que el codigo del nucleus pueda leer/escribir. Sync de vuelta en FASE 8.
          COUNTER_SRC="triggui-content/edition-counter.json"
          COUNTER_DEST="experiments/nucleus/edition-counter.json"
          if [ -f "${COUNTER_SRC}" ]; then
            cp "${COUNTER_SRC}" "${COUNTER_DEST}"
            COUNTER_NEXT=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('${COUNTER_DEST}','utf8').trim()).next)}catch(e){console.log('?')}" 2>/dev/null || echo "?")
            COUNTER_LAST=$(node -e "try{const d=JSON.parse(require('fs').readFileSync('${COUNTER_DEST}','utf8').trim()); console.log(d.last_assigned !== undefined && d.last_assigned !== null ? d.last_assigned : 'null')}catch(e){console.log('?')}" 2>/dev/null || echo "?")
            echo "📊 edition-counter.json linkeado: next=${COUNTER_NEXT} last_assigned=${COUNTER_LAST}"
          else
            echo "⚠️  edition-counter.json NO existe en triggui-content — fallback meta activado"
          fi

      # ╔══════════════════════════════════════════════════════════════════╗
      # ║  FASE 4 — Validate book (para single/trigger)                     ║
      # ╚══════════════════════════════════════════════════════════════════╝

      - name: 📖 Validate DIRECT (modo 📘)
        if: ${{ steps.modo.outputs.modo_tecnico == 'single_book' && inputs.libro_input != '' }}
        working-directory: experiments/nucleus
        env:
          INPUT_MODE: book
          SELECTOR_MODE: direct
          LIBRO_INPUT: ${{ inputs.libro_input }}
        run: node validate-book.js

      - name: 📖 Validate CONSTRAINED (modo 💭)
        if: ${{ steps.modo.outputs.modo_tecnico == 'trigger_constrained' }}
        working-directory: experiments/nucleus
        env:
          INPUT_MODE: trigger
          SELECTOR_MODE: constrained
          ENTRADA_RAW: ${{ inputs.sentimiento }}
          CATALOG_SCOPE: libros_master_csv
          # 🌒 Triggui Kids: CSV depende de CATALOG_MODE
          CATALOG_CSV_PATH: ${{ inputs.catalogo == 'kids' && 'data/libros_master_kids.csv' || 'data/libros_master.csv' }}
        run: node validate-book.js

      - name: 📖 Validate DISCOVER (modo 🌍)
        if: ${{ steps.modo.outputs.modo_tecnico == 'trigger_discover' }}
        working-directory: experiments/nucleus
        env:
          INPUT_MODE: trigger
          SELECTOR_MODE: discover
          ENTRADA_RAW: ${{ inputs.sentimiento }}
        run: node validate-book.js

      # ╔══════════════════════════════════════════════════════════════════╗
      # ║  FASE 4.5 — v3.4: Aplicar update del ring si validate-book lo     ║
      # ║              emitió. NO se aplica para modo book directo.         ║
      # ║              NO se aplica si fue degradación elegante (repetido). ║
      # ╚══════════════════════════════════════════════════════════════════╝

      - name: 🛡️ Aplicar update del ring de recientes
        if: ${{ steps.modo.outputs.modo_tecnico == 'trigger_constrained' || steps.modo.outputs.modo_tecnico == 'trigger_discover' }}
        shell: bash
        run: |
          set -euo pipefail
          UPDATE_PATH="/tmp/triggui-recent-books-update.json"
          RECENT_FILE="${GITHUB_WORKSPACE}/recent-books.json"

          if [ ! -f "${UPDATE_PATH}" ]; then
            echo "ℹ️  Sin update del ring (degradación elegante o modo book) — sin cambios"
            exit 0
          fi

          # Validar que el update sea JSON válido antes de pisar el archivo en raíz
          if ! node -e "JSON.parse(require('fs').readFileSync('${UPDATE_PATH}','utf8'))" 2>/dev/null; then
            echo "⚠️  Update del ring no es JSON válido — manteniendo archivo actual"
            exit 0
          fi

          cp "${UPDATE_PATH}" "${RECENT_FILE}"
          COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('${RECENT_FILE}','utf8')).books.length)" 2>/dev/null || echo "?")
          echo "✅ recent-books.json actualizado: ${COUNT} libros en ring"

      # ╔══════════════════════════════════════════════════════════════════╗
      # ║  FASE 5 — Ejecutar Nucleus unificado                              ║
      # ╚══════════════════════════════════════════════════════════════════╝

      - name: 🧬 Ejecutar Nucleus
        working-directory: experiments/nucleus
        env:
          SINGLE_MODE: ${{ (steps.modo.outputs.modo_tecnico == 'single_book' || steps.modo.outputs.modo_tecnico == 'trigger_constrained' || steps.modo.outputs.modo_tecnico == 'trigger_discover') && 'true' || '' }}
          SHADOW_MODE: ${{ steps.modo.outputs.modo_tecnico == 'shadow_batch' && 'true' || '' }}
          UNIFIED_MODE: ${{ !inputs.modo_prueba && 'true' || 'false' }}
          PRESERVE_MANUAL: ${{ inputs.preservar_manuales && 'true' || 'false' }}
        run: node build-contenido-nucleus.js

      # ╔══════════════════════════════════════════════════════════════════╗
      # ║  FASE 5.5 — v3.7 CAPA 4: Auto-sanitize JSON (self-healing)        ║
      # ║                                                                  ║
      # ║  Walker recursivo del JSON: limpia control chars C0, ANSI         ║
      # ║  escapes, y repara emojis con bug \u001f<hex> de gpt-4o-mini.     ║
      # ║  NUNCA aborta — limpia, registra, deja pasar.                     ║
      # ║                                                                  ║
      # ║  Arquitectura defensiva nivel dios cuántico-quark (V10 §30.3):    ║
      # ║    Capa 1 = LLM (probabilístico, no garantizable)                ║
      # ║    Capa 2 = safeJSONParse al recibir response (pending)          ║
      # ║    Capa 3 = pre-writeFile en build-contenido (pending)           ║
      # ║    Capa 4 = ESTE STEP (auto-clean workflow)                       ║
      # ║    Capa 5 = frontend __triggguiSanitizeAll (ya existe)            ║
      # ╚══════════════════════════════════════════════════════════════════════╝

      - name: 🌒 v3.7 Capa 4 — Auto-sanitize JSON generado
        working-directory: experiments/nucleus
        env:
          SANITIZE_NO_BACKUP: "1"
        run: |
          set +e

          if [ "$CATALOG_MODE" = "kids" ]; then
            REGULAR="contenido_kids.json"
            SHADOW="contenido_kids.shadow.json"
          else
            REGULAR="contenido.json"
            SHADOW="contenido.shadow.json"
          fi

          FILES=""
          [ -f "$REGULAR" ] && FILES="$FILES $REGULAR"
          [ -f "$SHADOW" ]  && FILES="$FILES $SHADOW"

          if [ -n "$FILES" ]; then
            echo "🌒 Capa 4 — sanitize sobre:$FILES"
            node ./sanitize-catalog.mjs $FILES
            EXIT=$?
            if [ $EXIT -eq 0 ]; then
              echo "✓ Capa 4 OK — JSON limpio"
            else
              echo "⚠️  Capa 4 reportó exit=$EXIT — workflow continúa (defensa en N capas)"
            fi
          else
            echo "ℹ️  Sin archivos JSON — skip Capa 4"
          fi

          exit 0

      # ╔══════════════════════════════════════════════════════════════════╗
      # ║  FASE 6 — Mover outputs al workspace                              ║
      # ╚══════════════════════════════════════════════════════════════════╝

      - name: 📦 Mover outputs al workspace
        working-directory: experiments/nucleus
        run: |
          echo "📂 Archivos generados:"
          ls -la contenido*.json 2>/dev/null || echo "(ninguno)"

          # 🌒 Triggui Kids: los outputs dependen de CATALOG_MODE
          if [ "$CATALOG_MODE" = "kids" ]; then
            CONTENIDO_FILE="contenido_kids.json"
            SHADOW_FILE="contenido_kids.shadow.json"
          else
            CONTENIDO_FILE="contenido.json"
            SHADOW_FILE="contenido.shadow.json"
          fi
          echo "📦 CATALOG_MODE=$CATALOG_MODE → CONTENIDO_FILE=$CONTENIDO_FILE, SHADOW_FILE=$SHADOW_FILE"

          [ -f "$CONTENIDO_FILE" ] && cp -v "$CONTENIDO_FILE" "$GITHUB_WORKSPACE/$CONTENIDO_FILE"
          [ -f "$SHADOW_FILE" ] && cp -v "$SHADOW_FILE" "$GITHUB_WORKSPACE/$SHADOW_FILE"

          for dir in inputs-history metrics quality-reports grounding-cache evidence-cache; do
            if [ -d "$dir" ]; then
              mkdir -p "$GITHUB_WORKSPACE/$dir"
              cp -rv "$dir"/* "$GITHUB_WORKSPACE/$dir/" 2>/dev/null || true
            fi
          done

          if [ -f /tmp/triggui-validate-debug.json ]; then
            mkdir -p "$GITHUB_WORKSPACE/validate-debug"
            cp /tmp/triggui-validate-debug.json "$GITHUB_WORKSPACE/validate-debug/$(date +%Y%m%d-%H%M%S)-debug.json"
          fi

      # ╔══════════════════════════════════════════════════════════════════╗
      # ║  FASE 7 — Generar assets (solo single/trigger)                    ║
      # ╚══════════════════════════════════════════════════════════════════╝

      - name: 🌐 Generar edición viva HTML
        if: ${{ inputs.generar_imagenes && (steps.modo.outputs.modo_tecnico == 'single_book' || steps.modo.outputs.modo_tecnico == 'trigger_constrained' || steps.modo.outputs.modo_tecnico == 'trigger_discover') }}
        env:
          TRIGGUI_EDICION_JSON: ${{ inputs.catalogo == 'kids' && 'contenido_kids.json' || 'contenido.json' }}
          TRIGGUI_OUT_BASE: ${{ inputs.catalogo == 'kids' && 'public/kids/t' || 'public/t' }}
        run: |
          python3 scripts/build-editions.py
          find "${TRIGGUI_OUT_BASE}" -name "index.html" 2>/dev/null | head -5

      - name: 🎨 Generar tarjeta PNG 1080×1920
        if: ${{ inputs.generar_imagenes && (steps.modo.outputs.modo_tecnico == 'single_book' || steps.modo.outputs.modo_tecnico == 'trigger_constrained' || steps.modo.outputs.modo_tecnico == 'trigger_discover') }}
        env:
          TRIGGUI_EDICION_JSON: ${{ inputs.catalogo == 'kids' && 'contenido_kids.json' || 'contenido.json' }}
          TRIGGUI_OUT_BASE: ${{ inputs.catalogo == 'kids' && 'public/kids/t' || 'public/t' }}
        run: |
          node scripts/build-tarjeta-png.js
          find "${TRIGGUI_OUT_BASE}" -name "tarjeta.png" 2>/dev/null | head -5

      - name: 🖼️ Generar OG image PNG 1200×630
        if: ${{ inputs.generar_imagenes && (steps.modo.outputs.modo_tecnico == 'single_book' || steps.modo.outputs.modo_tecnico == 'trigger_constrained' || steps.modo.outputs.modo_tecnico == 'trigger_discover') }}
        env:
          TRIGGUI_EDICION_JSON: ${{ inputs.catalogo == 'kids' && 'contenido_kids.json' || 'contenido.json' }}
          TRIGGUI_OUT_BASE: ${{ inputs.catalogo == 'kids' && 'public/kids/t' || 'public/t' }}
        run: |
          node scripts/build-og-image.js
          find "${TRIGGUI_OUT_BASE}" -name "og.png" 2>/dev/null | head -5

      # ╔══════════════════════════════════════════════════════════════════╗
      # ║  FASE 8 — Sincronizar contenido.json → triggui-content            ║
      # ╚══════════════════════════════════════════════════════════════════╝

      - name: 📤 Sincronizar a triggui-content
        if: ${{ !inputs.modo_prueba }}
        run: |
          set -euo pipefail
          # 🌒 Triggui Kids: el output depende de CATALOG_MODE
          if [ "$CATALOG_MODE" = "kids" ]; then
            OUT_FILE="contenido_kids.json"
          else
            OUT_FILE="contenido.json"
          fi
          echo "📤 CATALOG_MODE=$CATALOG_MODE → OUT_FILE=$OUT_FILE"
          if [ -f "$OUT_FILE" ]; then
            cp "$OUT_FILE" "triggui-content/$OUT_FILE"
            echo "✅ $OUT_FILE sincronizado"
          fi

          # 🌒 v3.8 cirugia 4B — Sincronizar edition-counter.json a triggui-content
          # Si el nucleus asigno un nuevo _edicion_numero, el counter local ya fue
          # actualizado (next++ y history++). Persistirlo de vuelta al SSOT.
          COUNTER_LOCAL="experiments/nucleus/edition-counter.json"
          if [ -f "${COUNTER_LOCAL}" ]; then
            cp "${COUNTER_LOCAL}" "triggui-content/edition-counter.json"
            COUNTER_NEXT=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('${COUNTER_LOCAL}','utf8').trim()).next)}catch(e){console.log('?')}" 2>/dev/null || echo "?")
            echo "📊 edition-counter.json sincronizado a triggui-content: next=${COUNTER_NEXT}"
          fi

      # ╔══════════════════════════════════════════════════════════════════╗
      # ║  FASE 8.5 — Generar contenido_manual.json (vista filtrada)        ║
      # ║                                                                    ║
      # ║  Política matemática axiomática nivel dios cuántico-quark:        ║
      # ║  contenido_manual.json = {                                         ║
      # ║    libros: contenido.json.libros.filter(_edicion_numero >= 1),    ║
      # ║    meta: contenido.json.meta                                       ║
      # ║  }                                                                 ║
      # ║                                                                    ║
      # ║  → Single mode: el libro nuevo tiene _edicion_numero → aparece    ║
      # ║  → Batch mode:  los 20 nuevos NO tienen _edicion_numero → no apar.║
      # ║                                                                    ║
      # ║  Usado por: Apps Script (email del lunes) — lee libros[0]         ║
      # ║                                                                    ║
      # ║  Defensas: atomic write, parse guard, unicode safe, idempotente   ║
      # ║  Tests cuántico-quark: 24/24 pasados antes de deployment          ║
      # ╚══════════════════════════════════════════════════════════════════╝

      - name: 🌒 Generar contenido_manual.json (vista filtrada nivel dios)
        if: ${{ !inputs.modo_prueba }}
        run: |
          set -euo pipefail

          # 🌒 Triggui Kids: archivos manuales dependen de CATALOG_MODE
          if [ "$CATALOG_MODE" = "kids" ]; then
            CONTENIDO_FILE="contenido_kids.json"
            MANUAL_FILE="contenido_kids_manual.json"
          else
            CONTENIDO_FILE="contenido.json"
            MANUAL_FILE="contenido_manual.json"
          fi
          echo "🌒 CATALOG_MODE=$CATALOG_MODE → CONTENIDO=$CONTENIDO_FILE, MANUAL=$MANUAL_FILE"

          if [ ! -f "$CONTENIDO_FILE" ]; then
            echo "ℹ️  $CONTENIDO_FILE no existe — skip generación de $MANUAL_FILE"
            exit 0
          fi

          SRC_FILE="$CONTENIDO_FILE" TGT_FILE="$MANUAL_FILE" node -e '
            const fs = require("fs");
            const SRC = process.env.SRC_FILE;
            const TGT = process.env.TGT_FILE;

            // 1. Leer source con defensas
            let raw;
            try {
              raw = fs.readFileSync(SRC, "utf8");
            } catch (e) {
              console.error("❌ no se pudo leer " + SRC + ": " + e.message);
              process.exit(1);
            }

            if (!raw || !raw.trim()) {
              console.error("❌ " + SRC + " vacío o whitespace");
              process.exit(1);
            }

            // 2. Parsear con defensa contra corrupción
            let data;
            try {
              data = JSON.parse(raw);
            } catch (e) {
              console.error("❌ " + SRC + " JSON inválido: " + e.message);
              process.exit(1);
            }

            if (!data || typeof data !== "object" || !Array.isArray(data.libros)) {
              console.error("❌ " + SRC + " estructura inválida (sin .libros array)");
              process.exit(1);
            }

            // 3. Filtrar — solo libros con _edicion_numero válido (number >= 1)
            const filtered = data.libros.filter(function(libro) {
              return libro
                && typeof libro === "object"
                && typeof libro._edicion_numero === "number"
                && libro._edicion_numero >= 1;
            });

            // 4. Construir output preservando meta
            const output = {
              libros: filtered,
              meta: data.meta || {}
            };

            // 5. Atomic write (tmp → rename) para evitar corrupción si falla
            const tmpPath = TGT + ".tmp-" + Date.now();
            try {
              fs.writeFileSync(tmpPath, JSON.stringify(output, null, 2), "utf8");
              fs.renameSync(tmpPath, TGT);
            } catch (e) {
              try { fs.unlinkSync(tmpPath); } catch (_) {}
              console.error("❌ atomic write falló: " + e.message);
              process.exit(1);
            }

            // 6. Identificar libros[0] (el que recibirá el email del lunes)
            const top = filtered.length > 0 ? filtered[0] : null;
            const topInfo = top
              ? `"${top.titulo}" (#${String(top._edicion_numero).padStart(3, "0")}) — ${top.autor || "?"}`
              : "(ninguno — Apps Script abortará envío)";

            console.log("🌒 " + TGT + " generado:");
            console.log("   Total source:    " + data.libros.length + " libros");
            console.log("   Total filtrado:  " + filtered.length + " libros con _edicion_numero");
            console.log("   libros[0]:       " + topInfo);
          '

          # Sincronizar a triggui-content
          if [ -f "$MANUAL_FILE" ]; then
            cp "$MANUAL_FILE" "triggui-content/$MANUAL_FILE"
            echo "✅ $MANUAL_FILE sincronizado"
          fi

      # ╔══════════════════════════════════════════════════════════════════╗
      # ║  FASE 9 — Commit y push a AMBOS repos                             ║
      # ╚══════════════════════════════════════════════════════════════════╝

      - name: 💾 Commit y push
        run: |
          set -euo pipefail
          SLUG=$([ -f /tmp/triggui-slug.txt ] && cat /tmp/triggui-slug.txt || echo "${{ steps.modo.outputs.modo_tecnico }}")

          # 🌒 Triggui Kids: archivos a commitear dependen de CATALOG_MODE
          if [ "$CATALOG_MODE" = "kids" ]; then
            CONTENIDO_FILE="contenido_kids.json"
            SHADOW_FILE="contenido_kids.shadow.json"
            MANUAL_FILE="contenido_kids_manual.json"
          else
            CONTENIDO_FILE="contenido.json"
            SHADOW_FILE="contenido.shadow.json"
            MANUAL_FILE="contenido_manual.json"
          fi
          echo "💾 CATALOG_MODE=$CATALOG_MODE → CONTENIDO=$CONTENIDO_FILE, SHADOW=$SHADOW_FILE, MANUAL=$MANUAL_FILE"

          # ─── triggui-app ───
          git config user.name "Triggui Bot"
          git config user.email "bot@triggui.com"

          # 🌒 v3.7 FASE 7B: commit kids-aware
          if [ "$CATALOG_MODE" = "kids" ]; then
            [ -d public/kids/t ] && git add public/kids/t/ || true
          else
            [ -d public/t ] && git add public/t/ || true
          fi
          [ -f "$SHADOW_FILE" ] && git add "$SHADOW_FILE" || true
          # v3.4: persistir ring de anti-duplicados
          [ -f recent-books.json ] && git add recent-books.json || true

          for dir in inputs-history metrics quality-reports grounding-cache evidence-cache validate-debug; do
            [ -d "$dir" ] && git add "$dir/" || true
          done

          if git diff --cached --quiet; then
            echo "🟡 triggui-app: sin cambios"
          else
            git commit -m "🌒 triggui ${{ steps.modo.outputs.modo_tecnico }} — ${SLUG}"
            for i in 1 2 3; do
              if git pull --rebase --autostash origin main && git push origin HEAD:main; then
                echo "✅ Push triggui-app exitoso (intento $i)"
                break
              fi
              sleep 3
            done
          fi

          # ─── triggui-content ───
          if [ "${{ inputs.modo_prueba }}" = "false" ]; then
            cd triggui-content
            git config user.name "Triggui Bot"
            git config user.email "bot@triggui.com"

            [ -f "$CONTENIDO_FILE" ] && git add "$CONTENIDO_FILE" || true
            # 🌒 V18: vista filtrada para email del lunes (Apps Script)
            [ -f "$MANUAL_FILE" ] && git add "$MANUAL_FILE" || true
            # Si hubo backups por corrupto/inválido en Fase 3, se versionan también
            ls "${CONTENIDO_FILE}.backup-"* >/dev/null 2>&1 && git add "${CONTENIDO_FILE}.backup-"* || true
            # 🌒 v3.8 cirugia 5 — git add edition-counter.json al staging (SSOT contador global)
            # FASE 8 (cirugia 4B) copia el counter de experiments/nucleus/ a triggui-content/,
            # pero queda como modificacion no staged. Sin este git add el rebase aborta con
            # "You have unstaged changes" (bug detectado en test matilda kids 2026-05-13).
            [ -f edition-counter.json ] && git add edition-counter.json || true

            if git diff --cached --quiet; then
              echo "🟡 triggui-content: sin cambios"
            else
              git commit -m "📚 triggui ${{ steps.modo.outputs.modo_tecnico }} — ${SLUG}"
              for i in 1 2 3; do
                if git fetch origin main && git rebase origin/main && git push origin HEAD:main; then
                  echo "✅ Push triggui-content exitoso (intento $i)"
                  break
                fi
                sleep 3
              done
            fi
          fi

      # ╔══════════════════════════════════════════════════════════════════╗
      # ║  FASE 10 — Summary (BLINDADO)                                     ║
      # ╚══════════════════════════════════════════════════════════════════╝

      - name: 📋 Summary
        if: always()
        shell: bash
        run: |
          SLUG=$([ -f /tmp/triggui-slug.txt ] && cat /tmp/triggui-slug.txt || echo "${{ steps.modo.outputs.modo_tecnico }}")
          TITULO=$([ -f /tmp/triggui-titulo.txt ] && cat /tmp/triggui-titulo.txt || echo "${SLUG}")

          # 🌒 Triggui Kids: archivo a leer depende de CATALOG_MODE
          if [ "$CATALOG_MODE" = "kids" ]; then
            CONTENIDO_FILE="contenido_kids.json"
            CATALOGO_LABEL="🌒 Kids"
          else
            CONTENIDO_FILE="contenido.json"
            CATALOGO_LABEL="Adulto"
          fi

          echo "## 🌒 Triggui — Ejecutado" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Modo | ${{ inputs.modo }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Catálogo | ${CATALOGO_LABEL} |" >> $GITHUB_STEP_SUMMARY
          echo "| Libro | ${TITULO} |" >> $GITHUB_STEP_SUMMARY
          echo "| Imágenes | ${{ inputs.generar_imagenes }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Manuales protegidos | ${{ inputs.preservar_manuales }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Modo prueba | ${{ inputs.modo_prueba }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # v3.4: contar ring de recientes para reporte
          if [ -f "${GITHUB_WORKSPACE}/recent-books.json" ]; then
            RING=$(node -e "try{const d=JSON.parse(require('fs').readFileSync('${GITHUB_WORKSPACE}/recent-books.json','utf8').trim());console.log(Array.isArray(d.books)?d.books.length:0)}catch(e){console.log('0')}" 2>/dev/null || echo "0")
            echo "| Ring anti-duplicados | ${RING} libros |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Summary blindado: usa la misma validación que Fase 3 con graceful fallback
          if [ -f "${GITHUB_WORKSPACE}/${CONTENIDO_FILE}" ]; then
            COUNT_OUTPUT=$(CONTENIDO_PATH="${GITHUB_WORKSPACE}/${CONTENIDO_FILE}" node -e "
              try {
                const raw = require('fs').readFileSync(process.env.CONTENIDO_PATH,'utf8').trim();
                if (!raw) { console.log('0 0'); process.exit(0); }
                const d = JSON.parse(raw);
                if (!d || !Array.isArray(d.libros)) { console.log('0 0'); process.exit(0); }
                const total = d.libros.length;
                const manuales = d.libros.filter(l => l && l._manual === true).length;
                console.log(total + ' ' + manuales);
              } catch (e) {
                console.log('0 0');
              }
            " 2>/dev/null || echo "0 0")
            LIBROS=$(echo "${COUNT_OUTPUT}" | awk '{print $1}')
            MANUALES=$(echo "${COUNT_OUTPUT}" | awk '{print $2}')
            echo "### 📊 Producción (${CONTENIDO_FILE})" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- Libros totales: ${LIBROS}" >> $GITHUB_STEP_SUMMARY
            echo "- Manuales curados: ${MANUALES}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f /tmp/triggui-slug.txt ]; then
            echo "### 🔗 Links" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- 🌐 Edición viva: ${BASE_URL}/t/${SLUG}/" >> $GITHUB_STEP_SUMMARY
            echo "- 🖼️ Tarjeta: \`public/t/${SLUG}/tarjeta.png\`" >> $GITHUB_STEP_SUMMARY
            echo "- 🖼️ OG: \`public/t/${SLUG}/og.png\`" >> $GITHUB_STEP_SUMMARY
          fi