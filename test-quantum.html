<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Test — Quantum Atmosphere</title>
<style>
html, body {
  margin: 0; padding: 0; height: 100%; overflow: hidden;
  background: #000; color: #fff;
  font-family: 'SF Pro Display', -apple-system, system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* Test controls */
#testControls {
  position: fixed; top: 12px; left: 12px; z-index: 10000;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
  padding: 8px 12px; border-radius: 12px;
  font-size: 11px; font-family: monospace;
  border: 1px solid rgba(255,255,255,0.15);
}
#testControls button {
  background: linear-gradient(135deg, #FF5E00, #FF0055);
  border: 0; color: #fff; padding: 6px 12px;
  border-radius: 99px; font-size: 11px;
  font-weight: 600; cursor: pointer; margin-right: 6px;
}
#testCounter { opacity: 0.7; margin-left: 8px; }

/* === BARRA MÁGICA STYLES (extraído del index.html actual, idéntico) === */
#barraMagicaOverlay, #barraMagicaOverlay *, #barraMagicaOverlay *::before, #barraMagicaOverlay *::after {
  box-sizing: border-box;
}

#barraMagicaOverlay {
  position: fixed; inset: 0; z-index: 9998;
  background: #000000;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 20px; overflow: hidden;
}

#barraMagicaOverlay::before {
  content: "";
  position: absolute; inset: 0;
  background-image:
    radial-gradient(ellipse 90% 60% at 50% -10%, rgba(255, 94, 0, 0.14) 0%, transparent 55%),
    radial-gradient(ellipse 80% 50% at 50% 110%, rgba(255, 0, 85, 0.10) 0%, transparent 55%);
  pointer-events: none;
  animation: bm-breathe 8s ease-in-out infinite;
}

@keyframes bm-breathe {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

#barraAurora {
  position: absolute; inset: 0; pointer-events: none;
  overflow: hidden; opacity: 0.35; z-index: 1;
}

.bm-aurora-blob {
  position: absolute; width: 320px; height: 320px;
  border-radius: 50%; filter: blur(60px); will-change: transform;
}

.bm-aurora-1 {
  top: -100px; left: -80px;
  background: rgba(40, 100, 220, 0.45);
}
.bm-aurora-2 {
  bottom: -80px; right: -60px;
  background: rgba(80, 230, 200, 0.40);
}

#barraDust {
  position: absolute; inset: 0; pointer-events: none; z-index: 1;
}

.bm-particle {
  position: absolute; width: 1px; height: 1px;
  background: rgba(255, 255, 255, 0.5); border-radius: 50%;
}

#barraSparkIndicator {
  position: absolute; top: 44px; left: 50%; transform: translateX(-50%);
  width: 5px; height: 5px; border-radius: 50%;
  background: #FFD700;
  box-shadow: 0 0 10px 3px rgba(255, 215, 0, 0.7), 0 0 20px 6px rgba(255, 94, 0, 0.3);
  z-index: 6;
  animation: bm-spark-pulse 3s ease-in-out infinite;
}

@keyframes bm-spark-pulse {
  0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
  50% { opacity: 1; transform: translateX(-50%) scale(1.5); }
}

.barra-magica-inner {
  position: relative; z-index: 3;
  width: 100%; max-width: 480px;
  display: flex; flex-direction: column; align-items: center; gap: 0;
}

#barraEyebrow {
  font-size: 9.5px; font-weight: 700;
  color: rgba(255, 255, 255, 0.5);
  letter-spacing: 4px; text-transform: uppercase;
  margin-bottom: 22px;
  display: flex; align-items: center; gap: 12px;
}
#barraEyebrow::before, #barraEyebrow::after {
  content: ""; width: 18px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
}

#barraQuestion {
  font-weight: 300; font-size: clamp(26px, 7.5vw, 34px);
  line-height: 1.08; color: #fff; text-align: center;
  letter-spacing: -0.7px; margin-bottom: 34px;
}
#barraQuestion .bm-w3 {
  position: relative; font-weight: 400;
  color: var(--bm-accent, #FF5E00);
  transition: color 0.8s ease;
}
#barraQuestion .bm-w3::after {
  content: ""; position: absolute;
  left: 8%; right: 8%; bottom: -4px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--bm-accent, rgba(255,94,0,0.7)), transparent);
  opacity: 0.65;
}

#barraInputWrap { width: 100%; position: relative; }

#barraInput {
  width: 100%;
  background: rgba(255, 255, 255, 0.035);
  border: 0.5px solid var(--bm-accent-40, rgba(255, 255, 255, 0.13));
  border-radius: 20px;
  padding: 19px 62px 19px 22px;
  color: #fff; font-size: 16px; font-weight: 400;
  outline: none;
  transition: border-color 0.6s ease, box-shadow 0.6s ease;
  box-shadow:
    inset 0 0.5px 0 rgba(255, 255, 255, 0.08),
    0 0 0 4px var(--bm-accent-10, rgba(255, 94, 0, 0.05)),
    0 20px 50px var(--bm-accent-18, rgba(255, 0, 85, 0.18));
}
#barraInput::placeholder {
  color: rgba(255, 255, 255, 0.3); font-style: italic;
}

#barraSubmit {
  position: absolute; right: 7px; top: 50%; transform: translateY(-50%);
  width: 42px; height: 42px; border-radius: 15px;
  background: linear-gradient(135deg, #FF5E00 0%, #FF0055 100%);
  border: 0; color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

#barraMicro {
  font-size: 11px; color: rgba(255, 255, 255, 0.38);
  letter-spacing: 0.3px; margin-top: 22px; text-align: center;
}

#barraSkip {
  position: absolute; bottom: 96px; left: 0; right: 0;
  background: 0; border: 0; padding: 0; cursor: pointer;
  color: rgba(255,255,255,0.35); font-size: 12px;
  text-align: center;
}
</style>
</head>
<body>

<div id="testControls">
  <button onclick="forceRegenerate()">🌒 NUEVA ATMÓSFERA</button>
  <button onclick="changeQuestion()">PREGUNTA SIGUIENTE</button>
  <span id="testCounter">apertura #0</span>
</div>

<div id="barraMagicaOverlay">
  <div id="barraAurora" aria-hidden="true">
    <div class="bm-aurora-blob bm-aurora-1"></div>
    <div class="bm-aurora-blob bm-aurora-2"></div>
  </div>
  <div id="barraDust" aria-hidden="true">
    <div class="bm-particle" style="top:12%;left:22%"></div>
    <div class="bm-particle" style="top:28%;left:78%"></div>
    <div class="bm-particle" style="top:58%;left:8%"></div>
    <div class="bm-particle" style="top:72%;left:85%"></div>
    <div class="bm-particle" style="top:18%;left:55%"></div>
    <div class="bm-particle" style="top:85%;left:40%"></div>
    <div class="bm-particle" style="top:40%;left:92%"></div>
    <div class="bm-particle" style="top:50%;left:5%"></div>
  </div>
  <div id="barraSparkIndicator"></div>

  <div class="barra-magica-inner">
    <div id="barraEyebrow">pausa</div>
    <div id="barraQuestion">
      <span class="bm-w bm-w1">¿Cómo</span>
      <span class="bm-w bm-w2">te</span>
      <span class="bm-w bm-w3">sientes?</span>
    </div>
    <div id="barraInputWrap">
      <input id="barraInput" type="text" placeholder="escribe con honestidad" />
      <button id="barraSubmit">→</button>
    </div>
    <div id="barraMicro">triggui elige <em>el libro correcto</em></div>
  </div>

  <button id="barraSkip">saltar →</button>
</div>

<!-- Mock BarraMagica para que el script funcione standalone -->
<script>
var BarraMagica = {
  applyStrings: function() {
    // Mock — solo cambia la pregunta
    var QUESTIONS = [
      ["¿Cómo", "te", "sientes?"],
      ["¿Qué", "emoción", "traes hoy?"],
      ["¿Cómo", "amaneciste", "de ánimo?"],
      ["¿Qué", "estás", "sintiendo?"],
      ["¿Y", "tu", "ánimo?"],
      ["¿Cómo", "está tu", "ánimo hoy?"],
      ["Cuéntame cómo", "te", "sientes"],
      ["¿En qué momento", "emocional", "estás?"],
      ["Háblame de", "tu", "ánimo"],
      ["¿Cómo se siente", "tu", "día?"],
      ["¿Qué emoción", "es la más", "fuerte hoy?"],
      ["¿Cómo describirías", "lo que", "sientes?"],
    ];
    var seg = QUESTIONS[Math.floor(Math.random() * QUESTIONS.length)];
    var w1 = document.querySelector('#barraQuestion .bm-w1');
    var w2 = document.querySelector('#barraQuestion .bm-w2');
    var w3 = document.querySelector('#barraQuestion .bm-w3');
    if (w1) w1.textContent = seg[0];
    if (w2) w2.textContent = seg[1];
    if (w3) w3.textContent = seg[2];
  }
};
</script>

<!-- ─── EL SISTEMA QUANTUM ATMOSPHERE ─── -->
<script src="quantum-script.js"></script>

<!-- Test controls -->
<script>
var openCount = 0;
function forceRegenerate() {
  // Forzar bypass del cache
  if (typeof BarraMagica !== 'undefined' && BarraMagica._quantumPatched) {
    // El script tiene cache de 1.2s — esperamos lo necesario
    BarraMagica.applyStrings();
    openCount++;
    document.getElementById('testCounter').textContent = 'apertura #' + openCount;
  }
}
function changeQuestion() {
  forceRegenerate();
}

// Esperar que el script se instale, luego permitir test manual
setTimeout(function() {
  document.getElementById('testCounter').textContent = 'apertura #1 (instalada)';
  openCount = 1;
}, 200);
</script>

</body>
</html>
